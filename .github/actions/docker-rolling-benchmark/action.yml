name: "Docker rolling benchmark"
description: "Run one rolling Docker benchmark provider inside a single visible job."

inputs:
  strategy:
    required: true
  buildkit_mountcache_offloader:
    description: "Enable BuildKit-owned cache-mount archive offload for managed type=boringcache lanes."
    required: false
    default: "false"
  benchmark_id:
    required: true
  cache_scope_override:
    description: "Optional exact BoringCache cache tag. Empty keeps the normal rolling scope derivation."
    required: false
    default: ""
  project_repo:
    required: true
  project_ref:
    description: "Optional upstream project ref/SHA to checkout after initializing the pinned submodule."
    required: false
    default: ""
  dockerfile_path:
    required: false
    default: upstream/Dockerfile
  docker_context:
    required: false
    default: upstream
  docker_tool_cache:
    description: "Optional Docker tool-cache adapter injected by the managed BuildKit backend."
    required: false
    default: ""
  docker_build_args:
    required: false
    default: ""
  docker_platform:
    description: "Optional Docker Buildx platform list, for example linux/amd64 or linux/arm64,linux/amd64."
    required: false
    default: ""
  image_tag:
    required: true
  prepare_install_command:
    required: false
    default: ""
  prepare_command:
    required: false
    default: ""
  prepare_node_version:
    required: false
    default: ""
  cli_platform:
    required: false
    default: linux-amd64
  cli_version:
    description: "Optional BoringCache CLI release tag. Canary runs can pass vcli-canary."
    required: false
    default: ""
  buildkit_image:
    description: "Managed BoringCache BuildKit image."
    required: false
    default: ghcr.io/boringcache/buildkit:v0.30.0-bc
  benchmark_workspace:
    required: true
  build_mode:
    description: "Build mode passed to the BoringCache benchmark script. Use partial-warm for read-only cache replay."
    required: false
    default: "full"
  cache_scope_ref_slug:
    description: "Optional ref slug used for cache scope selection instead of the workflow branch name."
    required: false
    default: ""
  turbo_cache_mounts:
    description: "Apply the benchmark-only PostHog Dockerfile patch that declares Turbo cache mounts."
    required: false
    default: "false"
  free_disk_space:
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Validate strategy
      shell: bash
      env:
        STRATEGY: ${{ inputs.strategy }}
      run: |
        case "$STRATEGY" in
          actions-cache|boringcache) ;;
          *) echo "Unknown Docker benchmark strategy: $STRATEGY" >&2; exit 1 ;;
        esac

    - name: Free disk space
      if: ${{ inputs.free_disk_space == 'true' }}
      shell: bash
      run: |
        required_gb="${BORINGCACHE_MIN_FREE_DISK_GB:-45}"
        available_kb="$(df -Pk / | awk 'NR == 2 { print $4 }')"
        required_kb=$((required_gb * 1024 * 1024))
        if (( available_kb >= required_kb )); then
          echo "Free disk is already at least ${required_gb}GiB; skipping cleanup."
          df -h /
          docker system df || true
          exit 0
        fi
        echo "Free disk below ${required_gb}GiB; reclaiming hosted-runner tool caches."
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/share/swift /usr/local/.ghcup
        sudo docker system prune --all --volumes --force
        df -h /
        docker system df || true

    - name: Validate BoringCache secrets
      if: ${{ inputs.strategy == 'boringcache' }}
      shell: bash
      run: |
        set -euo pipefail
        if [[ -z "${BORINGCACHE_RESTORE_TOKEN:-}" ]]; then
          echo "Missing BORINGCACHE_RESTORE_TOKEN secret" >&2
          exit 1
        fi
        if [[ -z "${BORINGCACHE_SAVE_TOKEN:-}" ]]; then
          echo "Missing BORINGCACHE_SAVE_TOKEN secret" >&2
          exit 1
        fi

    - name: Detect BoringCache client region
      if: ${{ inputs.strategy == 'boringcache' }}
      shell: bash
      run: |
        set -euo pipefail

        region="${BORINGCACHE_CLIENT_REGION:-${BORINGCACHE_RUNNER_REGION:-${RUNNER_REGION:-}}}"
        if [[ -z "$region" ]]; then
          region="$(curl --fail --silent --show-error --max-time 2 --connect-timeout 1 \
            -H Metadata:true \
            "http://169.254.169.254/metadata/instance/compute/location?api-version=2021-02-01&format=text" \
            2>/dev/null || true)"
        fi

        region="$(printf '%s' "$region" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9-')"
        if [[ -n "$region" ]]; then
          echo "BORINGCACHE_CLIENT_REGION=$region" >> "$GITHUB_ENV"
          echo "BoringCache client region: $region"
        else
          echo "::notice::BoringCache client region unavailable; Rails will use the default edge endpoint."
        fi

    - name: Log in to private GHCR images
      if: ${{ startsWith(inputs.buildkit_image, 'ghcr.io/') }}
      uses: docker/login-action@v4.2.0
      with:
        registry: ghcr.io
        username: ${{ env.BORINGCACHE_GHCR_READ_USER || github.actor }}
        password: ${{ env.BORINGCACHE_GHCR_READ_TOKEN }}

    - name: Install BoringCache CLI with boringcache/one
      if: ${{ inputs.strategy == 'boringcache' }}
      uses: boringcache/one@one-canary-fa7e24f0f30f
      with:
        setup: none
        mode: archive
        workspace: ${{ inputs.benchmark_workspace }}
        cli-version: ${{ inputs.cli_version }}
        cli-platform: ${{ inputs.cli_platform }}
        cache-runtime: false

    - name: Checkout pinned upstream submodule shallowly
      shell: bash
      env:
        PROJECT_REF: ${{ inputs.project_ref }}
      run: |
        set -euo pipefail
        git submodule sync --recursive
        git -c protocol.version=2 submodule update --init --depth 1 --recommend-shallow --jobs 4 upstream
        if [[ -n "$PROJECT_REF" ]]; then
          if git -C upstream fetch --depth 1 origin "$PROJECT_REF"; then
            git -C upstream checkout --detach FETCH_HEAD
          else
            git -C upstream fetch --depth 64 origin master || true
            git -C upstream fetch --depth 64 origin main || true
            git -C upstream checkout --detach "$PROJECT_REF"
          fi
        fi

    - name: Prepare base benchmark source tree
      shell: bash
      env:
        POSTHOG_TURBO_CACHE_MOUNTS: ${{ inputs.turbo_cache_mounts == 'true' && '1' || '' }}
      run: ./scripts/prepare-source.sh base

    - name: Setup Node for Docker build artifacts
      if: ${{ inputs.prepare_install_command != '' || inputs.prepare_command != '' }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.prepare_node_version }}

    - name: Enable Node package manager for Docker build artifacts
      if: ${{ inputs.prepare_install_command != '' || inputs.prepare_command != '' }}
      shell: bash
      run: |
        set -euo pipefail
        cd upstream
        corepack enable
        corepack install

    - name: Install Docker build artifact dependencies
      if: ${{ inputs.prepare_install_command != '' }}
      shell: bash
      env:
        PREPARE_INSTALL_COMMAND: ${{ inputs.prepare_install_command }}
      run: |
        set -euo pipefail
        cd upstream
        eval "$PREPARE_INSTALL_COMMAND"

    - name: Prepare Docker build artifacts
      if: ${{ inputs.prepare_command != '' }}
      shell: bash
      env:
        PREPARE_COMMAND: ${{ inputs.prepare_command }}
      run: |
        set -euo pipefail
        cd upstream
        eval "$PREPARE_COMMAND"

    - name: Start timing
      id: timing_start
      shell: bash
      run: echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"

    - name: Prepare benchmark scope
      id: scope
      shell: bash
      env:
        STRATEGY: ${{ inputs.strategy }}
        BENCHMARK_ID: ${{ inputs.benchmark_id }}
        CACHE_SCOPE_OVERRIDE: ${{ inputs.cache_scope_override }}
        CACHE_SCOPE_REF_SLUG: ${{ inputs.cache_scope_ref_slug }}
        DOCKER_TOOL_CACHE: ${{ inputs.docker_tool_cache }}
      run: |
        set -euo pipefail
        tool_cache_tags_csv() {
          local cache_scope="$1"
          local requested="$2"
          local tool_cache_value tool tag
          local tags=()

          for tool_cache_value in ${requested//,/ }; do
            [[ -n "$tool_cache_value" ]] || continue
            tool="${tool_cache_value%%:*}"
            if [[ "$tool_cache_value" == *:* ]]; then
              tag="${tool_cache_value#*:}"
            else
              tag="${cache_scope}-${tool}"
            fi
            [[ -n "$tag" ]] && tags+=("$tag")
          done

          local IFS=,
          printf '%s\n' "${tags[*]}"
        }

        ref_name="${CACHE_SCOPE_REF_SLUG:-$GITHUB_REF_NAME}"
        ref_slug="$(printf '%s' "${ref_name}" | tr -c 'A-Za-z0-9._-' '-')"
        ref_slug="${ref_slug#-}"
        ref_slug="${ref_slug%-}"
        ref_slug="${ref_slug:-main}"
        scope_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        echo "scope_started_at=${scope_started_at}" >> "$GITHUB_OUTPUT"

        if [[ "$STRATEGY" == "boringcache" ]]; then
          cache_scope="${CACHE_SCOPE_OVERRIDE:-${BENCHMARK_ID}-run-rolling-${ref_slug}}"
          tool_cache_tags="$(tool_cache_tags_csv "$cache_scope" "$DOCKER_TOOL_CACHE")"
          tags_csv="${cache_scope}"
          if [[ -n "$tool_cache_tags" ]]; then
            tags_csv="${tags_csv},${tool_cache_tags}"
          fi
          echo "cache_scope=${cache_scope}" >> "$GITHUB_OUTPUT"
          echo "tags_csv=${tags_csv}" >> "$GITHUB_OUTPUT"
          echo "tool_cache_tags_csv=${tool_cache_tags}" >> "$GITHUB_OUTPUT"
        else
          cache_scope_primary="${BENCHMARK_ID}-rolling-${ref_slug}"
          cache_scope_fallback="${BENCHMARK_ID}-rolling-${ref_slug}-fallback"
          echo "cache_scope_primary=${cache_scope_primary}" >> "$GITHUB_OUTPUT"
          echo "cache_scope_fallback=${cache_scope_fallback}" >> "$GITHUB_OUTPUT"
        fi

    - name: Set up Docker Buildx
      if: ${{ inputs.strategy == 'actions-cache' }}
      id: buildx
      uses: docker/setup-buildx-action@v4
      with:
        driver-opts: |
          image=${{ inputs.buildkit_image }}

    - name: Expose GitHub runtime for Buildx cache
      if: ${{ inputs.strategy == 'actions-cache' }}
      uses: crazy-max/ghaction-github-runtime@v4

    - name: Prepare GitHub Actions Cache write probe
      if: ${{ inputs.strategy == 'actions-cache' }}
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p .bench-cache-probe
        printf '%s\n' "probe-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-$(date +%s)" > .bench-cache-probe/probe.txt

    - name: Verify GitHub Actions Cache write access
      if: ${{ inputs.strategy == 'actions-cache' }}
      id: cache_write_probe
      continue-on-error: true
      uses: actions/cache/save@v5
      with:
        path: .bench-cache-probe
        key: ac-${{ inputs.benchmark_id }}-write-probe-r${{ github.run_id }}-a${{ github.run_attempt }}

    - name: Fail early if GitHub Actions Cache is read-only
      if: ${{ inputs.strategy == 'actions-cache' && steps.cache_write_probe.outcome != 'success' }}
      shell: bash
      run: |
        echo "GitHub Actions Cache write probe failed (likely read-only budget/spending cap)." >&2
        echo "Cannot produce reliable GitHub Actions Cache benchmark results until cache writes are enabled." >&2
        exit 1

    - name: Run rolling commit build
      id: build
      shell: bash
      env:
        STRATEGY: ${{ inputs.strategy }}
        BENCHMARK_ID: ${{ inputs.benchmark_id }}
        BENCHMARK_WORKSPACE: ${{ inputs.benchmark_workspace }}
        BORINGCACHE_DOCKER_TOOL_CACHE: ${{ inputs.docker_tool_cache }}
        BORINGCACHE_BUILDKIT_MOUNTCACHE_OFFLOADER: ${{ inputs.buildkit_mountcache_offloader == 'true' && '1' || '' }}
        BORINGCACHE_MANAGED_BUILDKIT_IMAGE: ${{ inputs.buildkit_image }}
        BUILDKIT_IMAGE: ${{ inputs.buildkit_image }}
        BUILDER: ${{ steps.buildx.outputs.name || '' }}
        CACHE_SCOPE: ${{ steps.scope.outputs.cache_scope }}
        CACHE_SCOPE_PRIMARY: ${{ steps.scope.outputs.cache_scope_primary }}
        CACHE_SCOPE_FALLBACK: ${{ steps.scope.outputs.cache_scope_fallback }}
        CACHE_LANE: rolling
        BORINGCACHE_OBSERVABILITY_JSONL_PATH: ${{ runner.temp }}/${{ inputs.benchmark_id }}-boringcache-commit-observability.jsonl
        ALLOW_BORINGCACHE_ROLLING_BOOTSTRAP: "true"
        BENCHMARK_BUILD_MODE: ${{ inputs.build_mode }}
        IMAGE_TAG: ${{ inputs.image_tag }}
        DOCKERFILE_PATH: ${{ inputs.dockerfile_path }}
        BENCHMARK_DOCKER_CONTEXT: ${{ inputs.docker_context }}
        DOCKER_BUILD_EXTRA_ARGS: ${{ inputs.docker_build_args }}
        DOCKER_PLATFORM: ${{ inputs.docker_platform }}
      run: |
        set -euo pipefail
        docker_extra_args=()
        if [[ -n "${DOCKER_PLATFORM:-}" ]]; then
          docker_extra_args+=(--platform "$DOCKER_PLATFORM")
        fi
        if [[ -n "${DOCKER_BUILD_EXTRA_ARGS:-}" ]]; then
          while IFS= read -r arg; do
            [[ -n "$arg" ]] && docker_extra_args+=("$arg")
          done <<< "$DOCKER_BUILD_EXTRA_ARGS"
        fi
        effective_docker_build_args=""
        if ((${#docker_extra_args[@]})); then
          effective_docker_build_args="$(printf '%s\n' "${docker_extra_args[@]}")"
        fi

        phase_start="${{ steps.timing_start.outputs.started_at }}"
        start="$(date +%s)"

        if [[ "$STRATEGY" == "boringcache" ]]; then
          BENCHMARK_PHASE_STARTED_AT="$phase_start" \
            BENCHMARK_METRICS_OUTPUT="${RUNNER_TEMP}/rolling-build-metrics.env" \
            BENCHMARK_DIAGNOSTICS_OUTPUT="benchmark-diagnostics/${BENCHMARK_ID}-boringcache-rolling-commit.txt" \
            DOCKER_BUILD_EXTRA_ARGS="$effective_docker_build_args" \
            ./scripts/run-boringcache-docker-lane.sh "${BENCHMARK_BUILD_MODE:-full}"
        else
          build_log="$(mktemp /tmp/${BENCHMARK_ID}-ac-rolling.XXXXXX.log)"
          find_step_id() {
            local pattern="$1"
            sed -nE "s/^#([0-9]+) ${pattern}.*/\\1/p" "$build_log" | tail -n1
          }
          find_step_seconds() {
            local step_id="$1"
            [[ -n "$step_id" ]] || return 0
            sed -nE "s/^#${step_id} DONE ([0-9]+(\\.[0-9]+)?)s$/\\1/p" "$build_log" | tail -n1
          }

          selected_scope="$CACHE_SCOPE_PRIMARY"
          attempt=1
          while true; do
            build_cache_args=(
              --cache-from "type=gha,scope=${selected_scope}"
              --cache-to "type=gha,mode=max,scope=${selected_scope}"
            )

            : > "$build_log"
            set +e
            DOCKER_BUILDKIT=1 docker buildx build \
              --builder "$BUILDER" \
              --file "$DOCKERFILE_PATH" \
              --tag "$IMAGE_TAG" \
              --progress=plain \
              "${docker_extra_args[@]}" \
              "${build_cache_args[@]}" \
              "$BENCHMARK_DOCKER_CONTEXT" 2>&1 | tee "$build_log"
            status=${PIPESTATUS[0]}
            set -e

            if [[ "$status" -eq 0 ]]; then
              break
            fi
            if [[ "$attempt" -ge 2 ]]; then
              echo "Rolling build failed after retry" >&2
              exit "$status"
            fi
            attempt=$((attempt + 1))
            selected_scope="$CACHE_SCOPE_FALLBACK"
            echo "Retrying rolling build with fallback cache scope: ${selected_scope}"
            sleep 5
          done

          end="$(date +%s)"
          echo "cache_scope=${selected_scope}" >> "$GITHUB_OUTPUT"
          echo "seconds=$((end - phase_start))" >> "$GITHUB_OUTPUT"
          echo "build_seconds=$((end - start))" >> "$GITHUB_OUTPUT"
          import_step="$(find_step_id "importing cache manifest from")"
          import_seconds="$(find_step_seconds "$import_step")"
          if [[ -n "$import_seconds" ]]; then
            echo "docker_cache_import_seconds=${import_seconds}" >> "$GITHUB_OUTPUT"
          fi
          export_step="$(find_step_id "preparing build cache for export")"
          export_seconds="$(find_step_seconds "$export_step")"
          if [[ -n "$export_seconds" ]]; then
            echo "docker_cache_export_seconds=${export_seconds}" >> "$GITHUB_OUTPUT"
          fi
          cached_steps="$(grep -Ec '^#[0-9]+ CACHED$' "$build_log" || true)"
          echo "buildkit_cached_steps=${cached_steps}" >> "$GITHUB_OUTPUT"
        fi

    - name: Upload commit diagnostics
      if: ${{ inputs.strategy == 'boringcache' && always() }}
      uses: actions/upload-artifact@v6
      with:
        name: benchmark-diagnostics-${{ inputs.benchmark_id }}-boringcache-rolling
        path: benchmark-diagnostics/*
        if-no-files-found: ignore

    - name: Measure cache storage usage
      id: storage
      shell: bash
      env:
        STRATEGY: ${{ inputs.strategy }}
        BENCHMARK_ID: ${{ inputs.benchmark_id }}
        BENCHMARK_WORKSPACE: ${{ inputs.benchmark_workspace }}
      run: |
        set -euo pipefail
        mkdir -p benchmark-storage
        if [[ "$STRATEGY" == "boringcache" ]]; then
          tags_csv="${{ steps.scope.outputs.tags_csv }}"
          breakdown_path="benchmark-storage/boringcache-storage-breakdown.json"
          exact_tags=""
          bytes="$(BORINGCACHE_STORAGE_BREAKDOWN_PATH="$breakdown_path" BORINGCACHE_EXACT_TAGS="$exact_tags" ./scripts/sum-boringcache-check-sizes.sh "$BENCHMARK_WORKSPACE" "$tags_csv")"
          source="boringcache-check"
        else
          breakdown_path=""
          bytes="$(./scripts/sum-gha-cache-by-key.sh "$BENCHMARK_ID" "${{ steps.scope.outputs.scope_started_at }}")"
          source="github-actions-cache-api"
        fi
        echo "bytes=${bytes}" >> "$GITHUB_OUTPUT"
        echo "source=${source}" >> "$GITHUB_OUTPUT"
        echo "breakdown_path=${breakdown_path}" >> "$GITHUB_OUTPUT"

    - name: Write benchmark artifacts
      id: artifact_files
      shell: bash
      env:
        STRATEGY: ${{ inputs.strategy }}
        BENCHMARK_ID: ${{ inputs.benchmark_id }}
        PROJECT_REPO: ${{ inputs.project_repo }}
        BUILDKIT_IMAGE: ${{ inputs.buildkit_image }}
      run: |
        set -euo pipefail
        cache_summary_args=()
        if [[ -s benchmark-session-summary/benchmark-session-summary.json ]]; then
          cache_summary_args=(--cache-session-summary-json benchmark-session-summary/benchmark-session-summary.json)
        fi

        cache_import_status=""
        if [[ "$STRATEGY" == "boringcache" ]]; then
          cache_import_status="${{ steps.build.outputs.cache_import_status }}"
        fi
        project_ref="$(git -C upstream rev-parse HEAD 2>/dev/null || git rev-parse HEAD:upstream)"

        ./scripts/write-benchmark-artifacts.sh \
          --benchmark "$BENCHMARK_ID" \
          --strategy "$STRATEGY" \
          --lane rolling \
          --mode docker \
          --adapter buildkit \
          --project-repo "$PROJECT_REPO" \
          --project-ref "$project_ref" \
          --cold-seconds "${{ steps.build.outputs.seconds }}" \
          --cold-build-seconds "${{ steps.build.outputs.build_seconds }}" \
          --warm1-seconds "" \
          --warm1-build-seconds "" \
          --cache-import-status "$cache_import_status" \
          --prior-cache-state "${{ steps.build.outputs.prior_cache_state }}" \
          --docker-cache-import-seconds "${{ steps.build.outputs.docker_cache_import_seconds }}" \
          --docker-cache-export-seconds "${{ steps.build.outputs.docker_cache_export_seconds }}" \
          --buildkit-cached-steps "${{ steps.build.outputs.buildkit_cached_steps }}" \
          --buildkit-cache-prewarm-seconds "${{ steps.build.outputs.buildkit_cache_prewarm_seconds }}" \
          --buildkit-cache-prepare-seconds "${{ steps.build.outputs.buildkit_cache_prepare_seconds }}" \
          --buildkit-cache-send-seconds "${{ steps.build.outputs.buildkit_cache_send_seconds }}" \
          --buildkit-cache-prewarm-queued "${{ steps.build.outputs.buildkit_cache_prewarm_queued }}" \
          --buildkit-cache-prewarm-dropped "${{ steps.build.outputs.buildkit_cache_prewarm_dropped }}" \
          --buildkit-cache-prewarm-canceled "${{ steps.build.outputs.buildkit_cache_prewarm_canceled }}" \
          --buildkit-cache-prewarm-retried "${{ steps.build.outputs.buildkit_cache_prewarm_retried }}" \
          --buildkit-cache-prewarm-deferred "${{ steps.build.outputs.buildkit_cache_prewarm_deferred }}" \
          --buildkit-cache-prewarm-prepared "${{ steps.build.outputs.buildkit_cache_prewarm_prepared }}" \
          --buildkit-cache-prewarm-body-prepared "${{ steps.build.outputs.buildkit_cache_prewarm_body_prepared }}" \
          --buildkit-cache-prewarm-committed-bodies "${{ steps.build.outputs.buildkit_cache_prewarm_committed_bodies }}" \
          --buildkit-cache-prewarm-delegated-bodies "${{ steps.build.outputs.buildkit_cache_prewarm_delegated_bodies }}" \
          --buildkit-cache-prewarm-owned-bodies "${{ steps.build.outputs.buildkit_cache_prewarm_owned_bodies }}" \
          --buildkit-cache-prewarm-owned-body-bytes "${{ steps.build.outputs.buildkit_cache_prewarm_owned_body_bytes }}" \
          --buildkit-cache-prewarm-owned-body-max "${{ steps.build.outputs.buildkit_cache_prewarm_owned_body_max }}" \
          --buildkit-cache-prewarm-resolved "${{ steps.build.outputs.buildkit_cache_prewarm_resolved }}" \
          --buildkit-cache-prewarm-reused "${{ steps.build.outputs.buildkit_cache_prewarm_reused }}" \
          --buildkit-cache-prewarm-uploaded "${{ steps.build.outputs.buildkit_cache_prewarm_uploaded }}" \
          --buildkit-cache-prewarm-failed "${{ steps.build.outputs.buildkit_cache_prewarm_failed }}" \
          --buildkit-cache-prewarm-recursive "${{ steps.build.outputs.buildkit_cache_prewarm_recursive }}" \
          --buildkit-cache-prewarm-direct "${{ steps.build.outputs.buildkit_cache_prewarm_direct }}" \
          --buildkit-cache-prewarm-missed "${{ steps.build.outputs.buildkit_cache_prewarm_missed }}" \
          --buildkit-cache-prewarm-body-time-seconds "${{ steps.build.outputs.buildkit_cache_prewarm_body_time_seconds }}" \
          --buildkit-cache-prewarm-body-max-seconds "${{ steps.build.outputs.buildkit_cache_prewarm_body_max_seconds }}" \
          --buildkit-cache-prewarm-resolve-time-seconds "${{ steps.build.outputs.buildkit_cache_prewarm_resolve_time_seconds }}" \
          --buildkit-cache-prewarm-resolve-max-seconds "${{ steps.build.outputs.buildkit_cache_prewarm_resolve_max_seconds }}" \
          --buildkit-cache-prewarm-upload-time-seconds "${{ steps.build.outputs.buildkit_cache_prewarm_upload_time_seconds }}" \
          --buildkit-cache-prewarm-upload-max-seconds "${{ steps.build.outputs.buildkit_cache_prewarm_upload_max_seconds }}" \
          --buildkit-cache-prewarm-queue-depth "${{ steps.build.outputs.buildkit_cache_prewarm_queue_depth }}" \
          --buildkit-cache-prewarm-max-queue-depth "${{ steps.build.outputs.buildkit_cache_prewarm_max_queue_depth }}" \
          --buildkit-cache-prewarm-body-slot-limit "${{ steps.build.outputs.buildkit_cache_prewarm_body_slot_limit }}" \
          --buildkit-cache-prewarm-body-slot-max "${{ steps.build.outputs.buildkit_cache_prewarm_body_slot_max }}" \
          --buildkit-cache-prewarm-body-active "${{ steps.build.outputs.buildkit_cache_prewarm_body_active }}" \
          --buildkit-cache-prewarm-body-active-max "${{ steps.build.outputs.buildkit_cache_prewarm_body_active_max }}" \
          --buildkit-cache-prewarm-body-scaleups "${{ steps.build.outputs.buildkit_cache_prewarm_body_scaleups }}" \
          --buildkit-cache-prewarm-body-downshifts "${{ steps.build.outputs.buildkit_cache_prewarm_body_downshifts }}" \
          --buildkit-cache-prewarm-body-backlog-reliefs "${{ steps.build.outputs.buildkit_cache_prewarm_body_backlog_reliefs }}" \
          --buildkit-cache-prewarm-cpu-pressure-seconds "${{ steps.build.outputs.buildkit_cache_prewarm_cpu_pressure_seconds }}" \
          --buildkit-cache-prewarm-io-pressure-seconds "${{ steps.build.outputs.buildkit_cache_prewarm_io_pressure_seconds }}" \
          --buildkit-cache-prewarm-body-phase "${{ steps.build.outputs.buildkit_cache_prewarm_body_phase }}" \
          --buildkit-cache-prewarm-image-output-overlap-seconds "${{ steps.build.outputs.buildkit_cache_prewarm_image_output_overlap_seconds }}" \
          --buildkit-cache-prewarm-cache-only-transitions "${{ steps.build.outputs.buildkit_cache_prewarm_cache_only_transitions }}" \
          --buildkit-cache-prewarm-slot-limit-min "${{ steps.build.outputs.buildkit_cache_prewarm_slot_limit_min }}" \
          --buildkit-cache-prewarm-slot-limit-max "${{ steps.build.outputs.buildkit_cache_prewarm_slot_limit_max }}" \
          --buildkit-cache-prewarm-body-wait-seconds "${{ steps.build.outputs.buildkit_cache_prewarm_body_wait_seconds }}" \
          --buildkit-cache-prewarm-body-wait-max-seconds "${{ steps.build.outputs.buildkit_cache_prewarm_body_wait_max_seconds }}" \
          --buildkit-cache-prewarm-workers-current "${{ steps.build.outputs.buildkit_cache_prewarm_workers_current }}" \
          --buildkit-cache-prewarm-workers-max "${{ steps.build.outputs.buildkit_cache_prewarm_workers_max }}" \
          --cache-storage-bytes "${{ steps.storage.outputs.bytes }}" \
          --cache-storage-source "${{ steps.storage.outputs.source }}" \
          --storage-breakdown-json "${{ steps.storage.outputs.breakdown_path }}" \
          --network-bytes-uploaded "${{ steps.build.outputs.network_upload_bytes || steps.build.outputs.oci_new_blob_bytes }}" \
          --oci-hydration-policy "${{ steps.build.outputs.oci_hydration_policy }}" \
          --oci-body-local-hits "${{ steps.build.outputs.oci_body_local_hits }}" \
          --oci-body-remote-fetches "${{ steps.build.outputs.oci_body_remote_fetches }}" \
          --oci-body-local-bytes "${{ steps.build.outputs.oci_body_local_bytes }}" \
          --oci-body-remote-bytes "${{ steps.build.outputs.oci_body_remote_bytes }}" \
          --oci-body-local-duration-ms "${{ steps.build.outputs.oci_body_local_duration_ms }}" \
          --oci-body-remote-duration-ms "${{ steps.build.outputs.oci_body_remote_duration_ms }}" \
          --startup-oci-body-inserted "${{ steps.build.outputs.startup_oci_body_inserted }}" \
          --startup-oci-body-failures "${{ steps.build.outputs.startup_oci_body_failures }}" \
          --startup-oci-body-cold-blobs "${{ steps.build.outputs.startup_oci_body_cold_blobs }}" \
          --startup-oci-body-duration-ms "${{ steps.build.outputs.startup_oci_body_duration_ms }}" \
          --oci-new-blob-count "${{ steps.build.outputs.oci_new_blob_count }}" \
          --oci-new-blob-bytes "${{ steps.build.outputs.oci_new_blob_bytes }}" \
          --oci-upload-requested-blobs "${{ steps.build.outputs.oci_upload_requested_blobs }}" \
          --oci-upload-already-present "${{ steps.build.outputs.oci_upload_already_present }}" \
          --oci-upload-batch-seconds "${{ steps.build.outputs.oci_upload_batch_seconds }}" \
          --reseed-new-blob-threshold "0" \
          --hit-behavior-note "Rolling lane: one continuous-commit build imports the prior branch/default Docker cache, exports the updated cache, and records that commit build only." \
          "${cache_summary_args[@]}" \

    - name: Upload benchmark artifacts
      uses: actions/upload-artifact@v6
      with:
        name: benchmark-${{ inputs.benchmark_id }}-${{ inputs.strategy }}-rolling
        path: |
          ${{ steps.artifact_files.outputs.json_path }}
          ${{ steps.artifact_files.outputs.md_path }}
        if-no-files-found: error

    - name: Publish summary
      shell: bash
      run: cat "${{ steps.artifact_files.outputs.md_path }}" >> "$GITHUB_STEP_SUMMARY"
