name: "PostHog - BoringCache"

on:
  workflow_dispatch:
    inputs:
      cli_ref:
        description: "Optional boringcache/cli ref to build and use instead of the released CLI"
        required: false
        type: string
      internal_profile:
        description: "Internal cache profile for diagnostics"
        required: false
        default: standard
        type: choice
        options:
          - standard
          - internal-off
      turbo_backend:
        description: "How BoringCache integrates with Turbo in benchmark builds"
        required: false
        default: proxy
        type: choice
        options:
          - proxy
          - archive
          - off
  pull_request:
    paths:
      - ".dockerignore"
      - ".gitmodules"
      - "Dockerfile.benchmark"
      - ".github/workflows/posthog-boringcache.yml"
      - ".github/workflows/posthog-actions-cache.yml"
      - "README.md"
      - "scenarios/**"
      - "scripts/**"
      - "upstream"
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read
  actions: read

env:
  PROJECT_REPO: PostHog/posthog
  PROJECT_REF: "5ddbe2c9f8cf4877fa1739605aae1f05325ab4bb"
  BENCHMARK_ID: posthog
  BENCHMARK_WORKSPACE: boringcache/benchmarks
  INTERNAL_PROFILE: ${{ github.event.inputs.internal_profile || 'standard' }}
  TURBO_BACKEND: ${{ github.event.inputs.turbo_backend || 'proxy' }}

jobs:
  seed-cache:
    name: Docker Seed (BoringCache, cold)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    outputs:
      cache_scope: ${{ steps.scope.outputs.cache_scope }}
      cold_seconds: ${{ steps.cold_baseline_build.outputs.seconds }}
      tags_csv: ${{ steps.scope.outputs.tags_csv }}
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /

      - name: Validate BoringCache secrets
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${BORINGCACHE_RESTORE_TOKEN}" ]]; then
            echo "Missing BORINGCACHE_RESTORE_TOKEN secret" >&2
            exit 1
          fi
          if [[ -z "${BORINGCACHE_SAVE_TOKEN}" ]]; then
            echo "Missing BORINGCACHE_SAVE_TOKEN secret" >&2
            exit 1
          fi

      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Checkout pinned upstream submodule shallowly
        run: |
          set -euo pipefail
          git submodule sync --recursive
          git -c protocol.version=2 submodule update --init --depth 1 --recommend-shallow --jobs 4 upstream

      - name: Prepare base benchmark source tree
        run: ./scripts/prepare-source.sh base

      - name: Install BoringCache CLI with boringcache/one
        uses: boringcache/one@v1
        with:
          setup: none
          mode: archive
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          cli-platform: debian-bookworm-amd64
          cache-runtime: false

      - name: Prepare benchmark build inputs
        id: scope
        run: |
          cp "$(which boringcache)" ./boringcache-bin

          run_suffix="r${GITHUB_RUN_ID}-a${GITHUB_RUN_ATTEMPT}"
          cache_scope="${BENCHMARK_ID}-run-${run_suffix}"
          docker_registry_tag="${BENCHMARK_ID}-docker-layers-${run_suffix}"
          pnpm_tag="posthog-pnpm-${run_suffix}"
          case "${TURBO_BACKEND}" in
            archive)
              turbo_tag="posthog-turbo-archive-${run_suffix}"
              turbo_plugin_tag="posthog-turbo-plugin-archive-${run_suffix}"
              ;;
            proxy|off)
              turbo_tag="posthog-turbo-${run_suffix}"
              turbo_plugin_tag="posthog-turbo-plugin-${run_suffix}"
              ;;
            *)
              echo "Unknown TURBO_BACKEND: ${TURBO_BACKEND}" >&2
              exit 1
              ;;
          esac
          node_scripts_tag="posthog-node-scripts-${run_suffix}"
          python_tag="posthog-python-${run_suffix}"
          staticfiles_tag="posthog-staticfiles-${run_suffix}"
          playwright_tag="posthog-playwright-${run_suffix}"
          internal_platform_suffix="debian-12-x86_64"
          purge_internal_tags_csv="${pnpm_tag}-${internal_platform_suffix},${turbo_tag},${turbo_plugin_tag},${node_scripts_tag}-${internal_platform_suffix},${python_tag}-${internal_platform_suffix},${staticfiles_tag}-${internal_platform_suffix},${playwright_tag}-${internal_platform_suffix}"
          purge_registry_tags_csv="${docker_registry_tag}"
          tags_csv="${pnpm_tag},${turbo_tag},${turbo_plugin_tag},${node_scripts_tag},${python_tag},${staticfiles_tag},${playwright_tag},${cache_scope},${docker_registry_tag}"
          echo "cache_scope=${cache_scope}" >> "$GITHUB_OUTPUT"
          echo "docker_registry_tag=${docker_registry_tag}" >> "$GITHUB_OUTPUT"
          echo "pnpm_tag=${pnpm_tag}" >> "$GITHUB_OUTPUT"
          echo "turbo_tag=${turbo_tag}" >> "$GITHUB_OUTPUT"
          echo "turbo_plugin_tag=${turbo_plugin_tag}" >> "$GITHUB_OUTPUT"
          echo "node_scripts_tag=${node_scripts_tag}" >> "$GITHUB_OUTPUT"
          echo "python_tag=${python_tag}" >> "$GITHUB_OUTPUT"
          echo "staticfiles_tag=${staticfiles_tag}" >> "$GITHUB_OUTPUT"
          echo "playwright_tag=${playwright_tag}" >> "$GITHUB_OUTPUT"
          echo "purge_internal_tags_csv=${purge_internal_tags_csv}" >> "$GITHUB_OUTPUT"
          echo "purge_registry_tags_csv=${purge_registry_tags_csv}" >> "$GITHUB_OUTPUT"
          echo "tags_csv=${tags_csv}" >> "$GITHUB_OUTPUT"
          cat > ./run-boringcache-build.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail

          proxy_port="${BORINGCACHE_PROXY_PORT:-5000}"
          proxy_log="${BORINGCACHE_PROXY_LOG_PATH:-/tmp/boringcache-proxy-${proxy_port}.log}"
          build_log="$(mktemp /tmp/boringcache-build.XXXXXX.log)"
          max_attempts=3
          cache_export_pattern='expected sha256:.*got sha256:e3b0|error writing layer blob|400 Bad Request|broken pipe'

          mode="${1:-full}"
          start_proxy() { :; }
          stop_proxy() { :; }
          wait_proxy_ready() { return 0; }
          cleanup() { :; }
          trap cleanup EXIT

          attempt=1
          while true; do
            cache_args=()
            internal_restore_enabled="1"
            internal_save_enabled="1"
            turbo_proxy_enabled="${BORINGCACHE_TURBO_PROXY_ENABLED:-1}"
            case "${BORINGCACHE_INTERNAL_PROFILE:-standard}" in
              standard)
                ;;
              internal-off)
                internal_restore_enabled="0"
                internal_save_enabled="0"
                turbo_proxy_enabled="0"
                ;;
              *)
                echo "Unknown internal cache profile: ${BORINGCACHE_INTERNAL_PROFILE:-}" >&2
                exit 1
                ;;
            esac
            if [[ "$mode" == "full" ]]; then
              cache_args=(
                --cache-from "type=registry,ref=127.0.0.1:${proxy_port}/${CACHE_SCOPE}:buildcache,registry.insecure=true"
                --cache-to "type=registry,ref=127.0.0.1:${proxy_port}/${CACHE_SCOPE}:buildcache,mode=max,registry.insecure=true"
              )
            elif [[ "$mode" == "seed-cache" ]]; then
              # --no-cache is required for type=registry export: without it, buildx
              # sees cached layers from the builder and skips pushing blobs to the
              # registry proxy, so the proxy never uploads to BC backend.
              cache_args=(
                --no-cache
                --cache-to "type=registry,ref=127.0.0.1:${proxy_port}/${CACHE_SCOPE}:buildcache,mode=max,registry.insecure=true"
              )
            elif [[ "$mode" == "partial-warm" ]]; then
              # Read-only: no --cache-to. Internal saves are gated by an empty
              # save-token secret so the Dockerfile instruction keys stay stable.
              cache_args=(
                --cache-from "type=registry,ref=127.0.0.1:${proxy_port}/${CACHE_SCOPE}:buildcache,registry.insecure=true"
              )
            elif [[ "$mode" == "internal-only" ]]; then
              # Disable Docker layer cache for a full stale rebuild.
              cache_args=(--no-cache)
            elif [[ "$mode" == "internal-target" ]]; then
              # Isolate internal dependency/output cache impact without final-image OS package work.
              cache_args=(--no-cache --target posthog-build)
            else
              echo "Unknown build mode: $mode" >&2
              exit 1
            fi
            start_proxy
            if ! wait_proxy_ready; then
              echo "Registry proxy did not become ready (attempt ${attempt}/${max_attempts})" >&2
              tail -n 200 "$proxy_log" || true
              if [[ "$attempt" -ge "$max_attempts" ]]; then
                exit 1
              fi
              stop_proxy
              attempt=$((attempt + 1))
              sleep 3
              continue
            fi

            : > "$build_log"
            set +e
            DOCKER_BUILDKIT=1 docker buildx build \
              --builder "$BUILDER" \
              --file Dockerfile.benchmark \
              --tag "$IMAGE_TAG" \
              --progress=plain \
              "${cache_args[@]}" \
              --secret id=boringcache_token,env=BORINGCACHE_RESTORE_TOKEN \
              --secret id=boringcache_save_token,env=BORINGCACHE_SAVE_TOKEN \
              --build-arg BORINGCACHE_WORKSPACE="$BENCHMARK_WORKSPACE" \
              --build-arg BORINGCACHE_TAG_PNPM="$BORINGCACHE_TAG_PNPM" \
              --build-arg BORINGCACHE_TAG_TURBO="$BORINGCACHE_TAG_TURBO" \
              --build-arg BORINGCACHE_TAG_TURBO_PLUGIN="$BORINGCACHE_TAG_TURBO_PLUGIN" \
              --build-arg BORINGCACHE_TAG_NODE_SCRIPTS="$BORINGCACHE_TAG_NODE_SCRIPTS" \
              --build-arg BORINGCACHE_TAG_PYTHON="$BORINGCACHE_TAG_PYTHON" \
              --build-arg BORINGCACHE_TAG_STATICFILES="$BORINGCACHE_TAG_STATICFILES" \
              --build-arg BORINGCACHE_TAG_PLAYWRIGHT="$BORINGCACHE_TAG_PLAYWRIGHT" \
              --build-arg BORINGCACHE_INTERNAL_RESTORE_ENABLED="$internal_restore_enabled" \
              --build-arg BORINGCACHE_INTERNAL_SAVE_ENABLED="$internal_save_enabled" \
              --build-arg BORINGCACHE_TURBO_PROXY_ENABLED="$turbo_proxy_enabled" \
              --build-arg BORINGCACHE_TURBO_BACKEND="${TURBO_BACKEND}" \
              . 2>&1 | tee "$build_log"
            status=${PIPESTATUS[0]}
            set -e

            if [[ "$status" -eq 0 ]]; then
              if [[ "$mode" =~ ^(full|seed-cache)$ ]] && grep -Eq "$cache_export_pattern" "$build_log"; then
                stop_proxy
                if [[ "$attempt" -lt "$max_attempts" ]]; then
                  echo "Build succeeded but cache export was degraded (attempt ${attempt}/${max_attempts}); retrying to self-heal cache..." >&2
                  attempt=$((attempt + 1))
                  sleep 3
                  continue
                fi
                echo "Build succeeded but cache export still degraded after ${max_attempts} attempts; continuing run with best-effort cache state." >&2
              fi
              # Stop proxy gracefully so it can flush pending uploads
              if [[ "$mode" =~ ^(seed-cache|full)$ ]]; then
                echo "Flushing proxy cache to backend..."
                stop_proxy
              fi
              # Dump proxy log for diagnostics
              echo "=== Proxy log (${mode}, last 200 lines) ==="
              tail -n 200 "$proxy_log" 2>/dev/null || true
              echo "=== End proxy log ==="
              break
            fi

            stop_proxy

            if [[ "$attempt" -ge "$max_attempts" ]]; then
              echo "Build (${mode}) failed after ${max_attempts} attempts" >&2
              tail -n 200 "$build_log" || true
              tail -n 400 "$proxy_log" || true
              exit "$status"
            fi

            if grep -Eq "$cache_export_pattern" "$build_log"; then
              echo "Detected registry blob finalize mismatch (attempt ${attempt}/${max_attempts}); restarting proxy and retrying..." >&2
            else
              echo "Build (${mode}) failed (attempt ${attempt}/${max_attempts}); retrying..." >&2
            fi

            attempt=$((attempt + 1))
            sleep 3
          done
          SH
          chmod +x ./run-boringcache-build.sh

      - name: Configure boringcache/one for Docker
        id: docker_cache
        uses: boringcache/one@v1
        with:
          cli-version: skip
          setup: none
          mode: docker
          docker-command: setup
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          cache-tag: ${{ steps.scope.outputs.cache_scope }}
          registry-tag: ${{ steps.scope.outputs.docker_registry_tag }}
          proxy-no-git: 'true'
          driver-opts: |
            network=host
          verbose: true
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}

      - name: Purge BoringCache benchmark tags
        env:
          BORINGCACHE_API_TOKEN: ${{ github.event_name == 'pull_request' && '' || secrets.BORINGCACHE_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${BORINGCACHE_API_TOKEN:-}" ]]; then
            echo "Skipping purge: BORINGCACHE_ADMIN_TOKEN not set"
            exit 0
          fi
          boringcache delete --no-git "$BENCHMARK_WORKSPACE" "${{ steps.scope.outputs.purge_registry_tags_csv }}" || true
          boringcache delete --no-platform --no-git "$BENCHMARK_WORKSPACE" "${{ steps.scope.outputs.purge_internal_tags_csv }}" || true

      - name: Run cold + seed cache build
        id: cold_baseline_build
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
          BORINGCACHE_INTERNAL_PROFILE: ${{ env.INTERNAL_PROFILE }}
          BORINGCACHE_PROXY_LOG_PATH: ${{ steps.docker_cache.outputs.proxy-log-path }}
          BORINGCACHE_PROXY_PORT: ${{ steps.docker_cache.outputs.proxy-port }}
          BUILDER: ${{ steps.docker_cache.outputs.buildx-name }}
          CACHE_SCOPE: ${{ steps.scope.outputs.cache_scope }}
          BORINGCACHE_TAG_PNPM: ${{ steps.scope.outputs.pnpm_tag }}
          BORINGCACHE_TAG_TURBO: ${{ steps.scope.outputs.turbo_tag }}
          BORINGCACHE_TAG_TURBO_PLUGIN: ${{ steps.scope.outputs.turbo_plugin_tag }}
          BORINGCACHE_TAG_NODE_SCRIPTS: ${{ steps.scope.outputs.node_scripts_tag }}
          BORINGCACHE_TAG_PYTHON: ${{ steps.scope.outputs.python_tag }}
          BORINGCACHE_TAG_STATICFILES: ${{ steps.scope.outputs.staticfiles_tag }}
          BORINGCACHE_TAG_PLAYWRIGHT: ${{ steps.scope.outputs.playwright_tag }}
          IMAGE_TAG: posthog-benchmark:latest
        run: |
          set -euo pipefail
          start="$(date +%s)"
          ./run-boringcache-build.sh seed-cache
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

  scenario-builds:
    name: Scenario (${{ matrix.phase }}) (BoringCache)
    needs: seed-cache
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        phase: [warm1, warm2, stale-low, stale-mid, layer_miss]
    env:
      BORINGCACHE_SAVE_TOKEN: ''
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /

      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Checkout pinned upstream submodule shallowly
        run: |
          set -euo pipefail
          git submodule sync --recursive
          git -c protocol.version=2 submodule update --init --depth 1 --recommend-shallow --jobs 4 upstream

      - name: Prepare scenario source tree
        run: ./scripts/prepare-source.sh "${{ matrix.phase }}"

      - name: Install BoringCache CLI with boringcache/one
        uses: boringcache/one@v1
        with:
          setup: none
          mode: archive
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          cli-platform: debian-bookworm-amd64
          cache-runtime: false

      - name: Prepare benchmark build inputs
        id: scope
        run: |
          cp "$(which boringcache)" ./boringcache-bin

          run_suffix="r${GITHUB_RUN_ID}-a${GITHUB_RUN_ATTEMPT}"
          cache_scope="${BENCHMARK_ID}-run-${run_suffix}"
          docker_registry_tag="${BENCHMARK_ID}-docker-layers-${run_suffix}"
          pnpm_tag="posthog-pnpm-${run_suffix}"
          case "${TURBO_BACKEND}" in
            archive)
              turbo_tag="posthog-turbo-archive-${run_suffix}"
              turbo_plugin_tag="posthog-turbo-plugin-archive-${run_suffix}"
              ;;
            proxy|off)
              turbo_tag="posthog-turbo-${run_suffix}"
              turbo_plugin_tag="posthog-turbo-plugin-${run_suffix}"
              ;;
            *)
              echo "Unknown TURBO_BACKEND: ${TURBO_BACKEND}" >&2
              exit 1
              ;;
          esac
          node_scripts_tag="posthog-node-scripts-${run_suffix}"
          python_tag="posthog-python-${run_suffix}"
          staticfiles_tag="posthog-staticfiles-${run_suffix}"
          playwright_tag="posthog-playwright-${run_suffix}"
          internal_platform_suffix="debian-12-x86_64"
          purge_internal_tags_csv="${pnpm_tag}-${internal_platform_suffix},${turbo_tag},${turbo_plugin_tag},${node_scripts_tag}-${internal_platform_suffix},${python_tag}-${internal_platform_suffix},${staticfiles_tag}-${internal_platform_suffix},${playwright_tag}-${internal_platform_suffix}"
          purge_registry_tags_csv="${docker_registry_tag}"
          tags_csv="${pnpm_tag},${turbo_tag},${turbo_plugin_tag},${node_scripts_tag},${python_tag},${staticfiles_tag},${playwright_tag},${cache_scope},${docker_registry_tag}"
          echo "cache_scope=${cache_scope}" >> "$GITHUB_OUTPUT"
          echo "docker_registry_tag=${docker_registry_tag}" >> "$GITHUB_OUTPUT"
          echo "pnpm_tag=${pnpm_tag}" >> "$GITHUB_OUTPUT"
          echo "turbo_tag=${turbo_tag}" >> "$GITHUB_OUTPUT"
          echo "turbo_plugin_tag=${turbo_plugin_tag}" >> "$GITHUB_OUTPUT"
          echo "node_scripts_tag=${node_scripts_tag}" >> "$GITHUB_OUTPUT"
          echo "python_tag=${python_tag}" >> "$GITHUB_OUTPUT"
          echo "staticfiles_tag=${staticfiles_tag}" >> "$GITHUB_OUTPUT"
          echo "playwright_tag=${playwright_tag}" >> "$GITHUB_OUTPUT"
          echo "purge_internal_tags_csv=${purge_internal_tags_csv}" >> "$GITHUB_OUTPUT"
          echo "purge_registry_tags_csv=${purge_registry_tags_csv}" >> "$GITHUB_OUTPUT"
