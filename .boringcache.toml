workspace = "boringcache/benchmark-posthog"

# Docker BuildKit registry cache benchmark. The proxy is the only cache
# surface (boringcache/one mode=docker exporting --cache-from / --cache-to
# against the BoringCache OCI registry endpoint). The PostHog BuildKit lane can
# also pass Turbo through the explicit docker_tool_cache input. Managed
# mountcache experiments stay opt-in and are not declared here.
#
# This file is the canonical config anchor; durable entries can be declared
# here if a local-archive contract becomes part of the public benchmark surface.
