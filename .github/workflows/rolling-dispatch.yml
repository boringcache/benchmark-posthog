name: "Rolling Benchmark Dispatch"

on:
  workflow_dispatch:
    inputs:
      cli_version:
        description: "Optional BoringCache CLI release tag for canary runs, for example vcli-canary."
        required: false
        type: string
        default: ""
      prewarm_buildkit_image:
        description: "Optional managed BuildKit image override. Defaults to the stable managed channel."
        required: false
        type: string
        default: ""
      benchmark_id_suffix:
        description: "Optional suffix for isolated canary/cache scopes."
        required: false
        type: string
        default: ""
      lane_filter:
        description: "Optional lane filter forwarded to the benchmark workflow."
        required: false
        type: choice
        default: all
        options:
          - all
          - buildkit
      runner_label:
        description: "Optional GitHub Actions runner label override. Empty uses the benchmark platform defaults."
        required: false
        type: string
        default: ""
      state_canary:
        description: "Also dispatch the configured BuildKit state rolling canary on both native architectures."
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - ".gitmodules"
      - "upstream"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  dispatch:
    name: Dispatch rolling benchmark pair
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Dispatch rolling benchmark pair
        env:
          GH_TOKEN: ${{ github.token }}
          CLI_VERSION: ${{ inputs.cli_version || vars.POSTHOG_BORINGCACHE_CLI_VERSION || vars.BORINGCACHE_BENCHMARK_CLI_VERSION }}
          PREWARM_BUILDKIT_IMAGE: ${{ inputs.prewarm_buildkit_image || vars.POSTHOG_PREWARM_BUILDKIT_IMAGE || 'ghcr.io/boringcache/buildkit:v0.30.0-bc' }}
          BENCHMARK_ID_SUFFIX: ${{ inputs.benchmark_id_suffix || vars.POSTHOG_BENCHMARK_ID_SUFFIX }}
          LANE_FILTER: ${{ inputs.lane_filter || 'all' }}
          RUNNER_LABEL: ${{ inputs.runner_label }}
        run: |
          set -euo pipefail

          wait_for_cli_release() {
            local cli_version="$1"
            [[ -n "$cli_version" ]] || return 0

            local release_repo="${BORINGCACHE_CLI_RELEASE_REPOSITORY:-boringcache/cli}"
            local max_attempts="${BORINGCACHE_CLI_RELEASE_WAIT_ATTEMPTS:-60}"
            local attempt assets asset missing_assets
            for attempt in $(seq 1 "$max_attempts"); do
              assets="$(gh release view "$cli_version" --repo "$release_repo" --json assets --jq '.assets[].name' 2>/dev/null || true)"
              missing_assets=()
              for asset in boringcache-linux-amd64 SHA256SUMS; do
                if ! grep -Fxq "$asset" <<< "$assets"; then
                  missing_assets+=("$asset")
                fi
              done
              if ((${#missing_assets[@]} == 0)); then
                echo "Found ${release_repo}@${cli_version} canary assets."
                return 0
              fi
              echo "::notice::Waiting for ${release_repo}@${cli_version} assets: ${missing_assets[*]} (${attempt}/${max_attempts})"
              sleep 10
            done

            echo "::error::Timed out waiting for ${release_repo}@${cli_version} linux amd64 asset and SHA256SUMS." >&2
            exit 1
          }

          wait_for_cli_release "$CLI_VERSION"

          dispatch_workflow() {
            local workflow="$1"
            local attempt=1
            local max_attempts=3
            local args=()

            if [[ -n "${CLI_VERSION}" ]]; then
              args+=(-f "cli_version=${CLI_VERSION}")
            fi
            if [[ -n "${PREWARM_BUILDKIT_IMAGE}" ]]; then
              args+=(-f "prewarm_buildkit_image=${PREWARM_BUILDKIT_IMAGE}")
            fi
            if [[ -n "${BENCHMARK_ID_SUFFIX}" ]]; then
              args+=(-f "benchmark_id_suffix=${BENCHMARK_ID_SUFFIX}")
            fi
            if [[ -n "${LANE_FILTER}" && "${LANE_FILTER}" != "all" ]]; then
              args+=(-f "lane_filter=${LANE_FILTER}")
            fi
            if [[ -n "${RUNNER_LABEL}" ]]; then
              args+=(-f "runner_label=${RUNNER_LABEL}")
            fi

            until gh workflow run "$workflow" --repo "$GITHUB_REPOSITORY" --ref "${{ github.ref_name }}" "${args[@]}"; do
              if [[ "$attempt" -ge "$max_attempts" ]]; then
                echo "Failed to dispatch ${workflow} after ${attempt} attempts" >&2
                return 1
              fi
              echo "Dispatch failed for ${workflow}; retrying (${attempt}/${max_attempts})" >&2
              attempt=$((attempt + 1))
              sleep 5
            done
          }

          dispatch_workflow "posthog-benchmark.yml"

  dispatch-state-canary:
    name: Dispatch state canary (${{ matrix.cli_platform }})
    if: >-
      (github.event_name == 'push' && vars.POSTHOG_STATE_CANARY_ENABLED == 'true') ||
      (github.event_name == 'workflow_dispatch' && inputs.state_canary)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - cli_platform: linux-amd64
            runner_label: ubuntu-latest
          - cli_platform: linux-arm64
            runner_label: ubuntu-24.04-arm
    steps:
      - name: Checkout exact rolling source pointer
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Dispatch BuildKit state rolling canary
        env:
          GH_TOKEN: ${{ github.token }}
          STATE_CANARY_REF: ${{ github.ref_name }}
          STATE_CANARY_CLI_RELEASE_TAG: ${{ vars.POSTHOG_STATE_CANARY_CLI_RELEASE_TAG }}
          STATE_CANARY_CLI_ASSET_SHA256: ${{ matrix.cli_platform == 'linux-amd64' && vars.POSTHOG_STATE_CANARY_CLI_AMD64_SHA256 || vars.POSTHOG_STATE_CANARY_CLI_ARM64_SHA256 }}
          STATE_CANARY_PLATFORM: ${{ matrix.cli_platform }}
          STATE_CANARY_RUNNER_LABEL: ${{ matrix.runner_label }}
          STATE_CANARY_BUILDKIT_IMAGE: ${{ matrix.cli_platform == 'linux-amd64' && vars.POSTHOG_STATE_CANARY_BUILDKIT_AMD64_IMAGE || vars.POSTHOG_STATE_CANARY_BUILDKIT_ARM64_IMAGE }}
          STATE_CANARY_ROLLING_SCOPE: main
        run: ./scripts/dispatch-buildkit-state-rolling-canary.sh
