name: PostHog Exporter Composition
run-name: ${{ format('Exporter composition | {0} | {1}', inputs.phase, inputs.upstream_ref) }}

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: Exact PostHog commit to build
        required: true
        type: string
      phase:
        description: Seed a fresh remote cache or measure the next rolling commit
        required: true
        type: choice
        options:
          - seed
          - rolling
      cli_version:
        description: Exact immutable CLI release tag
        required: true
        type: string
        default: v1.13.92

permissions:
  contents: read

concurrency:
  group: posthog-exporter-composition
  cancel-in-progress: false

jobs:
  build:
    name: ${{ format('{0} {1} exporter', matrix.runner_size, matrix.composition) }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner_size: 8c
            runner: ubuntu-latest-8c-amd
            composition: pure
            mountcache_offloader: "0"
            cache_tag: posthog-exporter-composition-v1-pure-amd64-8c
          - runner_size: 8c
            runner: ubuntu-latest-8c-amd
            composition: mount
            mountcache_offloader: "1"
            cache_tag: posthog-exporter-composition-v1-mount-amd64-8c
          - runner_size: 16c
            runner: ubuntu-latest-l
            composition: pure
            mountcache_offloader: "0"
            cache_tag: posthog-exporter-composition-v1-pure-amd64-16c
          - runner_size: 16c
            runner: ubuntu-latest-l
            composition: mount
            mountcache_offloader: "1"
            cache_tag: posthog-exporter-composition-v1-mount-amd64-16c
    env:
      BORINGCACHE_API_URL: https://api.boringcache.com
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_GHCR_READ_USER: ${{ vars.BORINGCACHE_GHCR_READ_USER || github.actor }}
      BORINGCACHE_GHCR_READ_TOKEN: ${{ secrets.BORINGCACHE_GHCR_READ_TOKEN }}
      BORINGCACHE_BUILD_MAX_ATTEMPTS: "1"
      BORINGCACHE_REQUIRE_SERVER_SIGNATURE: "1"
      BORINGCACHE_BUILDKIT_MOUNTCACHE_OFFLOADER: ${{ matrix.mountcache_offloader }}
    steps:
      - name: Validate native runner architecture
        shell: bash
        run: |
          if [[ "$RUNNER_ARCH" != "X64" ]]; then
            echo "::error::Expected native X64, got ${RUNNER_ARCH}."
            exit 1
          fi

      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Free disk space
        shell: bash
        run: ./scripts/free-runner-disk.sh

      - name: Checkout exact PostHog source
        shell: bash
        env:
          POSTHOG_SOURCE: ${{ inputs.upstream_ref }}
        run: |
          set -euo pipefail
          [[ "$POSTHOG_SOURCE" =~ ^[0-9a-f]{40}$ ]] || {
            echo "upstream_ref must be an exact lowercase PostHog commit" >&2
            exit 1
          }
          git submodule sync --recursive
          git -c protocol.version=2 submodule update --init --depth 1 --recommend-shallow --jobs 4 upstream
          git -C upstream fetch --depth 1 origin "$POSTHOG_SOURCE"
          git -C upstream checkout --detach FETCH_HEAD
          test "$(git -C upstream rev-parse HEAD)" = "$POSTHOG_SOURCE"

      - name: Prepare behavior-safe PostHog source
        shell: bash
        run: ./scripts/prepare-source.sh base

      - name: Build with the complete BoringCache product wrapper
        uses: boringcache/one@one-canary-538e6473ac9f
        with:
          setup: none
          mode: docker
          workspace: boringcache/benchmark-posthog
          cli-version: ${{ inputs.cli_version }}
          cli-platform: linux-amd64
          cache-runtime: "false"
          cache-backend: boringcache
          managed-buildkit-image: ghcr.io/boringcache/buildkit@sha256:cfcc50779c981fa63ef4818e6744adfa642cc5fd00b60539def3458862739510
          cache-tag: ${{ matrix.cache_tag }}
          registry-tag: ${{ matrix.cache_tag }}
          working-directory: .
          context: upstream
          dockerfile: upstream/Dockerfile
          image: posthog-exporter-composition
          tags: ${{ format('{0}-{1}-{2}', matrix.composition, matrix.runner_size, github.run_id) }}
          platforms: linux/amd64
          load: "false"
          push: "false"
          provenance: "false"
          proxy-no-git: "true"
          proxy-no-platform: "true"
          no-platform: "true"
          save-policy: auto
          fail-on-cache-error: "true"
          require-oci-import-ready: ${{ inputs.phase == 'rolling' && 'true' || 'false' }}
          verify: wait
          verify-require-server-signature: "true"
          diagnostics: summary
          metadata-hints: ${{ format('benchmark=posthog-exporter-composition,phase={0},composition={1},runner_size={2}', inputs.phase, matrix.composition, matrix.runner_size) }}

      - name: Record fixture identity
        shell: bash
        run: |
          {
            echo "### ${{ matrix.runner_size }} ${{ matrix.composition }} exporter"
            echo
            echo "- Source: \`${{ inputs.upstream_ref }}\`"
            echo "- Phase: \`${{ inputs.phase }}\`"
            echo "- Runner: \`${{ matrix.runner }}\`"
            echo "- Mount-cache offloader: \`${{ matrix.mountcache_offloader }}\`"
            echo "- Docker tool cache: disabled"
            echo "- Full CLI wrapper evidence: required"
          } >> "$GITHUB_STEP_SUMMARY"
