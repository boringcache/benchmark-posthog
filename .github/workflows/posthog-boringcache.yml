                echo "Flushing proxy cache to backend..."
                stop_proxy
              fi
              # Dump proxy log for diagnostics
              echo "=== Proxy log (${mode}, last 200 lines) ==="
              tail -n 200 "$proxy_log" 2>/dev/null || true
              echo "=== End proxy log ==="
              break
            fi

            stop_proxy

            if [[ "$attempt" -ge "$max_attempts" ]]; then
              echo "Build (${mode}) failed after ${max_attempts} attempts" >&2
              tail -n 200 "$build_log" || true
              tail -n 400 "$proxy_log" || true
              exit "$status"
            fi

            if grep -Eq "$cache_export_pattern" "$build_log"; then
              echo "Detected registry blob finalize mismatch (attempt ${attempt}/${max_attempts}); restarting proxy and retrying..." >&2
            else
              echo "Build (${mode}) failed (attempt ${attempt}/${max_attempts}); retrying..." >&2
            fi

            attempt=$((attempt + 1))
            sleep 3
          done
          SH
          chmod +x ./run-boringcache-build.sh

      - name: Configure boringcache/one for Docker
        id: docker_cache
        uses: boringcache/one@v1
        with:
          cli-version: skip
          setup: none
          mode: docker
          docker-command: setup
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          cache-tag: ${{ needs.seed-cache.outputs.cache_scope }}
          registry-tag: ${{ steps.scope.outputs.docker_registry_tag }}
          proxy-no-git: 'true'
          read-only: true
          driver-opts: |
            network=host
          verbose: true
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}

      - name: Prune builder cache for isolated scenario
        run: docker buildx prune -f --builder "${{ steps.docker_cache.outputs.buildx-name }}"
      - name: Run warm build 1
        id: warm1_build
        if: matrix.phase == 'warm1'
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_INTERNAL_PROFILE: ${{ env.INTERNAL_PROFILE }}
          BORINGCACHE_PROXY_LOG_PATH: ${{ steps.docker_cache.outputs.proxy-log-path }}
          BORINGCACHE_PROXY_PORT: ${{ steps.docker_cache.outputs.proxy-port }}
          BUILDER: ${{ steps.docker_cache.outputs.buildx-name }}
          CACHE_SCOPE: ${{ needs.seed-cache.outputs.cache_scope }}
          BORINGCACHE_TAG_PNPM: ${{ steps.scope.outputs.pnpm_tag }}
          BORINGCACHE_TAG_TURBO: ${{ steps.scope.outputs.turbo_tag }}
          BORINGCACHE_TAG_TURBO_PLUGIN: ${{ steps.scope.outputs.turbo_plugin_tag }}
          BORINGCACHE_TAG_NODE_SCRIPTS: ${{ steps.scope.outputs.node_scripts_tag }}
          BORINGCACHE_TAG_PYTHON: ${{ steps.scope.outputs.python_tag }}
          BORINGCACHE_TAG_STATICFILES: ${{ steps.scope.outputs.staticfiles_tag }}
          BORINGCACHE_TAG_PLAYWRIGHT: ${{ steps.scope.outputs.playwright_tag }}
          IMAGE_TAG: posthog-benchmark:latest
        run: |
          set -euo pipefail
          start="$(date +%s)"
          ./run-boringcache-build.sh partial-warm
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Run warm build 2
        id: warm2_build
        if: matrix.phase == 'warm2'
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_INTERNAL_PROFILE: ${{ env.INTERNAL_PROFILE }}
          BORINGCACHE_PROXY_LOG_PATH: ${{ steps.docker_cache.outputs.proxy-log-path }}
          BORINGCACHE_PROXY_PORT: ${{ steps.docker_cache.outputs.proxy-port }}
          BUILDER: ${{ steps.docker_cache.outputs.buildx-name }}
          CACHE_SCOPE: ${{ needs.seed-cache.outputs.cache_scope }}
          BORINGCACHE_TAG_PNPM: ${{ steps.scope.outputs.pnpm_tag }}
          BORINGCACHE_TAG_TURBO: ${{ steps.scope.outputs.turbo_tag }}
          BORINGCACHE_TAG_TURBO_PLUGIN: ${{ steps.scope.outputs.turbo_plugin_tag }}
          BORINGCACHE_TAG_NODE_SCRIPTS: ${{ steps.scope.outputs.node_scripts_tag }}
          BORINGCACHE_TAG_PYTHON: ${{ steps.scope.outputs.python_tag }}
          BORINGCACHE_TAG_STATICFILES: ${{ steps.scope.outputs.staticfiles_tag }}
          BORINGCACHE_TAG_PLAYWRIGHT: ${{ steps.scope.outputs.playwright_tag }}
          IMAGE_TAG: posthog-benchmark:latest
        run: |
          set -euo pipefail
          start="$(date +%s)"
          ./run-boringcache-build.sh partial-warm
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Run stale-low build (committed source change, partial warm)
        id: stale_low_build
        if: matrix.phase == 'stale-low'
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_INTERNAL_PROFILE: ${{ env.INTERNAL_PROFILE }}
          BORINGCACHE_PROXY_LOG_PATH: ${{ steps.docker_cache.outputs.proxy-log-path }}
          BORINGCACHE_PROXY_PORT: ${{ steps.docker_cache.outputs.proxy-port }}
          BUILDER: ${{ steps.docker_cache.outputs.buildx-name }}
          CACHE_SCOPE: ${{ needs.seed-cache.outputs.cache_scope }}
          BORINGCACHE_TAG_PNPM: ${{ steps.scope.outputs.pnpm_tag }}
          BORINGCACHE_TAG_TURBO: ${{ steps.scope.outputs.turbo_tag }}
          BORINGCACHE_TAG_TURBO_PLUGIN: ${{ steps.scope.outputs.turbo_plugin_tag }}
          BORINGCACHE_TAG_NODE_SCRIPTS: ${{ steps.scope.outputs.node_scripts_tag }}
          BORINGCACHE_TAG_PYTHON: ${{ steps.scope.outputs.python_tag }}
          BORINGCACHE_TAG_STATICFILES: ${{ steps.scope.outputs.staticfiles_tag }}
          BORINGCACHE_TAG_PLAYWRIGHT: ${{ steps.scope.outputs.playwright_tag }}
          IMAGE_TAG: posthog-benchmark:latest
        run: |
          set -euo pipefail
          start="$(date +%s)"
          ./run-boringcache-build.sh partial-warm
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Run stale-mid build (committed package descriptor change, partial warm)
        id: stale_mid_build
        if: matrix.phase == 'stale-mid'
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_INTERNAL_PROFILE: ${{ env.INTERNAL_PROFILE }}
          BORINGCACHE_PROXY_LOG_PATH: ${{ steps.docker_cache.outputs.proxy-log-path }}
          BORINGCACHE_PROXY_PORT: ${{ steps.docker_cache.outputs.proxy-port }}
          BUILDER: ${{ steps.docker_cache.outputs.buildx-name }}
          CACHE_SCOPE: ${{ needs.seed-cache.outputs.cache_scope }}
          BORINGCACHE_TAG_PNPM: ${{ steps.scope.outputs.pnpm_tag }}
          BORINGCACHE_TAG_TURBO: ${{ steps.scope.outputs.turbo_tag }}
          BORINGCACHE_TAG_TURBO_PLUGIN: ${{ steps.scope.outputs.turbo_plugin_tag }}
          BORINGCACHE_TAG_NODE_SCRIPTS: ${{ steps.scope.outputs.node_scripts_tag }}
          BORINGCACHE_TAG_PYTHON: ${{ steps.scope.outputs.python_tag }}
          BORINGCACHE_TAG_STATICFILES: ${{ steps.scope.outputs.staticfiles_tag }}
          BORINGCACHE_TAG_PLAYWRIGHT: ${{ steps.scope.outputs.playwright_tag }}
          IMAGE_TAG: posthog-benchmark:latest
        run: |
          set -euo pipefail
          start="$(date +%s)"
          ./run-boringcache-build.sh partial-warm
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Run layer-miss build (no Docker cache, full image)
        id: internal_only_build
        if: matrix.phase == 'layer_miss'
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_INTERNAL_PROFILE: ${{ env.INTERNAL_PROFILE }}
          BORINGCACHE_PROXY_LOG_PATH: ${{ steps.docker_cache.outputs.proxy-log-path }}
          BORINGCACHE_PROXY_PORT: ${{ steps.docker_cache.outputs.proxy-port }}
          BUILDER: ${{ steps.docker_cache.outputs.buildx-name }}
          CACHE_SCOPE: ${{ needs.seed-cache.outputs.cache_scope }}
          BORINGCACHE_TAG_PNPM: ${{ steps.scope.outputs.pnpm_tag }}
          BORINGCACHE_TAG_TURBO: ${{ steps.scope.outputs.turbo_tag }}
          BORINGCACHE_TAG_TURBO_PLUGIN: ${{ steps.scope.outputs.turbo_plugin_tag }}
          BORINGCACHE_TAG_NODE_SCRIPTS: ${{ steps.scope.outputs.node_scripts_tag }}
          BORINGCACHE_TAG_PYTHON: ${{ steps.scope.outputs.python_tag }}
          BORINGCACHE_TAG_STATICFILES: ${{ steps.scope.outputs.staticfiles_tag }}
          BORINGCACHE_TAG_PLAYWRIGHT: ${{ steps.scope.outputs.playwright_tag }}
          IMAGE_TAG: posthog-benchmark:latest
        run: |
          set -euo pipefail
          start="$(date +%s)"
          ./run-boringcache-build.sh internal-only
          end="$(date +%s)"
          echo "seconds=$((end - start))" >> "$GITHUB_OUTPUT"

      - name: Capture scenario timing
        id: phase_timing
        run: |
          set -euo pipefail
          seconds=""
          case "${{ matrix.phase }}" in
            warm1)
              seconds="${{ steps.warm1_build.outputs.seconds }}"
              ;;
            warm2)
              seconds="${{ steps.warm2_build.outputs.seconds }}"
              ;;
            stale-low)
              seconds="${{ steps.stale_low_build.outputs.seconds }}"
              ;;
            stale-mid)
              seconds="${{ steps.stale_mid_build.outputs.seconds }}"
              ;;
            layer_miss)
              seconds="${{ steps.internal_only_build.outputs.seconds }}"
              ;;
            *)
              echo "Unknown phase: ${{ matrix.phase }}" >&2
              exit 1
              ;;
          esac
          if [[ -z "${seconds}" ]]; then
            echo "No timing captured for phase ${{ matrix.phase }}" >&2
            exit 1
          fi
          echo "seconds=${seconds}" >> "$GITHUB_OUTPUT"
      - name: Persist scenario timing artifact
        run: |
          set -euo pipefail
          mkdir -p benchmark-phase
          cat > "benchmark-phase/${{ matrix.phase }}.env" <<EOF
          phase=${{ matrix.phase }}
          seconds=${{ steps.phase_timing.outputs.seconds }}
          EOF
      - name: Upload scenario timing artifact
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-phase-${{ env.BENCHMARK_ID }}-boringcache-${{ matrix.phase }}
          path: benchmark-phase/${{ matrix.phase }}.env
          if-no-files-found: error

  finalize-benchmark:
    name: Finalize benchmark artifacts
    needs: [seed-cache, scenario-builds]
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout benchmark repo helpers
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          path: .benchmark-config

      - name: Install BoringCache CLI with boringcache/one
        uses: boringcache/one@v1
        with:
          setup: none
          mode: archive
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          cli-platform: debian-bookworm-amd64
          cache-runtime: false

      - name: Download scenario timing artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: benchmark-phase-${{ env.BENCHMARK_ID }}-boringcache-*
          path: benchmark-phase
          merge-multiple: true
      - name: Collect scenario timings
        id: timings
        run: |
          set -euo pipefail
          parse_phase() {
            local phase="$1"
            local file="benchmark-phase/${phase}.env"
            if [[ ! -f "$file" ]]; then
              echo "Missing timing artifact for phase ${phase}" >&2
              ls -R benchmark-phase || true
              exit 1
            fi
            local seconds
            seconds="$(grep "^seconds=" "$file" | head -n1 | cut -d= -f2-)"
            if [[ -z "${seconds}" ]]; then
              echo "Timing artifact for phase ${phase} has empty seconds" >&2
              cat "$file" >&2
              exit 1
            fi
            local key="${phase//-/_}"
            echo "${key}_seconds=${seconds}" >> "$GITHUB_OUTPUT"
          }
          parse_phase warm1
          parse_phase warm2
          parse_phase stale-low
          parse_phase stale-mid
          parse_phase layer_miss
      - name: Measure BoringCache storage usage
        id: cache_size
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
        run: |
          tags_csv="${{ needs.seed-cache.outputs.tags_csv }}"
          bytes="$(.benchmark-config/scripts/sum-boringcache-check-sizes.sh "$BENCHMARK_WORKSPACE" "$tags_csv")"
          echo "bytes=${bytes}" >> "$GITHUB_OUTPUT"

      - name: Write benchmark artifacts
        id: artifact_files
        run: |
          .benchmark-config/scripts/write-benchmark-artifacts.sh \
            --benchmark "$BENCHMARK_ID" \
            --strategy "boringcache" \
            --project-repo "$PROJECT_REPO" \
            --project-ref "$PROJECT_REF" \
            --cold-seconds "${{ needs.seed-cache.outputs.cold_seconds }}" \
            --warm1-seconds "${{ steps.timings.outputs.warm1_seconds }}" \
            --warm2-seconds "${{ steps.timings.outputs.warm2_seconds }}" \
            --stale-low-seconds "${{ steps.timings.outputs.stale_low_seconds }}" \
            --stale-mid-seconds "${{ steps.timings.outputs.stale_mid_seconds }}" \
            --layer-miss-seconds "${{ steps.timings.outputs.layer_miss_seconds }}" \
            --cache-storage-bytes "${{ steps.cache_size.outputs.bytes }}" \
            --cache-storage-source "boringcache-check" \
            --bytes-uploaded "${{ steps.cache_size.outputs.bytes }}" \
            --hit-behavior-note "Source tree comes from the pinned upstream submodule ${PROJECT_REPO}@${PROJECT_REF} in this benchmark repo. Cold+seed runs the base tree from empty BC tags and empty Docker layer cache, using --no-cache + cache-to via the BC registry proxy (mode=max) while internal pnpm, Python, staticfiles, and Playwright caches restore/save through BoringCache. Turbo uses the ${TURBO_BACKEND} backend for this run: proxy uses BoringCache cache-registry, archive saves and restores Turbo local .turbo cache through CLI restore/save, and off disables BoringCache Turbo integration. Warm1/Warm2 reuse the same pinned base tree with cache-from only, internal restore enabled, internal save disabled, and read-only behavior where applicable. Stale-low applies the committed scenarios/stale-low.patch source-only change to the pinned tree. Stale-mid applies the committed scenarios/stale-mid.patch package.json change to the pinned tree. Both stale phases rebuild with cache-from only and internal restore enabled but no internal save. Layer-miss rebuilds the pinned base tree with --no-cache while internal restore stays enabled and internal save stays disabled. All scenario phases run as isolated matrix jobs on fresh runners with buildx pruned before building."

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-${{ env.BENCHMARK_ID }}-boringcache
          path: |
            ${{ steps.artifact_files.outputs.json_path }}
            ${{ steps.artifact_files.outputs.md_path }}
          if-no-files-found: error

      - name: Publish summary
        run: cat "${{ steps.artifact_files.outputs.md_path }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Storage comparison with GHA cache
        if: always() && steps.cache_size.outputs.bytes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bc_bytes="${{ steps.cache_size.outputs.bytes }}"

          # Query GHA cache usage for this repo
          gha_bytes="$(gh api "repos/${GITHUB_REPOSITORY}/actions/cache/usage" --jq '.active_caches_size_in_bytes' 2>/dev/null)" || {
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "_Storage comparison skipped (GHA API unreachable)_" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          }

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Storage comparison" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cache | Storage | Notes |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| BoringCache | $(numfmt --to=iec-i --suffix=B "${bc_bytes}") | PostHog benchmark tags (content-addressed, deduped across branches) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GitHub Actions | $(numfmt --to=iec-i --suffix=B "${gha_bytes}") | Repo total (buildkit blobs shared across projects, no cross-branch dedup) |" >> "$GITHUB_STEP_SUMMARY"
