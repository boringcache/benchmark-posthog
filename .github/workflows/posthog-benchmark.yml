name: "PostHog Benchmark"
run-name: >-
  ${{ format('Benchmark Rolling | {0}', github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || github.event_name == 'schedule' && 'Scheduled' || format('Manual dispatch ({0})', github.ref_name)) }}

on:
  workflow_dispatch:
    inputs:
      prewarm_buildkit_image:
        description: "Optional experimental BuildKit image. When set, the rolling matrix includes BC BuildKit backend lanes."
        required: false
        type: string
        default: ""
      benchmark_id_suffix:
        description: "Optional suffix appended to built-in benchmark/cache scopes for isolated comparison runs."
        required: false
        type: string
        default: ""
      upstream_ref:
        description: "Optional PostHog ref/SHA to benchmark instead of the pinned upstream submodule commit."
        required: false
        type: string
        default: ""
      lane_filter:
        description: "Optional manual-dispatch lane filter."
        required: false
        type: choice
        default: all
        options:
          - all
          - buildkit
  schedule:
    - cron: "0 3 * * 3"
  pull_request:
    paths:
      - ".gitmodules"
      - ".github/actions/docker-rolling-benchmark/**"
      - ".github/workflows/posthog-benchmark.yml"
      - ".github/workflows/reusable-docker-buildkit-benchmark.yml"
      - "README.md"
      - "scenarios/**"
      - "scripts/**"
      - "upstream"

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && github.run_id || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write
  id-token: write
  packages: read

jobs:
  docker-benchmark:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: GHA
            strategy: actions-cache
            artifact_strategy: ""
            benchmark_id: posthog
            buildkit_backend: registry
            buildkit_cache_backend: ""
            dockerfile_path: upstream/Dockerfile
            docker_tool_cache: ""
            buildkit_mountcache_offloader: false
            lane_filter: default
            run_on_pull_request: true
            requires_buildkit_image: false
          - label: ECR
            strategy: ecr-cache
            artifact_strategy: ecr-cache
            benchmark_id: posthog
            buildkit_backend: registry
            buildkit_cache_backend: ""
            dockerfile_path: upstream/Dockerfile
            docker_tool_cache: ""
            buildkit_mountcache_offloader: false
            lane_filter: default
            run_on_pull_request: false
            requires_buildkit_image: false
          - label: BC OCI
            strategy: boringcache
            artifact_strategy: ""
            buildkit_backend: registry
            buildkit_cache_backend: ""
            benchmark_id: posthog
            dockerfile_path: upstream/Dockerfile
            docker_tool_cache: ""
            buildkit_mountcache_offloader: false
            lane_filter: default
            run_on_pull_request: true
            requires_buildkit_image: false
          - label: BC OCI + toolcache
            strategy: boringcache
            artifact_strategy: ""
            buildkit_backend: registry
            buildkit_cache_backend: ""
            benchmark_id: posthog-oci-toolcache
            dockerfile_path: scenarios/posthog-toolcache/Dockerfile
            docker_tool_cache: turbo
            buildkit_mountcache_offloader: false
            lane_filter: default
            run_on_pull_request: true
            requires_buildkit_image: false
          - label: BC BuildKit Backend
            strategy: boringcache
            artifact_strategy: ""
            buildkit_backend: registry
            buildkit_cache_backend: boringcache
            benchmark_id: posthog-bc-buildkit-mountcache
            dockerfile_path: upstream/Dockerfile
            docker_tool_cache: ""
            buildkit_mountcache_offloader: false
            lane_filter: buildkit
            run_on_pull_request: false
            requires_buildkit_image: true
          - label: BC BuildKit Backend + toolcache
            strategy: boringcache
            artifact_strategy: ""
            buildkit_backend: registry
            buildkit_cache_backend: boringcache
            benchmark_id: posthog-bc-buildkit-toolcache-mountcache
            dockerfile_path: scenarios/posthog-toolcache/Dockerfile
            docker_tool_cache: turbo
            buildkit_mountcache_offloader: false
            lane_filter: buildkit
            run_on_pull_request: false
            requires_buildkit_image: true
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_GHCR_READ_USER: ${{ vars.BORINGCACHE_GHCR_READ_USER || github.actor }}
      BORINGCACHE_GHCR_READ_TOKEN: ${{ secrets.BORINGCACHE_GHCR_READ_TOKEN }}
      PREWARM_BUILDKIT_IMAGE: ${{ inputs.prewarm_buildkit_image || vars.POSTHOG_PREWARM_BUILDKIT_IMAGE }}
    steps:
      - name: Skip disabled lane
        if: ${{ (github.event_name == 'pull_request' && !matrix.run_on_pull_request) || (matrix.requires_buildkit_image && env.PREWARM_BUILDKIT_IMAGE == '') || (github.event_name == 'workflow_dispatch' && inputs.lane_filter != 'all' && inputs.lane_filter != matrix.lane_filter) }}
        shell: bash
        run: |
          echo "Skipping ${{ matrix.label }} for this event/configuration."

      - name: Checkout benchmark repo
        if: ${{ (github.event_name != 'pull_request' || matrix.run_on_pull_request) && (!matrix.requires_buildkit_image || env.PREWARM_BUILDKIT_IMAGE != '') && (github.event_name != 'workflow_dispatch' || inputs.lane_filter == 'all' || inputs.lane_filter == matrix.lane_filter) }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Free disk space
        if: ${{ (github.event_name != 'pull_request' || matrix.run_on_pull_request) && (!matrix.requires_buildkit_image || env.PREWARM_BUILDKIT_IMAGE != '') && (github.event_name != 'workflow_dispatch' || inputs.lane_filter == 'all' || inputs.lane_filter == matrix.lane_filter) }}
        shell: bash
        run: ./scripts/free-runner-disk.sh

      - name: ${{ matrix.label }}
        if: ${{ (github.event_name != 'pull_request' || matrix.run_on_pull_request) && (!matrix.requires_buildkit_image || env.PREWARM_BUILDKIT_IMAGE != '') && (github.event_name != 'workflow_dispatch' || inputs.lane_filter == 'all' || inputs.lane_filter == matrix.lane_filter) }}
        uses: ./.github/actions/docker-rolling-benchmark
        env:
          BORINGCACHE_OCI_DEMAND_PREFETCH: ${{ matrix.buildkit_cache_backend == 'boringcache' && 'false' || '' }}
          BORINGCACHE_BUILDKIT_MOUNTCACHE_OFFLOADER: ${{ matrix.buildkit_mountcache_offloader && '1' || '' }}
        with:
          strategy: ${{ matrix.strategy }}
          artifact_strategy: ${{ matrix.artifact_strategy }}
          buildkit_backend: ${{ matrix.buildkit_backend }}
          buildkit_cache_backend: ${{ matrix.buildkit_cache_backend }}
          buildkit_mountcache_offloader: ${{ matrix.buildkit_mountcache_offloader }}
          buildkit_image: ${{ matrix.requires_buildkit_image && env.PREWARM_BUILDKIT_IMAGE || 'mirror.gcr.io/moby/buildkit:buildx-stable-1' }}
          benchmark_id: ${{ format('{0}{1}', matrix.benchmark_id, inputs.benchmark_id_suffix) }}
          project_repo: PostHog/posthog
          project_ref: ${{ inputs.upstream_ref }}
          dockerfile_path: ${{ matrix.dockerfile_path }}
          docker_context: upstream
          image_tag: posthog-benchmark:latest
          cli_platform: linux-amd64
          benchmark_workspace: ${{ github.repository }}
          docker_tool_cache: ${{ matrix.docker_tool_cache }}
          ecr_region: ${{ vars.DOCKER_BENCHMARK_ECR_REGION || 'us-east-1' }}
          ecr_role_arn: ${{ vars.DOCKER_BENCHMARK_ECR_ROLE_ARN }}
          ecr_registry: ${{ vars.DOCKER_BENCHMARK_ECR_REGISTRY }}
          ecr_repository: ${{ vars.DOCKER_BENCHMARK_ECR_REPOSITORY }}
