name: "PostHog Benchmark"
run-name: >-
  ${{ format('Benchmark Rolling | {0} | {1}', github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || github.event_name == 'schedule' && 'Scheduled' || format('Manual dispatch ({0})', github.ref_name), inputs.runner_label || 'platform defaults') }}

on:
  workflow_dispatch:
    inputs:
      prewarm_buildkit_image:
        description: "Optional managed BuildKit image override. Defaults to the stable managed channel."
        required: false
        type: string
        default: ""
      prewarm_buildkit_image_arm64:
        description: "Optional arm64 BuildKit image override when the primary image is an amd64-only digest."
        required: false
        type: string
        default: ""
      cli_version:
        description: "Optional BoringCache CLI release tag for canary runs, for example vcli-canary."
        required: false
        type: string
        default: ""
      benchmark_id_suffix:
        description: "Optional suffix appended to built-in benchmark/cache scopes for isolated comparison runs."
        required: false
        type: string
        default: ""
      cache_scope_ref_slug:
        description: "Optional cache-scope ref slug to replay against, for example main."
        required: false
        type: string
        default: ""
      build_mode:
        description: "Benchmark script mode for BoringCache lanes."
        required: false
        type: choice
        default: full
        options:
          - full
          - partial-warm
      turbo_cache_mounts:
        description: "Patch the prepared PostHog Dockerfile to mount Turbo cache directories."
        required: false
        type: boolean
        default: false
      force_turbo_exec:
        description: "Force PostHog Turbo stages to execute while keeping source inputs stable, useful for tool-cache canary probes."
        required: false
        type: boolean
        default: false
      upstream_ref:
        description: "Optional PostHog ref/SHA to benchmark instead of the pinned upstream submodule commit."
        required: false
        type: string
        default: ""
      lane_filter:
        description: "Optional manual-dispatch lane filter."
        required: false
        type: choice
        default: all
        options:
          - all
          - buildkit
      runner_label:
        description: "Optional native runner label override. It must match the selected platform; empty uses the benchmark defaults."
        required: false
        type: string
        default: ""
      platform_filter:
        description: "Optional manual-dispatch platform filter."
        required: false
        type: choice
        default: all
        options:
          - all
          - amd64
          - arm64
  schedule:
    - cron: "0 3 * * 3"
  pull_request:
    paths:
      - ".gitmodules"
      - ".github/actions/docker-rolling-benchmark/**"
      - ".github/workflows/posthog-benchmark.yml"
      - ".github/workflows/reusable-docker-buildkit-benchmark.yml"
      - "README.md"
      - "scenarios/**"
      - "scripts/**"
      - "upstream"

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && github.run_id || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write
  packages: read

jobs:
  docker-benchmark:
    name: ${{ format('{0} {1}', matrix.lane.label, matrix.platform.label) }}
    # Apply a manual runner override only to the matrix entries that will run.
    # Disabled entries should use their cheap defaults and exit immediately.
    runs-on: ${{ github.event_name == 'workflow_dispatch' && (inputs.platform_filter == 'all' || inputs.platform_filter == matrix.platform.label) && (inputs.lane_filter == 'all' || inputs.lane_filter == matrix.lane.lane_filter) && inputs.runner_label || matrix.platform.runner_label }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        platform:
          - label: amd64
            runner_label: ubuntu-latest
            cli_platform: linux-amd64
            docker_platform: linux/amd64
            benchmark_id_prefix: ""
            setup_qemu: false
        lane:
          - label: GHA
            strategy: actions-cache
            artifact_strategy: ""
            benchmark_id: posthog
            buildkit_backend: registry
            buildkit_cache_backend: ""
            dockerfile_path: upstream/Dockerfile
            docker_tool_cache: ""
            buildkit_mountcache_offloader: false
            turbo_cache_mounts: false
            lane_filter: default
            run_on_pull_request: true
          - label: BC OCI
            strategy: boringcache
            artifact_strategy: ""
            buildkit_backend: registry
            buildkit_cache_backend: ""
            benchmark_id: posthog
            dockerfile_path: upstream/Dockerfile
            docker_tool_cache: ""
            buildkit_mountcache_offloader: false
            turbo_cache_mounts: false
            lane_filter: default
            run_on_pull_request: true
          - label: BC BuildKit Backend
            strategy: boringcache
            artifact_strategy: ""
            buildkit_backend: registry
            buildkit_cache_backend: boringcache
            benchmark_id: posthog-bc-buildkit
            dockerfile_path: upstream/Dockerfile
            # PostHog's Turbo build inputs omit frontend/public, so remote hits
            # can restore stale static assets. Keep the graduated lane on the
            # behavior-safe managed exporter defaults.
            docker_tool_cache: ""
            buildkit_mountcache_offloader: false
            turbo_cache_mounts: false
            lane_filter: buildkit
            run_on_pull_request: false
        include:
          - platform:
              label: arm64
              runner_label: ubuntu-24.04-arm
              cli_platform: linux-arm64
              docker_platform: linux/arm64
              benchmark_id_prefix: arm-
              setup_qemu: false
            lane:
              label: BC BuildKit Backend
              strategy: boringcache
              artifact_strategy: ""
              buildkit_backend: registry
              buildkit_cache_backend: boringcache
              benchmark_id: posthog-bc-buildkit
              dockerfile_path: upstream/Dockerfile
              # Keep ARM behavior-identical to AMD; see the lane above.
              docker_tool_cache: ""
              buildkit_mountcache_offloader: false
              turbo_cache_mounts: false
              lane_filter: buildkit
              run_on_pull_request: false
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_GHCR_READ_USER: ${{ vars.BORINGCACHE_GHCR_READ_USER || github.actor }}
      BORINGCACHE_GHCR_READ_TOKEN: ${{ secrets.BORINGCACHE_GHCR_READ_TOKEN }}
      PREWARM_BUILDKIT_IMAGE: ${{ matrix.platform.cli_platform == 'linux-arm64' && (inputs.prewarm_buildkit_image_arm64 || vars.POSTHOG_PREWARM_BUILDKIT_IMAGE_ARM64 || inputs.prewarm_buildkit_image || vars.POSTHOG_PREWARM_BUILDKIT_IMAGE || 'ghcr.io/boringcache/buildkit:v0.30.0-bc') || (inputs.prewarm_buildkit_image || vars.POSTHOG_PREWARM_BUILDKIT_IMAGE || 'ghcr.io/boringcache/buildkit:v0.30.0-bc') }}
      BORINGCACHE_CLI_VERSION: ${{ inputs.cli_version || vars.POSTHOG_BORINGCACHE_CLI_VERSION || vars.BORINGCACHE_BENCHMARK_CLI_VERSION }}
    steps:
      - name: Skip disabled lane
        if: ${{ (github.event_name == 'pull_request' && !matrix.lane.run_on_pull_request) || (github.event_name == 'workflow_dispatch' && inputs.lane_filter != 'all' && inputs.lane_filter != matrix.lane.lane_filter) || (github.event_name == 'workflow_dispatch' && inputs.platform_filter != 'all' && inputs.platform_filter != matrix.platform.label) }}
        shell: bash
        run: |
          echo "Skipping ${{ matrix.lane.label }} ${{ matrix.platform.label }} for this event/configuration."

      - name: Validate native runner architecture
        if: ${{ (github.event_name != 'pull_request' || matrix.lane.run_on_pull_request) && (github.event_name != 'workflow_dispatch' || inputs.lane_filter == 'all' || inputs.lane_filter == matrix.lane.lane_filter) && (github.event_name != 'workflow_dispatch' || inputs.platform_filter == 'all' || inputs.platform_filter == matrix.platform.label) }}
        shell: bash
        env:
          CLI_PLATFORM: ${{ matrix.platform.cli_platform }}
        run: |
          case "${CLI_PLATFORM}:${RUNNER_ARCH}" in
            linux-amd64:X64|linux-arm64:ARM64)
              ;;
            *)
              echo "::error::Runner architecture ${RUNNER_ARCH} does not match ${CLI_PLATFORM}. Choose a native runner label for this platform."
              exit 1
              ;;
          esac

      - name: Checkout benchmark repo
        if: ${{ (github.event_name != 'pull_request' || matrix.lane.run_on_pull_request) && (github.event_name != 'workflow_dispatch' || inputs.lane_filter == 'all' || inputs.lane_filter == matrix.lane.lane_filter) && (github.event_name != 'workflow_dispatch' || inputs.platform_filter == 'all' || inputs.platform_filter == matrix.platform.label) }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Free disk space
        if: ${{ (github.event_name != 'pull_request' || matrix.lane.run_on_pull_request) && (github.event_name != 'workflow_dispatch' || inputs.lane_filter == 'all' || inputs.lane_filter == matrix.lane.lane_filter) && (github.event_name != 'workflow_dispatch' || inputs.platform_filter == 'all' || inputs.platform_filter == matrix.platform.label) }}
        shell: bash
        run: ./scripts/free-runner-disk.sh

      - name: Set up QEMU for arm64 Docker builds
        if: ${{ matrix.platform.setup_qemu && (github.event_name != 'pull_request' || matrix.lane.run_on_pull_request) && (github.event_name != 'workflow_dispatch' || inputs.lane_filter == 'all' || inputs.lane_filter == matrix.lane.lane_filter) && (github.event_name != 'workflow_dispatch' || inputs.platform_filter == 'all' || inputs.platform_filter == matrix.platform.label) }}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: ${{ format('{0} {1}', matrix.lane.label, matrix.platform.label) }}
        if: ${{ (github.event_name != 'pull_request' || matrix.lane.run_on_pull_request) && (github.event_name != 'workflow_dispatch' || inputs.lane_filter == 'all' || inputs.lane_filter == matrix.lane.lane_filter) && (github.event_name != 'workflow_dispatch' || inputs.platform_filter == 'all' || inputs.platform_filter == matrix.platform.label) }}
        uses: ./.github/actions/docker-rolling-benchmark
        env:
          BORINGCACHE_BUILDKIT_MOUNTCACHE_OFFLOADER: ${{ matrix.lane.buildkit_mountcache_offloader && '1' || '' }}
        with:
          strategy: ${{ matrix.lane.strategy }}
          artifact_strategy: ${{ matrix.lane.artifact_strategy }}
          buildkit_backend: ${{ matrix.lane.buildkit_backend }}
          buildkit_cache_backend: ${{ matrix.lane.buildkit_cache_backend }}
          buildkit_mountcache_offloader: ${{ matrix.lane.buildkit_mountcache_offloader }}
          build_mode: ${{ inputs.build_mode || 'full' }}
          cache_scope_ref_slug: ${{ inputs.cache_scope_ref_slug }}
          turbo_cache_mounts: ${{ matrix.lane.turbo_cache_mounts && 'true' || 'false' }}
          buildkit_image: ${{ matrix.lane.buildkit_cache_backend == 'boringcache' && env.PREWARM_BUILDKIT_IMAGE || 'mirror.gcr.io/moby/buildkit:buildx-stable-1' }}
          benchmark_id: ${{ format('{0}{1}{2}', matrix.platform.benchmark_id_prefix, matrix.lane.benchmark_id, inputs.benchmark_id_suffix) }}
          docker_platform: ${{ matrix.platform.docker_platform }}
          docker_build_args: |-
            ${{ inputs.force_turbo_exec && '--no-cache-filter' || '' }}
            ${{ inputs.force_turbo_exec && 'frontend-build' || '' }}
            ${{ inputs.force_turbo_exec && '--no-cache-filter' || '' }}
            ${{ inputs.force_turbo_exec && 'node-scripts-build' || '' }}
          project_repo: PostHog/posthog
          project_ref: ${{ inputs.upstream_ref }}
          dockerfile_path: ${{ matrix.lane.dockerfile_path }}
          docker_context: upstream
          image_tag: posthog-benchmark:latest
          cli_version: ${{ env.BORINGCACHE_CLI_VERSION }}
          cli_platform: ${{ matrix.platform.cli_platform }}
          benchmark_workspace: ${{ github.repository }}
          docker_tool_cache: ${{ matrix.lane.docker_tool_cache }}
