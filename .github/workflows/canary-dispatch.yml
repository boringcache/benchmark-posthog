name: "Canary Benchmark Dispatch"

on:
  workflow_dispatch:
  push:
    branches:
      - prefetch-ranged-canary
    inputs:
      cli_version:
        description: "BoringCache CLI release tag to test."
        required: false
        type: string
        default: vcli-canary
      prewarm_buildkit_image:
        description: "BuildKit image to test for managed backend lanes."
        required: false
        type: string
        default: ghcr.io/boringcache/buildkit:canary
      benchmark_id_suffix:
        description: "Stable suffix for canary/cache scopes. Change only for isolated comparison runs."
        required: false
        type: string
        default: -canary
      upstream_ref:
        description: "Optional PostHog ref/SHA. Empty uses the pinned upstream submodule ref."
        required: false
        type: string
        default: ""
      lane_filter:
        description: "Lane filter for the canary comparison."
        required: false
        type: choice
        default: all
        options:
          - all
          - buildkit
      runner_label:
        description: "GitHub Actions runner label for benchmark jobs."
        required: false
        type: string
        default: ubuntu-latest

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  dispatch:
    name: Dispatch stable canary comparison
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Dispatch PostHog canary comparison
        env:
          GH_TOKEN: ${{ github.token }}
          CLI_VERSION: ${{ inputs.cli_version || vars.POSTHOG_BORINGCACHE_CLI_VERSION || vars.BORINGCACHE_BENCHMARK_CLI_VERSION || 'vcli-canary' }}
          PREWARM_BUILDKIT_IMAGE: ${{ inputs.prewarm_buildkit_image || vars.POSTHOG_PREWARM_BUILDKIT_IMAGE || 'ghcr.io/boringcache/buildkit:canary' }}
          BENCHMARK_ID_SUFFIX: ${{ inputs.benchmark_id_suffix || vars.POSTHOG_CANARY_BENCHMARK_ID_SUFFIX || '-canary' }}
          UPSTREAM_REF: ${{ inputs.upstream_ref }}
          LANE_FILTER: ${{ inputs.lane_filter || 'all' }}
          RUNNER_LABEL: ${{ inputs.runner_label || 'ubuntu-latest' }}
        run: |
          set -euo pipefail

          wait_for_cli_release() {
            local cli_version="$1"
            [[ -n "$cli_version" ]] || return 0

            local release_repo="${BORINGCACHE_CLI_RELEASE_REPOSITORY:-boringcache/cli}"
            local max_attempts="${BORINGCACHE_CLI_RELEASE_WAIT_ATTEMPTS:-60}"
            local attempt assets
            for attempt in $(seq 1 "$max_attempts"); do
              assets="$(gh release view "$cli_version" --repo "$release_repo" --json assets --jq '.assets[].name' 2>/dev/null || true)"
              if grep -Fxq boringcache-linux-amd64 <<< "$assets" && grep -Fxq SHA256SUMS <<< "$assets"; then
                echo "Found ${release_repo}@${cli_version} canary assets."
                return 0
              fi
              echo "::notice::Waiting for ${release_repo}@${cli_version} boringcache-linux-amd64 and SHA256SUMS (${attempt}/${max_attempts})"
              sleep 10
            done

            echo "::error::Timed out waiting for ${release_repo}@${cli_version} boringcache-linux-amd64 and SHA256SUMS." >&2
            exit 1
          }

          wait_for_cli_release "$CLI_VERSION"

          args=(
            -f "cli_version=${CLI_VERSION}"
            -f "prewarm_buildkit_image=${PREWARM_BUILDKIT_IMAGE}"
            -f "benchmark_id_suffix=${BENCHMARK_ID_SUFFIX}"
            -f "lane_filter=${LANE_FILTER}"
            -f "runner_label=${RUNNER_LABEL}"
          )
          if [[ -n "$UPSTREAM_REF" ]]; then
            args+=(-f "upstream_ref=${UPSTREAM_REF}")
          fi

          attempt=1
          max_attempts=3
          until gh workflow run posthog-benchmark.yml --repo "$GITHUB_REPOSITORY" --ref "${{ github.ref_name }}" "${args[@]}"; do
            if [[ "$attempt" -ge "$max_attempts" ]]; then
              echo "Failed to dispatch posthog-benchmark.yml after ${attempt} attempts" >&2
              exit 1
            fi
            echo "Dispatch failed; retrying (${attempt}/${max_attempts})" >&2
            attempt=$((attempt + 1))
            sleep 5
          done
