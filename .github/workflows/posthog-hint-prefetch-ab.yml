name: PostHog Hint Prefetch A/B
run-name: ${{ format('Hint prefetch A/B | {0} | {1}', inputs.phase, inputs.upstream_ref) }}

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: Exact PostHog commit to build
        required: true
        type: string
      phase:
        description: Seed a fresh remote cache or measure the next rolling commit
        required: true
        type: choice
        options:
          - seed
          - rolling
      cli_version:
        description: Exact immutable CLI release tag
        required: true
        type: string
        default: vcli-canary-b6adffaf1f3a
      buildkit_image:
        description: Exact single-platform BuildKit digest reference
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: posthog-hint-prefetch-ab
  cancel-in-progress: false

jobs:
  build:
    name: ${{ format('{0} hint-{1}', matrix.runner_size, matrix.hint_prefetch) }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner_size: 8c
            runner: ubuntu-latest-8c-amd
            hint_prefetch: "off"
            cache_tag: posthog-hint-prefetch-v1-off-amd64-8c
          - runner_size: 8c
            runner: ubuntu-latest-8c-amd
            hint_prefetch: "on"
            cache_tag: posthog-hint-prefetch-v1-on-amd64-8c
          - runner_size: 16c
            runner: ubuntu-latest-l
            hint_prefetch: "off"
            cache_tag: posthog-hint-prefetch-v1-off-amd64-16c
          - runner_size: 16c
            runner: ubuntu-latest-l
            hint_prefetch: "on"
            cache_tag: posthog-hint-prefetch-v1-on-amd64-16c
    env:
      BORINGCACHE_API_URL: https://api.boringcache.com
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_GHCR_READ_USER: ${{ vars.BORINGCACHE_GHCR_READ_USER || github.actor }}
      BORINGCACHE_GHCR_READ_TOKEN: ${{ secrets.BORINGCACHE_GHCR_READ_TOKEN }}
      BORINGCACHE_BUILD_MAX_ATTEMPTS: "1"
      BORINGCACHE_REQUIRE_SERVER_SIGNATURE: "1"
      BORINGCACHE_OCI_HINT_PREFETCH: ${{ matrix.hint_prefetch == 'on' && 'true' || 'false' }}
      BORINGCACHE_OCI_DEMAND_PREFETCH: "false"
      BORINGCACHE_BUILDKIT_MOUNTCACHE_OFFLOADER: "0"
    steps:
      - name: Validate native runner architecture
        shell: bash
        run: |
          if [[ "$RUNNER_ARCH" != "X64" ]]; then
            echo "::error::Expected native X64, got ${RUNNER_ARCH}."
            exit 1
          fi

      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Free disk space
        shell: bash
        run: ./scripts/free-runner-disk.sh

      - name: Checkout exact PostHog source
        shell: bash
        env:
          POSTHOG_SOURCE: ${{ inputs.upstream_ref }}
        run: |
          set -euo pipefail
          [[ "$POSTHOG_SOURCE" =~ ^[0-9a-f]{40}$ ]] || {
            echo "upstream_ref must be an exact lowercase PostHog commit" >&2
            exit 1
          }
          git submodule sync --recursive
          git -c protocol.version=2 submodule update --init --depth 1 --recommend-shallow --jobs 4 upstream
          git -C upstream fetch --depth 1 origin "$POSTHOG_SOURCE"
          git -C upstream checkout --detach FETCH_HEAD
          test "$(git -C upstream rev-parse HEAD)" = "$POSTHOG_SOURCE"

      - name: Prepare behavior-safe PostHog source
        shell: bash
        run: ./scripts/prepare-source.sh base

      - name: Validate immutable product pins
        shell: bash
        env:
          CLI_VERSION: ${{ inputs.cli_version }}
          BUILDKIT_IMAGE: ${{ inputs.buildkit_image }}
        run: |
          set -euo pipefail
          [[ "$CLI_VERSION" =~ ^vcli-canary-[0-9a-f]{12}$ ]] || exit 1
          [[ "$BUILDKIT_IMAGE" =~ ^ghcr\.io/boringcache/buildkit@sha256:[0-9a-f]{64}$ ]] || exit 1

      - name: Build with the complete BoringCache product wrapper
        uses: boringcache/one@one-canary-e857cffbe965
        env:
          BORINGCACHE_OBSERVABILITY_JSONL_PATH: ${{ runner.temp }}/posthog-hint-${{ matrix.runner_size }}-${{ matrix.hint_prefetch }}.jsonl
        with:
          setup: none
          mode: docker
          workspace: boringcache/benchmark-posthog
          cli-version: ${{ inputs.cli_version }}
          cli-platform: linux-amd64
          cache-runtime: "false"
          cache-backend: boringcache
          managed-buildkit-image: ${{ inputs.buildkit_image }}
          cache-tag: ${{ matrix.cache_tag }}
          registry-tag: ${{ matrix.cache_tag }}
          working-directory: .
          context: upstream
          dockerfile: upstream/Dockerfile
          image: posthog-hint-prefetch-ab
          tags: ${{ format('hint-{0}-{1}-{2}', matrix.hint_prefetch, matrix.runner_size, github.run_id) }}
          platforms: linux/amd64
          load: "false"
          push: "false"
          provenance: "false"
          proxy-no-git: "true"
          proxy-no-platform: "true"
          no-platform: "true"
          save-policy: auto
          fail-on-cache-error: "true"
          require-oci-import-ready: ${{ inputs.phase == 'rolling' && 'true' || 'false' }}
          verify: wait
          verify-require-server-signature: "true"
          diagnostics: summary
          metadata-hints: ${{ format('benchmark=posthog-hint-prefetch-ab,phase={0},hint_prefetch={1},runner_size={2}', inputs.phase, matrix.hint_prefetch, matrix.runner_size) }}

      - name: Upload observability
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ format('posthog-hint-{0}-{1}-{2}', matrix.runner_size, matrix.hint_prefetch, github.run_id) }}
          path: ${{ runner.temp }}/posthog-hint-${{ matrix.runner_size }}-${{ matrix.hint_prefetch }}.jsonl
          if-no-files-found: error
          retention-days: 14
