name: "Rolling Benchmark Dispatch"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".gitmodules"
      - "upstream"

permissions:
  contents: read
  actions: write

jobs:
  dispatch:
    name: Dispatch rolling benchmark pair
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Dispatch rolling benchmark pair
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          dispatch_workflow() {
            local workflow="$1"
            local attempt=1
            local max_attempts=3

            until gh workflow run "$workflow" --repo "$GITHUB_REPOSITORY" --ref "${{ github.ref_name }}" -f cache_lane=rolling; do
              if [[ "$attempt" -ge "$max_attempts" ]]; then
                echo "Failed to dispatch ${workflow} after ${attempt} attempts" >&2
                return 1
              fi
              echo "Dispatch failed for ${workflow}; retrying (${attempt}/${max_attempts})" >&2
              attempt=$((attempt + 1))
              sleep 5
            done
          }

          dispatch_workflow "posthog-actions-cache.yml"
          dispatch_workflow "posthog-boringcache.yml"
