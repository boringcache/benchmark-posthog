name: "PostHog - Actions Cache"
run-name: >-
  ${{ format('{0} | {1}', github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && 'AC Rolling' || 'AC Fresh', github.event_name == 'push' && github.event.head_commit.message || github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || format('Manual dispatch ({0})', github.ref_name)) }}

on:
  workflow_dispatch:
    inputs:
      cache_lane:
        description: "Benchmark lane"
        required: false
        type: choice
        default: fresh
        options:
          - fresh
          - rolling
  push:
    branches:
      - main
    paths:
      - ".gitmodules"
      - "upstream"
  pull_request:
    paths:
      - ".gitmodules"
      - ".github/workflows/posthog-boringcache.yml"
      - ".github/workflows/posthog-actions-cache.yml"
      - "README.md"
      - "scenarios/**"
      - "scripts/**"
      - "upstream"

permissions:
  contents: read
  actions: write

env:
  PROJECT_REPO: PostHog/posthog
  BENCHMARK_ID: posthog

jobs:
  seed-cache:
    name: ${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && 'Docker Seed (actions/cache, rolling)' || 'Docker Seed (actions/cache, fresh)' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      cache_scope: ${{ steps.cold_baseline_build.outputs.cache_scope }}
      cold_seconds: ${{ steps.cold_baseline_build.outputs.seconds }}
      docker_cache_export_seconds: ${{ steps.cold_baseline_build.outputs.docker_cache_export_seconds }}
      scope_started_at: ${{ steps.scope.outputs.scope_started_at }}
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/share/swift /usr/local/.ghcup
          sudo docker system prune --all --volumes --force
          df -h /
          docker system df || true

      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Checkout pinned upstream submodule shallowly
        run: |
          set -euo pipefail
          git submodule sync --recursive
          git -c protocol.version=2 submodule update --init --depth 1 --recommend-shallow --jobs 4 upstream

      - name: Prepare base benchmark source tree
        run: ./scripts/prepare-source.sh base

      - name: Start seed timing
        id: seed_timing_start
        run: echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Expose GitHub runtime for Buildx cache
        uses: crazy-max/ghaction-github-runtime@v4

      - name: Set benchmark cache scope
        id: scope
        run: |
          ref_slug="$(printf '%s' "${GITHUB_REF_NAME}" | tr -c 'A-Za-z0-9._-' '-')"
          ref_slug="${ref_slug#-}"
          ref_slug="${ref_slug%-}"
          ref_slug="${ref_slug:-main}"
          if [[ "${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}" == "rolling" ]]; then
            cache_scope_primary="${BENCHMARK_ID}-rolling-${ref_slug}"
            cache_scope_fallback="${BENCHMARK_ID}-rolling-${ref_slug}-fallback"
          else
            cache_scope_primary="${BENCHMARK_ID}-run-r${GITHUB_RUN_ID}-a${GITHUB_RUN_ATTEMPT}-s1"
            cache_scope_fallback="${BENCHMARK_ID}-run-r${GITHUB_RUN_ID}-a${GITHUB_RUN_ATTEMPT}-s2"
          fi
          scope_started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "cache_scope_primary=${cache_scope_primary}" >> "$GITHUB_OUTPUT"
          echo "cache_scope_fallback=${cache_scope_fallback}" >> "$GITHUB_OUTPUT"
          echo "scope_started_at=${scope_started_at}" >> "$GITHUB_OUTPUT"

      - name: Prepare AC write probe
        run: |
          set -euo pipefail
          mkdir -p .bench-cache-probe
          printf '%s\n' "probe-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-$(date +%s)" > .bench-cache-probe/probe.txt

      - name: Verify Actions Cache write access
        id: cache_write_probe
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: |
            .bench-cache-probe
          key: ac-${{ env.BENCHMARK_ID }}-write-probe-r${{ github.run_id }}-a${{ github.run_attempt }}

      - name: Fail early if Actions Cache is read-only
        if: steps.cache_write_probe.outcome != 'success'
        run: |
          echo "Actions Cache write probe failed (likely read-only budget/spending cap)." >&2
          echo "Cannot produce reliable AC benchmark results until cache writes are enabled." >&2
          exit 1

      - name: ${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && 'Run rolling seed-only build' || 'Run fresh seed build' }}
        id: cold_baseline_build
        env:
          BUILDER: ${{ steps.buildx.outputs.name }}
          CACHE_SCOPE_PRIMARY: ${{ steps.scope.outputs.cache_scope_primary }}
          CACHE_SCOPE_FALLBACK: ${{ steps.scope.outputs.cache_scope_fallback }}
          CACHE_LANE: ${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          build_log="$(mktemp /tmp/posthog-ac-seed.XXXXXX.log)"
          find_step_id() {
            local pattern="$1"
            sed -nE "s/^#([0-9]+) ${pattern}.*/\\1/p" "$build_log" | tail -n1
          }
          find_step_seconds() {
            local step_id="$1"
            [[ -n "$step_id" ]] || return 0
            sed -nE "s/^#${step_id} DONE ([0-9]+(\\.[0-9]+)?)s$/\\1/p" "$build_log" | tail -n1
          }
          write_seed_diagnostics() {
            local output_path="benchmark-diagnostics/${BENCHMARK_ID}-actions-cache-${CACHE_LANE}-seed.txt"
            local diagnostic_end="${end:-$(date +%s)}"
            local cached_steps=""
            local import_status="none"

            if grep -Eq 'failed to configure .*cache importer' "$build_log"; then
              import_status="not_found"
            elif grep -Eq 'importing cache manifest|inferred cache manifest type' "$build_log"; then
              import_status="ok"
            fi
            cached_steps="$(grep -Ec '^#[0-9]+ CACHED$' "$build_log" || true)"

            mkdir -p "$(dirname "$output_path")"
            {
              echo "strategy=actions-cache"
              echo "lane=${CACHE_LANE}"
              echo "builder=${BUILDER}"
              echo "cache_scope_primary=${CACHE_SCOPE_PRIMARY}"
              echo "cache_scope_fallback=${CACHE_SCOPE_FALLBACK}"
              echo "selected_scope=${selected_scope}"
              echo "seed_phase_started_at=${phase_start}"
              echo "seed_build_started_at=${start}"
              echo "seed_build_finished_at=${diagnostic_end}"
              echo "seed_phase_wall_seconds=$((diagnostic_end - phase_start))"
              echo "seed_build_wall_seconds=$((diagnostic_end - start))"
              printf 'cache_args='
              printf '%q ' "${build_cache_args[@]}"
              printf '\n'
              echo "import_status=${import_status}"
              echo "cached_steps=${cached_steps}"
              echo "import_lines<<EOF"
              grep -E 'importing cache manifest|failed to configure .*cache importer|inferred cache manifest type' "$build_log" || true
              echo "EOF"
              echo "export_lines<<EOF"
              grep -E 'exporting to GitHub Actions Cache|preparing build cache|sending cache export|DONE [0-9.]+s$' "$build_log" | tail -n 80 || true
              echo "EOF"
              echo "slow_done_lines<<EOF"
              grep -E '^#[0-9]+ DONE [0-9]+(\.[0-9]+)?s$' "$build_log" | tail -n 80 || true
              echo "EOF"
            } > "$output_path"
          }

          selected_scope="$CACHE_SCOPE_PRIMARY"
          phase_start="${{ steps.seed_timing_start.outputs.started_at }}"
          start="$(date +%s)"
          attempt=1
          while true; do
            if [[ "$CACHE_LANE" == "rolling" ]]; then
              build_cache_args=(
                --cache-from "type=gha,scope=${selected_scope}"
                --cache-to "type=gha,mode=max,scope=${selected_scope}"
              )
            else
              build_cache_args=(
                --no-cache
                --cache-to "type=gha,mode=max,scope=${selected_scope}"
              )
            fi
            : > "$build_log"
            set +e
            DOCKER_BUILDKIT=1 docker buildx build \
              --builder "$BUILDER" \
              --file upstream/Dockerfile \
              --tag posthog-benchmark:latest \
              --progress=plain \
              "${build_cache_args[@]}" \
              upstream 2>&1 | tee "$build_log"
            status=${PIPESTATUS[0]}
            set -e

            if [[ "$status" -eq 0 ]]; then
              break
            fi

            if [[ "$attempt" -ge 2 ]]; then
              end="$(date +%s)"
              write_seed_diagnostics
              echo "Cold + seed cache build failed after retry" >&2
              exit "$status"
            fi

            attempt=$((attempt + 1))
            if [[ "$attempt" -eq 2 ]]; then
              selected_scope="$CACHE_SCOPE_FALLBACK"
              echo "Retrying cold seed with fallback cache scope: ${selected_scope}"
            fi
            sleep 5
          done

          # Ensure GHA cache backend saw this seed export before continuing.
          export_verified=0
          for _ in $(seq 1 20); do
            response="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/caches?per_page=100&key=index-${selected_scope}" 2>/dev/null || true)"
            if [[ -n "$response" ]] && jq -e '.actions_caches | type == "array"' <<<"$response" >/dev/null 2>&1; then
              matches="$(jq '.actions_caches | length' <<<"$response")"
              if [[ "$matches" -gt 0 ]]; then
                export_verified=1
                break
              fi
            fi
            sleep 3
          done

          if [[ "$export_verified" -ne 1 ]]; then
            end="$(date +%s)"
            write_seed_diagnostics
            echo "Cold + seed cache export probe failed: no index cache entry was touched for index-${selected_scope}" >&2
            exit 1
          fi

          end="$(date +%s)"
          write_seed_diagnostics
          echo "cache_scope=${selected_scope}" >> "$GITHUB_OUTPUT"
          echo "seconds=$((end - phase_start))" >> "$GITHUB_OUTPUT"
          echo "build_seconds=$((end - start))" >> "$GITHUB_OUTPUT"
          export_step="$(find_step_id "preparing build cache for export")"
          export_seconds="$(find_step_seconds "$export_step")"
          if [[ -n "$export_seconds" ]]; then
            echo "docker_cache_export_seconds=${export_seconds}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload seed diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-diagnostics-${{ env.BENCHMARK_ID }}-actions-cache-${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}
          path: benchmark-diagnostics/*.txt
          if-no-files-found: ignore


  scenario-builds:
    name: Warm rerun (GHA cache)
    needs: seed-cache
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.cache_lane != 'rolling' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/share/swift /usr/local/.ghcup
          sudo docker system prune --all --volumes --force
          df -h /
          docker system df || true

      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Checkout pinned upstream submodule shallowly
        run: |
          set -euo pipefail
          git submodule sync --recursive
          git -c protocol.version=2 submodule update --init --depth 1 --recommend-shallow --jobs 4 upstream

      - name: Prepare scenario source tree
        run: ./scripts/prepare-source.sh warm1

      - name: Start scenario timing
        id: scenario_timing_start
        run: echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Expose GitHub runtime for Buildx cache
        uses: crazy-max/ghaction-github-runtime@v4

      - name: Prune builder cache for isolated scenario
        run: docker buildx prune -f --builder "${{ steps.buildx.outputs.name }}"
      - name: Run warm build 1
        id: warm1_build
        env:
          BUILDER: ${{ steps.buildx.outputs.name }}
          CACHE_SCOPE: ${{ needs.seed-cache.outputs.cache_scope }}
        run: |
          set -euo pipefail

          build_log="$(mktemp /tmp/posthog-ac-warm1.XXXXXX.log)"
          find_step_id() {
            local pattern="$1"
            sed -nE "s/^#([0-9]+) ${pattern}.*/\\1/p" "$build_log" | tail -n1
          }
          find_step_seconds() {
            local step_id="$1"
            [[ -n "$step_id" ]] || return 0
            sed -nE "s/^#${step_id} DONE ([0-9]+(\\.[0-9]+)?)s$/\\1/p" "$build_log" | tail -n1
          }

          phase_start="${{ steps.scenario_timing_start.outputs.started_at }}"
          start="$(date +%s)"
          attempt=1
          while true; do
            : > "$build_log"
            set +e
            DOCKER_BUILDKIT=1 docker buildx build \
              --builder "$BUILDER" \
              --file upstream/Dockerfile \
              --tag posthog-benchmark:latest \
              --progress=plain \
              --cache-from "type=gha,scope=${CACHE_SCOPE}" \
              upstream 2>&1 | tee "$build_log"
            status=${PIPESTATUS[0]}
            set -e

            if [[ "$status" -eq 0 ]]; then
              break
            fi

            if [[ "$attempt" -ge 2 ]]; then
              echo "Warm build 1 failed after retry" >&2
              exit "$status"
            fi

            attempt=$((attempt + 1))
            sleep 5
          done

          end="$(date +%s)"
          echo "seconds=$((end - phase_start))" >> "$GITHUB_OUTPUT"
          echo "build_seconds=$((end - start))" >> "$GITHUB_OUTPUT"
          import_step="$(find_step_id "importing cache manifest from")"
          import_seconds="$(find_step_seconds "$import_step")"
          if [[ -n "$import_seconds" ]]; then
            echo "docker_cache_import_seconds=${import_seconds}" >> "$GITHUB_OUTPUT"
          fi

      - name: Capture scenario timing
        id: phase_timing
        run: |
          set -euo pipefail
          seconds=""
          build_seconds=""
          docker_cache_import_seconds=""
          seconds="${{ steps.warm1_build.outputs.seconds }}"
          build_seconds="${{ steps.warm1_build.outputs.build_seconds }}"
          docker_cache_import_seconds="${{ steps.warm1_build.outputs.docker_cache_import_seconds }}"
          if [[ -z "${seconds}" ]]; then
            echo "No timing captured for warm1" >&2
            exit 1
          fi
          echo "seconds=${seconds}" >> "$GITHUB_OUTPUT"
          echo "build_seconds=${build_seconds}" >> "$GITHUB_OUTPUT"
          if [[ -n "${docker_cache_import_seconds}" ]]; then
            echo "docker_cache_import_seconds=${docker_cache_import_seconds}" >> "$GITHUB_OUTPUT"
          fi
      - name: Persist scenario timing artifact
        run: |
          set -euo pipefail
          mkdir -p benchmark-phase
          cat > "benchmark-phase/warm1.env" <<EOF
          phase=warm1
          seconds=${{ steps.phase_timing.outputs.seconds }}
          build_seconds=${{ steps.phase_timing.outputs.build_seconds }}
          docker_cache_import_seconds=${{ steps.phase_timing.outputs.docker_cache_import_seconds }}
          EOF
      - name: Upload scenario timing artifact
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-phase-${{ env.BENCHMARK_ID }}-actions-cache-warm1
          path: benchmark-phase/warm1.env
          if-no-files-found: error

  finalize-benchmark:
    name: Finalize benchmark artifacts
    needs: [seed-cache, scenario-builds]
    if: ${{ always() && needs.seed-cache.result == 'success' && (needs.scenario-builds.result == 'success' || needs.scenario-builds.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout benchmark repo helpers
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          path: .benchmark-config

      - name: Download scenario timing artifacts
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.cache_lane != 'rolling' }}
        uses: actions/download-artifact@v8
        with:
          pattern: benchmark-phase-${{ env.BENCHMARK_ID }}-actions-cache-*
          path: benchmark-phase
          merge-multiple: true
      - name: Collect scenario timings
        id: timings
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.cache_lane != 'rolling' }}
        run: |
          set -euo pipefail
          parse_phase() {
            local phase="$1"
            local file="benchmark-phase/${phase}.env"
            if [[ ! -f "$file" ]]; then
              echo "Missing timing artifact for phase ${phase}" >&2
              ls -R benchmark-phase || true
              exit 1
            fi
            local seconds
            seconds="$(grep "^seconds=" "$file" | head -n1 | cut -d= -f2-)"
            if [[ -z "${seconds}" ]]; then
              echo "Timing artifact for phase ${phase} has empty seconds" >&2
              cat "$file" >&2
              exit 1
            fi
            local key="${phase//-/_}"
            echo "${key}_seconds=${seconds}" >> "$GITHUB_OUTPUT"
            local docker_cache_import_seconds
            docker_cache_import_seconds="$(grep "^docker_cache_import_seconds=" "$file" | head -n1 | cut -d= -f2- || true)"
            if [[ -n "${docker_cache_import_seconds}" ]]; then
              echo "${key}_docker_cache_import_seconds=${docker_cache_import_seconds}" >> "$GITHUB_OUTPUT"
            fi
          }
          parse_phase warm1
      - name: Measure GHA cache storage usage
        id: cache_size
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bytes="$(.benchmark-config/scripts/sum-gha-cache-by-key.sh "$BENCHMARK_ID" "${{ needs.seed-cache.outputs.scope_started_at }}")"
          echo "bytes=${bytes}" >> "$GITHUB_OUTPUT"

      - name: Capture committed upstream ref
        id: upstream_ref
        run: echo "sha=$(git -C .benchmark-config rev-parse HEAD:upstream)" >> "$GITHUB_OUTPUT"

      - name: Write benchmark artifacts
        id: artifact_files
        run: |
          .benchmark-config/scripts/write-benchmark-artifacts.sh \
            --benchmark "$BENCHMARK_ID" \
            --strategy "actions-cache" \
            --lane "${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}" \
            --project-repo "$PROJECT_REPO" \
            --project-ref "${{ steps.upstream_ref.outputs.sha }}" \
            --cold-seconds "${{ needs.seed-cache.outputs.cold_seconds }}" \
            --warm1-seconds "${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && '' || steps.timings.outputs.warm1_seconds }}" \
            --docker-cache-import-seconds "${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && '' || steps.timings.outputs.warm1_docker_cache_import_seconds }}" \
            --docker-cache-export-seconds "${{ needs.seed-cache.outputs.docker_cache_export_seconds }}" \
            --cache-storage-bytes "${{ steps.cache_size.outputs.bytes }}" \
            --cache-storage-source "github-actions-cache-api" \
            --hit-behavior-note "${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && 'Rolling lane: this run executes only the upstream-sync seed build; warm1 follow-up runs are intentionally skipped.' || 'Fresh lane: cold+seed runs the pinned base tree with --no-cache + cache-to type=gha (mode=max) and records cold timing while priming remote cache. Warm1 rebuilds the same pinned base tree on a fresh runner with cache-from only and no synthetic mutations.' }}"

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-${{ env.BENCHMARK_ID }}-actions-cache-${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}
          path: |
            ${{ steps.artifact_files.outputs.json_path }}
            ${{ steps.artifact_files.outputs.md_path }}
          if-no-files-found: error

      - name: Publish summary
        run: cat "${{ steps.artifact_files.outputs.md_path }}" >> "$GITHUB_STEP_SUMMARY"
