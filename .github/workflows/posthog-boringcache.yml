name: "PostHog - BoringCache"
run-name: >-
  ${{ format('{0} | {1}', github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && 'BC Rolling' || 'BC Fresh', github.event_name == 'push' && github.event.head_commit.message || github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || format('Manual dispatch ({0})', github.ref_name)) }}

on:
  workflow_dispatch:
    inputs:
      cache_lane:
        description: "Benchmark lane"
        required: false
        type: choice
        default: fresh
        options:
          - fresh
          - rolling
      cli_ref:
        description: "Internal benchmark diagnostic only: build this boringcache/cli ref instead of using the released CLI"
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - ".gitmodules"
      - "upstream"
  pull_request:
    paths:
      - ".gitmodules"
      - ".github/workflows/posthog-boringcache.yml"
      - ".github/workflows/posthog-actions-cache.yml"
      - ".github/workflows/reusable-docker-buildkit-benchmark.yml"
      - "README.md"
      - "scenarios/**"
      - "scripts/**"
      - "upstream"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  benchmark:
    uses: ./.github/workflows/reusable-docker-buildkit-benchmark.yml
    with:
      strategy: boringcache
      cache_lane: ${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}
      benchmark_id: posthog
      project_repo: PostHog/posthog
      dockerfile_path: upstream/Dockerfile
      docker_context: upstream
      image_tag: posthog-benchmark:latest
      cli_platform: linux-amd64
      benchmark_workspace: boringcache/benchmarks
      cli_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.cli_ref || '' }}
    secrets: inherit
    permissions:
      contents: read
      actions: write
