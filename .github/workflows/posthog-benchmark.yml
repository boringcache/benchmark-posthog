name: "PostHog Benchmark"
run-name: >-
  ${{ format('Benchmark Rolling | {0}', github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || github.event_name == 'schedule' && 'Scheduled' || format('Manual dispatch ({0})', github.ref_name)) }}

on:
  workflow_dispatch:
    inputs:
      cli_ref:
        description: "Internal benchmark diagnostic only: build this boringcache/cli ref instead of using the released CLI"
        required: false
        type: string
      blob_download_concurrency:
        description: "Optional BORINGCACHE_BLOB_DOWNLOAD_CONCURRENCY override (blank = adaptive)"
        required: false
        type: string
      blob_prefetch_concurrency:
        description: "Optional BORINGCACHE_BLOB_PREFETCH_CONCURRENCY override (blank = match download concurrency)"
        required: false
        type: string
      oci_stream_through_min_bytes:
        description: "Optional BORINGCACHE_OCI_STREAM_THROUGH_MIN_BYTES for Docker/OCI large blobs (blank = disabled)"
        required: false
        type: string
  schedule:
    - cron: "0 3 * * 3"
  pull_request:
    paths:
      - ".gitmodules"
      - ".github/actions/docker-rolling-benchmark/**"
      - ".github/workflows/posthog-benchmark.yml"
      - ".github/workflows/reusable-docker-buildkit-benchmark.yml"
      - "README.md"
      - "scenarios/**"
      - "scripts/**"
      - "upstream"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  github-actions-cache:
    name: Build with GitHub Actions Cache
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Build with GitHub Actions Cache
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: actions-cache
          benchmark_id: posthog
          project_repo: PostHog/posthog
          dockerfile_path: upstream/Dockerfile
          docker_context: upstream
          image_tag: posthog-benchmark:latest
          benchmark_workspace: ${{ github.repository }}
          free_disk_space: "true"

  boringcache-oci:
    name: Build with BoringCache OCI
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Build with BoringCache OCI
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: registry
          benchmark_id: posthog
          project_repo: PostHog/posthog
          dockerfile_path: upstream/Dockerfile
          docker_context: upstream
          image_tag: posthog-benchmark:latest
          cli_platform: linux-amd64
          benchmark_workspace: ${{ github.repository }}
          cli_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.cli_ref || '' }}
          blob_download_concurrency: ${{ github.event_name == 'workflow_dispatch' && inputs.blob_download_concurrency || '' }}
          blob_prefetch_concurrency: ${{ github.event_name == 'workflow_dispatch' && inputs.blob_prefetch_concurrency || '' }}
          oci_stream_through_min_bytes: ${{ github.event_name == 'workflow_dispatch' && inputs.oci_stream_through_min_bytes || '' }}
          free_disk_space: "true"

  boringcache-native:
    name: Build with BoringCache Native
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Build with BoringCache Native
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: native
          benchmark_id: posthog-native
          project_repo: PostHog/posthog
          dockerfile_path: upstream/Dockerfile
          docker_context: upstream
          image_tag: posthog-benchmark:latest
          cli_platform: linux-amd64
          benchmark_workspace: ${{ github.repository }}
          cli_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.cli_ref || '' }}
          blob_download_concurrency: ${{ github.event_name == 'workflow_dispatch' && inputs.blob_download_concurrency || '' }}
          blob_prefetch_concurrency: ${{ github.event_name == 'workflow_dispatch' && inputs.blob_prefetch_concurrency || '' }}
          oci_stream_through_min_bytes: ${{ github.event_name == 'workflow_dispatch' && inputs.oci_stream_through_min_bytes || '' }}
          free_disk_space: "true"
