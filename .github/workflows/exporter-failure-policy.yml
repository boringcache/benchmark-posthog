name: Exporter Failure Policy
run-name: Exporter failure policy | ${{ github.run_id }}

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  policy:
    name: ${{ matrix.policy }} cache errors
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - policy: best-effort
            strict: "false"
            expected_outcome: success
          - policy: strict
            strict: "true"
            expected_outcome: failure
    env:
      BORINGCACHE_API_URL: https://api.boringcache.com
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: intentional-invalid-save-token
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_GHCR_READ_USER: ${{ vars.BORINGCACHE_GHCR_READ_USER || github.actor }}
      BORINGCACHE_GHCR_READ_TOKEN: ${{ secrets.BORINGCACHE_GHCR_READ_TOKEN }}
      BORINGCACHE_BUILD_MAX_ATTEMPTS: "1"
      BORINGCACHE_REQUIRE_SERVER_SIGNATURE: "1"
      BORINGCACHE_BUILDKIT_MOUNTCACHE_OFFLOADER: "0"
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6

      - name: Run successful build with failing cache publication
        id: build
        continue-on-error: true
        uses: boringcache/one@one-canary-3ffc8131138b
        with:
          setup: none
          mode: docker
          workspace: boringcache/benchmark-posthog
          cli-version: vcli-canary-3ffc8131138b
          cli-platform: linux-amd64
          cache-runtime: "false"
          cache-backend: boringcache
          managed-buildkit-image: ghcr.io/boringcache/buildkit@sha256:f7860591b6b9c8c5b39904419b9aebc1687df62ab30219961313a8c66a46e6b0
          cache-tag: ${{ format('exporter-failure-policy-{0}-{1}', github.run_id, matrix.policy) }}
          registry-tag: ${{ format('exporter-failure-policy-{0}-{1}', github.run_id, matrix.policy) }}
          context: fixtures/exporter-failure
          dockerfile: fixtures/exporter-failure/Dockerfile
          image: exporter-failure-policy
          tags: ${{ format('exporter-failure-policy-{0}', matrix.policy) }}
          platforms: linux/amd64
          no-cache: "true"
          load: "false"
          push: "false"
          provenance: "false"
          proxy-no-git: "true"
          proxy-no-platform: "true"
          no-platform: "true"
          save-policy: auto
          fail-on-cache-error: ${{ matrix.strict }}
          verify: wait
          verify-require-server-signature: "true"
          diagnostics: summary
          metadata-hints: ${{ format('benchmark=exporter-failure-policy,policy={0}', matrix.policy) }}

      - name: Verify cache error policy
        env:
          ACTUAL_OUTCOME: ${{ steps.build.outcome }}
          EXPECTED_OUTCOME: ${{ matrix.expected_outcome }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$ACTUAL_OUTCOME" != "$EXPECTED_OUTCOME" ]]; then
            echo "Expected ${EXPECTED_OUTCOME}, got ${ACTUAL_OUTCOME}" >&2
            exit 1
          fi
          echo "${{ matrix.policy }} policy produced ${ACTUAL_OUTCOME} as expected."
