name: "PostHog - BoringCache Runner Investigation"
run-name: >-
  ${{ format('BoringCache Runner Investigation ({0}) | {1}', inputs.runner_slug, github.ref_name) }}

on:
  workflow_dispatch:
    inputs:
      runner_slug:
        description: "Short lane suffix for artifacts and cache tags"
        required: true
        type: choice
        default: gha4
        options:
          - standard
          - gha4
          - gha16
          - depot4
      runner_label:
        description: "GitHub runner label to use for the Docker build job"
        required: true
        type: string
        default: ubuntu-latest-m
      free_disk_space:
        description: "Reclaim hosted runner disk before building. Keep enabled for standard runners; larger runners can usually skip it."
        required: true
        type: boolean
        default: true
      seed_from_cache_tag:
        description: "Optional source cache tag to copy into this lane before measuring. Use blank to restore only this lane tag."
        required: false
        type: string
        default: ''
      cache_tag_platform_suffix:
        description: "Platform suffix used by the Docker proxy tag resolver. Blank disables suffixing for the seed step."
        required: false
        type: string
        default: ubuntu-24-x86_64
      cli_ref:
        description: "Internal benchmark diagnostic only: build this boringcache/cli ref instead of using the released CLI"
        required: false
        type: string
      blob_download_concurrency:
        description: "Optional BORINGCACHE_BLOB_DOWNLOAD_CONCURRENCY override (blank = adaptive)"
        required: false
        type: string
      blob_prefetch_concurrency:
        description: "Optional BORINGCACHE_BLOB_PREFETCH_CONCURRENCY override (blank = match download concurrency)"
        required: false
        type: string
      oci_stream_through_min_bytes:
        description: "Optional BORINGCACHE_OCI_STREAM_THROUGH_MIN_BYTES for Docker/OCI large blobs (blank = disabled)"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ inputs.runner_slug }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  seed-cache-tag:
    name: Seed lane cache tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN || secrets.BORINGCACHE_API_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN || secrets.BORINGCACHE_API_TOKEN }}
      SEED_FROM_CACHE_TAG: ${{ inputs.seed_from_cache_tag }}
      CACHE_TAG_PLATFORM_SUFFIX: ${{ inputs.cache_tag_platform_suffix }}
      RUNNER_SLUG: ${{ inputs.runner_slug }}
    steps:
      - name: Copy source pointer to lane tag
        run: |
          set -euo pipefail
          if [[ -z "${SEED_FROM_CACHE_TAG}" ]]; then
            echo "No seed_from_cache_tag provided; this lane will restore only its own rolling tag." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [[ -z "${BORINGCACHE_RESTORE_TOKEN}" || -z "${BORINGCACHE_SAVE_TOKEN}" ]]; then
            echo "Missing BoringCache restore/save token for seeding investigation cache tag." >&2
            exit 1
          fi

          ref_slug="$(printf '%s' "${GITHUB_REF_NAME}" | tr -c 'A-Za-z0-9._-' '-')"
          ref_slug="${ref_slug#-}"
          ref_slug="${ref_slug%-}"
          ref_slug="${ref_slug:-main}"
          lane_tag="posthog-run-rolling-${ref_slug}-${RUNNER_SLUG}"
          if [[ -n "${CACHE_TAG_PLATFORM_SUFFIX}" && "${lane_tag}" != *"-${CACHE_TAG_PLATFORM_SUFFIX}" ]]; then
            lane_tag="${lane_tag}-${CACHE_TAG_PLATFORM_SUFFIX}"
          fi

          namespace="${GITHUB_REPOSITORY%%/*}"
          repo="${GITHUB_REPOSITORY#*/}"
          api_base="${BORINGCACHE_API_URL:-https://api.boringcache.com}"
          api_base="${api_base%/}"
          if [[ "${api_base}" != */v2 ]]; then
            api_base="${api_base}/v2"
          fi
          pointer_url="${api_base}/workspaces/${namespace}/${repo}/caches/tags"

          if [[ -n "${CACHE_TAG_PLATFORM_SUFFIX}" && "${SEED_FROM_CACHE_TAG}" != *"-${CACHE_TAG_PLATFORM_SUFFIX}" ]]; then
            source_candidates=("${SEED_FROM_CACHE_TAG}-${CACHE_TAG_PLATFORM_SUFFIX}" "${SEED_FROM_CACHE_TAG}")
          else
            source_candidates=("${SEED_FROM_CACHE_TAG}")
          fi

          source_body="${RUNNER_TEMP}/source-pointer.json"
          source_tag=""
          for candidate in "${source_candidates[@]}"; do
            source_status="$(curl -sS \
              -H "Authorization: Bearer ${BORINGCACHE_RESTORE_TOKEN}" \
              -o "${source_body}" \
              -w '%{http_code}' \
              "${pointer_url}/${candidate}/pointer")"
            if [[ "${source_status}" == "200" ]]; then
              source_tag="${candidate}"
              break
            fi
            if [[ "${source_status}" != "404" ]]; then
              echo "Unexpected status ${source_status} while reading source tag ${candidate}." >&2
              cat "${source_body}" >&2 || true
              exit 1
            fi
          done
          if [[ -z "${source_tag}" ]]; then
            echo "None of the source cache tag candidates exist: ${source_candidates[*]}" >&2
            exit 1
          fi
          source_entry_id="$(jq -r '.cache_entry_id // empty' "${source_body}")"
          source_digest="$(jq -r '.manifest_root_digest // empty' "${source_body}")"
          if [[ -z "${source_entry_id}" ]]; then
            echo "Source cache tag ${source_tag} did not return a cache_entry_id." >&2
            jq '{tag, cache_entry_id, manifest_root_digest, error}' "${source_body}" >&2 || true
            exit 1
          fi

          dest_body="${RUNNER_TEMP}/dest-pointer.json"
          dest_headers="${RUNNER_TEMP}/dest-pointer.headers"
          dest_status="$(curl -sS \
            -H "Authorization: Bearer ${BORINGCACHE_RESTORE_TOKEN}" \
            -D "${dest_headers}" \
            -o "${dest_body}" \
            -w '%{http_code}' \
            "${pointer_url}/${lane_tag}/pointer")"
          if [[ "${dest_status}" == "200" ]]; then
            dest_entry_id="$(jq -r '.cache_entry_id // empty' "${dest_body}")"
            if [[ "${dest_entry_id}" == "${source_entry_id}" ]]; then
              echo "Lane tag ${lane_tag} already points at ${source_entry_id}; seed was a no-op." >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            if_match="$(awk 'tolower($1) == "etag:" {print $2}' "${dest_headers}" | tr -d '\r' | tail -n1)"
            if_match="${if_match:-\"0\"}"
          elif [[ "${dest_status}" == "404" ]]; then
            if_match="\"0\""
          else
            echo "Unexpected status ${dest_status} while reading destination tag ${lane_tag}." >&2
            cat "${dest_body}" >&2 || true
            exit 1
          fi

          payload="${RUNNER_TEMP}/publish-pointer.json"
          jq -n --arg cache_entry_id "${source_entry_id}" \
            '{cache_entry_id: $cache_entry_id, publish_mode: "cas"}' > "${payload}"
          publish_body="${RUNNER_TEMP}/publish-response.json"
          curl -fsS \
            -X PUT \
            -H "Authorization: Bearer ${BORINGCACHE_SAVE_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "If-Match: ${if_match}" \
            --data @"${payload}" \
            "${pointer_url}/${lane_tag}/publish" \
            -o "${publish_body}"

          published_entry_id="$(jq -r '.cache_entry_id // empty' "${publish_body}")"
          if [[ "${published_entry_id}" != "${source_entry_id}" ]]; then
            echo "Seed publish did not land on expected cache entry." >&2
            jq '{tag, cache_entry_id, requested_cache_entry_id, promotion_status, promotion_reason, error}' "${publish_body}" >&2 || true
            exit 1
          fi

          {
            echo "### Investigation cache seed"
            echo
            echo "Copied \`${source_tag}\` to \`${lane_tag}\` before measuring."
            echo
            echo "- cache_entry_id: \`${source_entry_id}\`"
            echo "- manifest_root_digest: \`${source_digest}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  benchmark:
    needs: seed-cache-tag
    uses: ./.github/workflows/reusable-docker-buildkit-benchmark.yml
    with:
      strategy: boringcache
      cache_lane: rolling
      benchmark_id: ${{ format('posthog-runner-{0}', inputs.runner_slug) }}
      cache_id: posthog
      cache_scope_suffix: ${{ format('-{0}', inputs.runner_slug) }}
      runner_label: ${{ inputs.runner_label }}
      project_repo: PostHog/posthog
      dockerfile_path: upstream/Dockerfile
      docker_context: upstream
      image_tag: posthog-benchmark:latest
      cli_platform: linux-amd64
      benchmark_workspace: ${{ github.repository }}
      cli_ref: ${{ inputs.cli_ref }}
      blob_download_concurrency: ${{ inputs.blob_download_concurrency }}
      blob_prefetch_concurrency: ${{ inputs.blob_prefetch_concurrency }}
      oci_stream_through_min_bytes: ${{ inputs.oci_stream_through_min_bytes }}
      free_disk_space: ${{ inputs.free_disk_space }}
    secrets: inherit
    permissions:
      contents: read
      actions: write
