name: "Rolling Benchmark Dispatch"

on:
  workflow_dispatch:
    inputs:
      blob_download_concurrency:
        description: "Optional BORINGCACHE_BLOB_DOWNLOAD_CONCURRENCY override for the BC run"
        required: false
        type: string
      blob_prefetch_concurrency:
        description: "Optional BORINGCACHE_BLOB_PREFETCH_CONCURRENCY override for the BC run"
        required: false
        type: string
      oci_stream_through_min_bytes:
        description: "Optional BORINGCACHE_OCI_STREAM_THROUGH_MIN_BYTES for Docker/OCI BC runs"
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - ".gitmodules"
      - "upstream"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  dispatch:
    name: Dispatch rolling benchmark pair
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Dispatch rolling benchmark pair
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          dispatch_workflow() {
            local workflow="$1"
            local attempt=1
            local max_attempts=3
            local fields=(-f cache_lane=rolling)
            if [[ "$workflow" == *boringcache.yml ]]; then
              fields+=(
                -f "blob_download_concurrency=${{ inputs.blob_download_concurrency || '' }}"
                -f "blob_prefetch_concurrency=${{ inputs.blob_prefetch_concurrency || '' }}"
                -f "oci_stream_through_min_bytes=${{ inputs.oci_stream_through_min_bytes || '' }}"
              )
            fi

            until gh workflow run "$workflow" --repo "$GITHUB_REPOSITORY" --ref "${{ github.ref_name }}" "${fields[@]}"; do
              if [[ "$attempt" -ge "$max_attempts" ]]; then
                echo "Failed to dispatch ${workflow} after ${attempt} attempts" >&2
                return 1
              fi
              echo "Dispatch failed for ${workflow}; retrying (${attempt}/${max_attempts})" >&2
              attempt=$((attempt + 1))
              sleep 5
            done
          }

          dispatch_workflow "posthog-actions-cache.yml"
          dispatch_workflow "posthog-boringcache.yml"
