name: "PostHog Benchmark"
run-name: >-
  ${{ format('Benchmark Rolling | {0}', github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || github.event_name == 'schedule' && 'Scheduled' || format('Manual dispatch ({0})', github.ref_name)) }}

on:
  workflow_dispatch:
    inputs:
      turbo_layer_bust:
        description: "Run only proof lanes that bust Docker layers before Turbo while preserving Turbo task inputs"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "0 3 * * 3"
  pull_request:
    paths:
      - ".gitmodules"
      - ".github/actions/docker-rolling-benchmark/**"
      - ".github/workflows/posthog-benchmark.yml"
      - ".github/workflows/reusable-docker-buildkit-benchmark.yml"
      - "README.md"
      - "scenarios/**"
      - "scripts/**"
      - "upstream"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  github-actions-cache:
    name: GHA
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.turbo_layer_bust != true }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: GHA
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: actions-cache
          benchmark_id: posthog
          project_repo: PostHog/posthog
          dockerfile_path: upstream/Dockerfile
          docker_context: upstream
          image_tag: posthog-benchmark:latest
          benchmark_workspace: ${{ github.repository }}
          free_disk_space: "true"

  boringcache-oci:
    name: BC
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.turbo_layer_bust != true }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: registry
          benchmark_id: posthog
          project_repo: PostHog/posthog
          dockerfile_path: upstream/Dockerfile
          docker_context: upstream
          image_tag: posthog-benchmark:latest
          cli_platform: linux-amd64
          benchmark_workspace: ${{ github.repository }}
          free_disk_space: "true"

  boringcache-auto:
    name: BC auto
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.turbo_layer_bust != true }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC auto
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: auto
          benchmark_id: posthog-auto
          project_repo: PostHog/posthog
          dockerfile_path: upstream/Dockerfile
          docker_context: upstream
          image_tag: posthog-benchmark:latest
          cli_platform: linux-amd64
          benchmark_workspace: ${{ github.repository }}
          free_disk_space: "true"

  boringcache-auto-toolcache:
    name: BC auto toolcache
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.turbo_layer_bust != true }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC auto toolcache
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: auto
          benchmark_id: posthog-auto-toolcache
          project_repo: PostHog/posthog
          dockerfile_path: upstream/Dockerfile
          docker_context: upstream
          image_tag: posthog-benchmark:latest
          cli_platform: linux-amd64
          benchmark_workspace: ${{ github.repository }}
          docker_tool_cache: turbo
          free_disk_space: "true"

  boringcache-auto-layer-bust:
    name: BC auto layer bust
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.turbo_layer_bust == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC auto layer bust
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: auto
          benchmark_id: posthog-auto-layer-bust
          project_repo: PostHog/posthog
          dockerfile_path: upstream/Dockerfile
          docker_context: upstream
          docker_build_args: |
            --build-arg=BORINGCACHE_TURBO_LAYER_BUST=${{ github.run_id }}-${{ github.run_attempt }}
          image_tag: posthog-benchmark:latest
          cli_platform: linux-amd64
          benchmark_workspace: ${{ github.repository }}
          free_disk_space: "true"

  boringcache-auto-toolcache-layer-bust:
    name: BC auto toolcache layer bust
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.turbo_layer_bust == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC auto toolcache layer bust
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: auto
          benchmark_id: posthog-auto-toolcache-layer-bust
          project_repo: PostHog/posthog
          dockerfile_path: upstream/Dockerfile
          docker_context: upstream
          docker_build_args: |
            --build-arg=BORINGCACHE_TURBO_LAYER_BUST=${{ github.run_id }}-${{ github.run_attempt }}
          image_tag: posthog-benchmark:latest
          cli_platform: linux-amd64
          benchmark_workspace: ${{ github.repository }}
          docker_tool_cache: turbo
          free_disk_space: "true"

  boringcache-oci-toolcache:
    name: BC oci toolcache
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.turbo_layer_bust != true }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: BC oci toolcache
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: registry
          benchmark_id: posthog-oci-toolcache
          project_repo: PostHog/posthog
          dockerfile_path: upstream/Dockerfile
          docker_context: upstream
          image_tag: posthog-benchmark:latest
          cli_platform: linux-amd64
          benchmark_workspace: ${{ github.repository }}
          docker_tool_cache: turbo
          free_disk_space: "true"
