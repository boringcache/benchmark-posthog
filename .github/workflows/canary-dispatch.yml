name: "Canary Benchmark"
run-name: ${{ format('Canary | CLI {0} | BuildKit {1}', inputs.cli_version, inputs.buildkit_image) }}

on:
  workflow_dispatch:
    inputs:
      cli_version:
        description: "BoringCache CLI release tag to test."
        required: true
        type: string
        default: vcli-canary
      buildkit_image:
        description: "BoringCache BuildKit image to test."
        required: true
        type: string
        default: ghcr.io/boringcache/buildkit:canary

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    name: Run PostHog canary
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch isolated fresh benchmark
        env:
          GH_TOKEN: ${{ github.token }}
          CLI_VERSION: ${{ inputs.cli_version }}
          BUILDKIT_IMAGE: ${{ inputs.buildkit_image }}
        run: >-
          gh workflow run posthog-benchmark.yml
          --repo "$GITHUB_REPOSITORY"
          --ref "${{ github.ref_name }}"
          -f cache_lane=fresh
          -f "cli_version=${CLI_VERSION}"
          -f "prewarm_buildkit_image=${BUILDKIT_IMAGE}"
          -f benchmark_id_suffix=-canary
