name: PostHog Push Timing
run-name: ${{ format('Push timing | {0} | 16c AMD64 + ARM64', inputs.upstream_ref) }}

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: Exact PostHog commit to build
        required: true
        type: string
      cli_version:
        description: Exact immutable CLI release tag
        required: true
        type: string
        default: vcli-canary-538e6473ac9f

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ format('posthog-push-timing-{0}', inputs.upstream_ref) }}
  cancel-in-progress: false

jobs:
  push:
    name: ${{ format('{0} {1} push', matrix.backend, matrix.architecture) }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: state
            architecture: amd64
            runner: ubuntu-latest-l
            cli_platform: linux-amd64
            docker_platform: linux/amd64
            managed_buildkit_image: ghcr.io/boringcache/buildkit@sha256:cfcc50779c981fa63ef4818e6744adfa642cc5fd00b60539def3458862739510
            cache_tag: posthog-buildkit-state-cfcc50779c981fa63ef4818e6744adfa642cc5fd00b60539def3458862739510-amd64-mount-rolling-main-16c
          - backend: boringcache
            architecture: amd64
            runner: ubuntu-latest-l
            cli_platform: linux-amd64
            docker_platform: linux/amd64
            managed_buildkit_image: ghcr.io/boringcache/buildkit@sha256:cfcc50779c981fa63ef4818e6744adfa642cc5fd00b60539def3458862739510
            cache_tag: posthog-bc-buildkit-mountcache-run-rolling-main
          - backend: state
            architecture: arm64
            runner: ubuntu-latest-l-arm
            cli_platform: linux-arm64
            docker_platform: linux/arm64
            managed_buildkit_image: ghcr.io/boringcache/buildkit@sha256:a479567d60945ad9ea6263432d32b4d1b3476150e6d1fbaba7ba42cd5674f657
            cache_tag: posthog-buildkit-state-a479567d60945ad9ea6263432d32b4d1b3476150e6d1fbaba7ba42cd5674f657-arm64-mount-rolling-main-4c
          - backend: boringcache
            architecture: arm64
            runner: ubuntu-latest-l-arm
            cli_platform: linux-arm64
            docker_platform: linux/arm64
            managed_buildkit_image: ghcr.io/boringcache/buildkit@sha256:a479567d60945ad9ea6263432d32b4d1b3476150e6d1fbaba7ba42cd5674f657
            cache_tag: arm-posthog-bc-buildkit-mountcache-run-rolling-main
    env:
      BORINGCACHE_API_URL: https://api.boringcache.com
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_GHCR_READ_USER: ${{ vars.BORINGCACHE_GHCR_READ_USER || github.actor }}
      BORINGCACHE_GHCR_READ_TOKEN: ${{ secrets.BORINGCACHE_GHCR_READ_TOKEN }}
      BORINGCACHE_BUILD_MAX_ATTEMPTS: "1"
      IMAGE_REPOSITORY: ghcr.io/boringcache/benchmark-posthog-push-timing
    steps:
      - name: Validate native runner architecture
        shell: bash
        env:
          CLI_PLATFORM: ${{ matrix.cli_platform }}
        run: |
          case "${CLI_PLATFORM}:${RUNNER_ARCH}" in
            linux-amd64:X64|linux-arm64:ARM64)
              ;;
            *)
              echo "::error::Runner architecture ${RUNNER_ARCH} does not match ${CLI_PLATFORM}."
              exit 1
              ;;
          esac

      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Free disk space
        shell: bash
        run: ./scripts/free-runner-disk.sh

      - name: Checkout exact PostHog source
        shell: bash
        env:
          POSTHOG_SOURCE: ${{ inputs.upstream_ref }}
        run: |
          set -euo pipefail
          [[ "$POSTHOG_SOURCE" =~ ^[0-9a-f]{40}$ ]] || {
            echo "upstream_ref must be an exact lowercase PostHog commit" >&2
            exit 1
          }
          git submodule sync --recursive
          git -c protocol.version=2 submodule update --init --depth 1 --recommend-shallow --jobs 4 upstream
          git -C upstream fetch --depth 1 origin "$POSTHOG_SOURCE"
          git -C upstream checkout --detach FETCH_HEAD
          test "$(git -C upstream rev-parse HEAD)" = "$POSTHOG_SOURCE"

      - name: Prepare behavior-safe PostHog source
        shell: bash
        run: ./scripts/prepare-source.sh base

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Resolve timing inputs
        id: timing
        shell: bash
        env:
          BACKEND: ${{ matrix.backend }}
          ARCHITECTURE: ${{ matrix.architecture }}
          CACHE_TAG: ${{ matrix.cache_tag }}
        run: |
          set -euo pipefail
          {
            echo "cache_tag=$CACHE_TAG"
            echo "image_tag=${BACKEND}-${ARCHITECTURE}-r${GITHUB_RUN_ID}-a${GITHUB_RUN_ATTEMPT}"
            echo "started_ms=$(date +%s%3N)"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: boringcache/one@one-canary-538e6473ac9f
        env:
          BORINGCACHE_BUILDKIT_MOUNTCACHE_OFFLOADER: "1"
          BORINGCACHE_REQUIRE_SERVER_SIGNATURE: "1"
        with:
          setup: none
          mode: docker
          workspace: boringcache/benchmark-posthog
          cli-version: ${{ inputs.cli_version }}
          cli-platform: ${{ matrix.cli_platform }}
          cache-runtime: "false"
          cache-backend: ${{ matrix.backend }}
          managed-buildkit-image: ${{ matrix.managed_buildkit_image }}
          cache-tag: ${{ steps.timing.outputs.cache_tag }}
          registry-tag: ${{ steps.timing.outputs.cache_tag }}
          working-directory: .
          context: upstream
          dockerfile: upstream/Dockerfile
          image: ${{ env.IMAGE_REPOSITORY }}
          tags: ${{ steps.timing.outputs.image_tag }}
          platforms: ${{ matrix.docker_platform }}
          load: "false"
          push: "true"
          provenance: "false"
          proxy-no-git: "true"
          proxy-no-platform: "true"
          no-platform: "true"
          save-policy: auto
          fail-on-cache-error: "true"
          verify: wait
          verify-require-server-signature: "true"
          diagnostics: summary
          metadata-hints: ${{ format('benchmark=posthog-push-timing,backend={0},architecture={1}', matrix.backend, matrix.architecture) }}

      - name: Verify pushed image before Action post
        id: verify
        shell: bash
        env:
          STARTED_MS: ${{ steps.timing.outputs.started_ms }}
          IMAGE_TAG: ${{ steps.timing.outputs.image_tag }}
        run: |
          set -euo pipefail
          image_ref="${IMAGE_REPOSITORY}:${IMAGE_TAG}"
          docker buildx imagetools inspect "$image_ref"
          ready_ms="$(date +%s%3N)"
          elapsed_ms=$((ready_ms - STARTED_MS))
          {
            echo "image_ref=$image_ref"
            echo "image_ready_ms=$ready_ms"
            echo "image_ready_elapsed_ms=$elapsed_ms"
          } >> "$GITHUB_OUTPUT"
          {
            echo "### ${{ matrix.backend }} ${{ matrix.architecture }} push timing"
            echo
            echo "- Source: \`${{ inputs.upstream_ref }}\`"
            echo "- Platform: \`${{ matrix.docker_platform }}\`"
            echo "- Image: \`$image_ref\`"
            echo "- Registry verified before Action post: yes"
            echo "- Build start to registry verification: $((elapsed_ms / 1000))s"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Exercise downstream work while state finalizes
        shell: bash
        run: sleep 30
