name: "PostHog - Local BuildKit Investigation"
run-name: >-
  ${{ format('Local BuildKit Investigation | {0} | {1}', inputs.mode, github.ref_name) }}

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: "GitHub runner label for the local BuildKit build."
        required: true
        type: string
        default: ubuntu-latest
      mode:
        description: "Local BuildKit cache mode. Both modes avoid external cache export/import."
        required: true
        type: choice
        default: no-external-cache
        options:
          - no-external-cache
          - no-cache-no-export
      free_disk_space:
        description: "Reclaim runner disk before the Docker build."
        required: true
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ inputs.runner_label }}-${{ inputs.mode }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  local-buildkit:
    name: Docker Build (local BuildKit, no external cache)
    runs-on: ${{ inputs.runner_label }}
    timeout-minutes: 120
    steps:
      - name: Free disk space
        if: inputs.free_disk_space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/share/swift /usr/local/.ghcup
          sudo docker system prune --all --volumes --force
          df -h /
          docker system df || true

      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Checkout pinned upstream submodule shallowly
        run: |
          set -euo pipefail
          git submodule sync --recursive
          git -c protocol.version=2 submodule update --init --depth 1 --recommend-shallow --jobs 4 upstream

      - name: Prepare base benchmark source tree
        run: ./scripts/prepare-source.sh base

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Capture upstream ref
        id: upstream
        run: echo "sha=$(git rev-parse HEAD:upstream)" >> "$GITHUB_OUTPUT"

      - name: Run local BuildKit build without external cache
        id: local_build
        env:
          BUILDER: ${{ steps.buildx.outputs.name }}
          MODE: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          build_log="${RUNNER_TEMP}/posthog-local-buildkit.log"
          build_args=()
          if [[ "${MODE}" == "no-cache-no-export" ]]; then
            build_args+=(--no-cache)
          fi

          started_at="$(date +%s)"
          DOCKER_BUILDKIT=1 docker buildx build \
            --builder "${BUILDER}" \
            --file upstream/Dockerfile \
            --tag posthog-local-buildkit:latest \
            --progress=plain \
            "${build_args[@]}" \
            upstream 2>&1 | tee "${build_log}"
          ended_at="$(date +%s)"

          echo "started_at=${started_at}" >> "$GITHUB_OUTPUT"
          echo "ended_at=${ended_at}" >> "$GITHUB_OUTPUT"
          echo "build_seconds=$((ended_at - started_at))" >> "$GITHUB_OUTPUT"

          mkdir -p benchmark-local-buildkit benchmark-diagnostics
          cp "${build_log}" benchmark-diagnostics/posthog-local-buildkit.log

      - name: Write investigation artifact
        if: always()
        env:
          UPSTREAM_REF: ${{ steps.upstream.outputs.sha }}
          MODE: ${{ inputs.mode }}
          STARTED_AT: ${{ steps.local_build.outputs.started_at }}
          ENDED_AT: ${{ steps.local_build.outputs.ended_at }}
          BUILD_SECONDS: ${{ steps.local_build.outputs.build_seconds }}
        run: |
          set -euo pipefail
          mkdir -p benchmark-local-buildkit
          jq -n \
            --arg project_repo "PostHog/posthog" \
            --arg project_ref "${UPSTREAM_REF}" \
            --arg strategy "local-buildkit" \
            --arg runner_label "${RUNNER_NAME:-${{ inputs.runner_label }}}" \
            --arg mode "${MODE}" \
            --arg started_at "${STARTED_AT}" \
            --arg ended_at "${ENDED_AT}" \
            --argjson build_seconds "${BUILD_SECONDS:-0}" \
            '{
              project: {repo: $project_repo, ref: $project_ref},
              strategy: $strategy,
              runner_label: $runner_label,
              local_buildkit: {
                mode: $mode,
                external_cache: false,
                output_export: false,
                started_at: $started_at,
                ended_at: $ended_at
              },
              runs: {
                local_buildkit_build_seconds: $build_seconds
              }
            }' > benchmark-local-buildkit/posthog-local-buildkit.json
          {
            echo "### PostHog local BuildKit investigation"
            echo
            echo "- upstream ref: \`${UPSTREAM_REF}\`"
            echo "- mode: \`${MODE}\`"
            echo "- local BuildKit build seconds: \`${BUILD_SECONDS:-0}\`"
            echo "- external cache: \`false\`"
            echo "- output export: \`false\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload investigation artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-posthog-local-buildkit
          path: |
            benchmark-local-buildkit/
            benchmark-diagnostics/
          if-no-files-found: error
