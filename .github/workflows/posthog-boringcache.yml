name: "PostHog - BoringCache"
run-name: >-
  ${{ format('{0} | {1}', github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && 'BC Rolling' || 'BC Fresh', github.event_name == 'push' && github.event.head_commit.message || github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || format('Manual dispatch ({0})', github.ref_name)) }}

on:
  workflow_dispatch:
    inputs:
      cache_lane:
        description: "Benchmark lane"
        required: false
        type: choice
        default: fresh
        options:
          - fresh
          - rolling
      cli_ref:
        description: "Internal BoringCache diagnostic: CLI ref for registry-proxy debugging"
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - ".gitmodules"
      - "upstream"
  pull_request:
    paths:
      - ".gitmodules"
      - ".github/workflows/posthog-boringcache.yml"
      - ".github/workflows/posthog-actions-cache.yml"
      - "README.md"
      - "scenarios/**"
      - "scripts/**"
      - "upstream"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

env:
  PROJECT_REPO: PostHog/posthog
  BENCHMARK_ID: posthog
  BENCHMARK_WORKSPACE: boringcache/benchmarks

jobs:
  seed-cache:
    name: ${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && 'Docker Seed (BoringCache, rolling)' || 'Docker Seed (BoringCache, fresh)' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    outputs:
      cache_scope: ${{ steps.scope.outputs.cache_scope }}
      cold_seconds: ${{ steps.cold_baseline_build.outputs.seconds }}
      docker_cache_export_seconds: ${{ steps.cold_baseline_build.outputs.docker_cache_export_seconds }}
      oci_hydration_policy: ${{ steps.cold_baseline_build.outputs.oci_hydration_policy }}
      oci_body_local_hits: ${{ steps.cold_baseline_build.outputs.oci_body_local_hits }}
      oci_body_remote_fetches: ${{ steps.cold_baseline_build.outputs.oci_body_remote_fetches }}
      oci_body_local_bytes: ${{ steps.cold_baseline_build.outputs.oci_body_local_bytes }}
      oci_body_remote_bytes: ${{ steps.cold_baseline_build.outputs.oci_body_remote_bytes }}
      oci_body_local_duration_ms: ${{ steps.cold_baseline_build.outputs.oci_body_local_duration_ms }}
      oci_body_remote_duration_ms: ${{ steps.cold_baseline_build.outputs.oci_body_remote_duration_ms }}
      startup_oci_body_inserted: ${{ steps.cold_baseline_build.outputs.startup_oci_body_inserted }}
      startup_oci_body_failures: ${{ steps.cold_baseline_build.outputs.startup_oci_body_failures }}
      startup_oci_body_cold_blobs: ${{ steps.cold_baseline_build.outputs.startup_oci_body_cold_blobs }}
      startup_oci_body_duration_ms: ${{ steps.cold_baseline_build.outputs.startup_oci_body_duration_ms }}
      oci_new_blob_count: ${{ steps.cold_baseline_build.outputs.oci_new_blob_count }}
      oci_new_blob_bytes: ${{ steps.cold_baseline_build.outputs.oci_new_blob_bytes }}
      oci_upload_requested_blobs: ${{ steps.cold_baseline_build.outputs.oci_upload_requested_blobs }}
      oci_upload_already_present: ${{ steps.cold_baseline_build.outputs.oci_upload_already_present }}
      oci_upload_batch_seconds: ${{ steps.cold_baseline_build.outputs.oci_upload_batch_seconds }}
      tags_csv: ${{ steps.scope.outputs.tags_csv }}
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/share/swift /usr/local/.ghcup
          sudo docker system prune --all --volumes --force
          df -h /
          docker system df || true

      - name: Validate BoringCache secrets
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${BORINGCACHE_RESTORE_TOKEN}" ]]; then
            echo "Missing BORINGCACHE_RESTORE_TOKEN secret" >&2
            exit 1
          fi
          if [[ -z "${BORINGCACHE_SAVE_TOKEN}" ]]; then
            echo "Missing BORINGCACHE_SAVE_TOKEN secret" >&2
            exit 1
          fi

      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Checkout pinned upstream submodule shallowly
        run: |
          set -euo pipefail
          git submodule sync --recursive
          git -c protocol.version=2 submodule update --init --depth 1 --recommend-shallow --jobs 4 upstream

      - name: Prepare base benchmark source tree
        run: ./scripts/prepare-source.sh base

      - name: Start seed timing
        id: seed_timing_start
        run: echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Install BoringCache CLI with boringcache/one
        uses: boringcache/one@v1
        with:
          setup: none
          mode: archive
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          cli-platform: linux-amd64
          cache-runtime: false

      - name: Validate internal CLI ref diagnostic
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.cli_ref != '' }}
        env:
          CLI_REF: ${{ inputs.cli_ref }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          if [[ "${REPOSITORY_OWNER}" != "boringcache" ]]; then
            echo "cli_ref is an internal BoringCache benchmark diagnostic and is disabled outside boringcache-owned benchmark repos." >&2
            exit 1
          fi
          {
            echo "### Internal CLI ref diagnostic"
            echo
            echo "Using boringcache/cli ref \`${CLI_REF}\` for the outer registry proxy only."
            echo "The unmodified upstream Dockerfile is built through the outer registry proxy."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout BoringCache CLI ref
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.cli_ref != '' }}
        uses: actions/checkout@v6
        with:
          repository: boringcache/cli
          ref: ${{ inputs.cli_ref }}
          path: .boringcache-cli
          fetch-depth: 1

      - name: Build BoringCache CLI ref
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.cli_ref != '' }}
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup target add x86_64-unknown-linux-musl
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools
          cargo build --release --locked --target x86_64-unknown-linux-musl --manifest-path .boringcache-cli/Cargo.toml --bin boringcache
          mkdir -p "$HOME/.local/bin"
          cp .boringcache-cli/target/x86_64-unknown-linux-musl/release/boringcache "$HOME/.local/bin/boringcache"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/boringcache" --version

      - name: Prepare benchmark build inputs
        id: scope
        run: |
          ref_slug="$(printf '%s' "${GITHUB_REF_NAME}" | tr -c 'A-Za-z0-9._-' '-')"
          ref_slug="${ref_slug#-}"
          ref_slug="${ref_slug%-}"
          ref_slug="${ref_slug:-main}"
          if [[ "${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}" == "rolling" ]]; then
            run_suffix="rolling-${ref_slug}"
          else
            run_suffix="r${GITHUB_RUN_ID}-a${GITHUB_RUN_ATTEMPT}"
          fi
          cache_scope="${BENCHMARK_ID}-run-${run_suffix}"
          docker_registry_tag="${BENCHMARK_ID}-docker-layers-${run_suffix}"
          tags_csv="${cache_scope},${docker_registry_tag}"
          registry_proxy_tags="${cache_scope},${docker_registry_tag}"
          echo "cache_scope=${cache_scope}" >> "$GITHUB_OUTPUT"
          echo "docker_registry_tag=${docker_registry_tag}" >> "$GITHUB_OUTPUT"
          echo "registry_proxy_tags=${registry_proxy_tags}" >> "$GITHUB_OUTPUT"
          echo "tags_csv=${tags_csv}" >> "$GITHUB_OUTPUT"
          cat > ./run-boringcache-build.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail

          proxy_port="${BORINGCACHE_PROXY_PORT:-5000}"
          proxy_log="${BORINGCACHE_PROXY_LOG_PATH:-/tmp/boringcache-proxy-${proxy_port}.log}"
          build_log="$(mktemp /tmp/boringcache-build.XXXXXX.log)"
          status_snapshot_path="$(mktemp /tmp/boringcache-status.XXXXXX.json)"
          max_attempts=3
          cache_export_pattern='expected sha256:.*got sha256:e3b0|error writing layer blob|400 Bad Request|broken pipe'
          cache_import_blob_pattern='failed to copy: httpReadSeeker: failed open: could not fetch content descriptor .* from remote: (not found|500 Internal Server Error)|Blob storage returned error|OCI blob body download failed'

          mode="${1:-full}"
          start_proxy() { :; }
          stop_proxy() { :; }
          wait_proxy_ready() {
            local started phase elapsed ready require_cache_refs
            started="$(date +%s)"
            ready=0
            require_cache_refs=0

            if [[ "$mode" =~ ^(full|partial-warm)$ ]] && cache_from_is_enabled; then
              require_cache_refs=1
            fi

            while true; do
              if curl -fsS "http://127.0.0.1:${proxy_port}/_boringcache/status" -o "$status_snapshot_path" 2>/dev/null; then
                phase="$(jq -r '.phase // empty' "$status_snapshot_path" 2>/dev/null || true)"
                if [[ "$phase" == "ready" ]]; then
                  ready=1
                  if [[ "$require_cache_refs" != "1" ]] || cache_from_refs_ready; then
                    return 0
                  fi
                fi
              fi

              elapsed=$(($(date +%s) - started))
              if (( elapsed >= cache_ready_timeout_seconds )); then
                break
              fi
              sleep 1
            done

            if [[ "$ready" == "1" ]]; then
              echo "Registry proxy reached ready state before cache-from refs became readable; continuing after ${cache_ready_timeout_seconds}s"
              return 0
            fi

            return 1
          }
          flush_action_proxy() {
            local pid_file="${BORINGCACHE_PROXY_PID_FILE:-/tmp/boringcache-proxy.pid}"
            [[ -s "$pid_file" ]] || return 0

            local pid=""
            pid="$(tr -d '[:space:]' < "$pid_file" 2>/dev/null || true)"
            [[ "$pid" =~ ^[0-9]+$ ]] || return 0

            if ! kill -0 "$pid" 2>/dev/null; then
              echo "Registry proxy (PID: $pid) already exited"
              return 0
            fi

            echo "Stopping registry proxy (PID: $pid)..."
            if ! kill -TERM "$pid" 2>/dev/null; then
              echo "Failed to send SIGTERM to registry proxy (PID: $pid); continuing"
              return 0
            fi

            local started elapsed
            started="$(date +%s)"
            while kill -0 "$pid" 2>/dev/null; do
              sleep 1
              elapsed=$(($(date +%s) - started))
              if (( elapsed > 0 && elapsed % 30 == 0 )); then
                echo "Waiting for registry proxy to flush and exit... (${elapsed}s elapsed)"
              fi
            done
            elapsed=$(($(date +%s) - started))
            echo "Registry proxy exited gracefully after ${elapsed}s"
          }
          cleanup() { :; }
          trap cleanup EXIT

          find_step_id() {
            local pattern="$1"
            sed -nE "s/^#([0-9]+) ${pattern}.*/\\1/p" "$build_log" | tail -n1
          }

          find_step_seconds() {
            local step_id="$1"
            [[ -n "$step_id" ]] || return 0
            sed -nE "s/^#${step_id} DONE ([0-9]+(\\.[0-9]+)?)s$/\\1/p" "$build_log" | tail -n1
          }

          write_build_metrics() {
            local output_path="${BENCHMARK_METRICS_OUTPUT:-}"
            [[ -n "$output_path" ]] || return 0

            local import_step=""
            local export_step=""
            local import_seconds=""
            local export_seconds=""

            import_step="$(find_step_id "importing cache manifest from")"
            export_step="$(find_step_id "exporting cache to registry")"
            import_seconds="$(find_step_seconds "$import_step")"
            export_seconds="$(find_step_seconds "$export_step")"

            mkdir -p "$(dirname "$output_path")"
            : > "$output_path"
            if [[ -n "$import_seconds" ]]; then
              echo "docker_cache_import_seconds=$import_seconds" >> "$output_path"
            fi
            if [[ -n "$export_seconds" ]]; then
              echo "docker_cache_export_seconds=$export_seconds" >> "$output_path"
            fi

            if [[ -s "$status_snapshot_path" ]] && command -v jq >/dev/null 2>&1; then
              append_status_metric() {
                local key="$1"
                local jq_expr="$2"
                local value=""
                value="$(jq -r "$jq_expr // empty" "$status_snapshot_path" 2>/dev/null || true)"
                if [[ -n "$value" && "$value" != "null" ]]; then
                  echo "$key=$value" >> "$output_path"
                fi
              }

              append_status_metric oci_hydration_policy '.startup_prefetch.startup_prefetch_oci_hydration'
              append_status_metric startup_oci_body_inserted '.startup_prefetch.startup_prefetch_oci_body_inserted'
              append_status_metric startup_oci_body_failures '.startup_prefetch.startup_prefetch_oci_body_failures'
              append_status_metric startup_oci_body_cold_blobs '.startup_prefetch.startup_prefetch_oci_body_cold_blobs'
              append_status_metric startup_oci_body_duration_ms '.startup_prefetch.startup_prefetch_oci_body_duration_ms'
              append_status_metric oci_body_local_hits '.oci_body.oci_body_local_hits'
              append_status_metric oci_body_remote_fetches '.oci_body.oci_body_remote_fetches'
              append_status_metric oci_body_local_bytes '.oci_body.oci_body_local_bytes'
              append_status_metric oci_body_remote_bytes '.oci_body.oci_body_remote_bytes'
              append_status_metric oci_body_local_duration_ms '.oci_body.oci_body_local_duration_ms'
              append_status_metric oci_body_remote_duration_ms '.oci_body.oci_body_remote_duration_ms'
            fi

            local observability_path="${BORINGCACHE_OBSERVABILITY_JSONL_PATH:-}"
            if [[ -n "$observability_path" && -s "$observability_path" ]] && command -v jq >/dev/null 2>&1; then
              detail_value() {
                local details="$1"
                local name="$2"
                printf '%s\n' "$details" | tr ' ' '\n' | awk -F= -v key="$name" '$1 == key { print $2; exit }'
              }
              append_metric() {
                local key="$1"
                local value="$2"
                if [[ -n "$value" && "$value" != "null" ]]; then
                  echo "$key=$value" >> "$output_path"
                fi
              }

              local plan_details=""
              plan_details="$(jq -r 'select(.operation == "oci_blob_upload_plan") | .details // empty' "$observability_path" 2>/dev/null | tail -n1 || true)"
              if [[ -n "$plan_details" ]]; then
                append_metric oci_upload_requested_blobs "$(detail_value "$plan_details" requested_blobs)"
                append_metric oci_new_blob_count "$(detail_value "$plan_details" upload_urls)"
                append_metric oci_upload_already_present "$(detail_value "$plan_details" already_present)"
              else
                append_metric oci_new_blob_count "0"
              fi

              local uploaded_blob_bytes=""
              uploaded_blob_bytes="$(jq -s -r '
                ([range(0; length) as $i | select(.[$i].operation == "oci_blob_upload_plan") | $i] | last) as $plan
                | if $plan == null then
                    0
                  else
                    ([range(($plan + 1); length) as $i | .[$i] | select(.operation == "oci_blob_upload") | (.request_bytes // 0)] | add // 0)
                  end
              ' "$observability_path" 2>/dev/null || true)"
              append_metric oci_new_blob_bytes "${uploaded_blob_bytes:-0}"

              local batch_duration_ms=""
              batch_duration_ms="$(jq -r 'select(.operation == "oci_blob_upload_batch") | .duration_ms // empty' "$observability_path" 2>/dev/null | tail -n1 || true)"
              if [[ -n "$batch_duration_ms" ]]; then
                awk -v ms="$batch_duration_ms" 'BEGIN { printf "oci_upload_batch_seconds=%.3f\n", ms / 1000 }' >> "$output_path"
              fi
            fi
          }


          capture_proxy_status() {
            local output_path="${1:-$status_snapshot_path}"
            curl -fsS "http://127.0.0.1:${proxy_port}/_boringcache/status" -o "$output_path" 2>/dev/null || true
          }

          build_import_status() {
            if grep -Eq 'failed to configure .*cache importer' "$build_log"; then
              echo "not_found"
            elif grep -Eq 'inferred cache manifest type|importing cache manifest' "$build_log"; then
              echo "ok"
            else
              echo "none"
            fi
          }

          write_build_diagnostics() {
            local output_path="${BENCHMARK_DIAGNOSTICS_OUTPUT:-}"
            [[ -n "$output_path" ]] || return 0

            local cached_steps=""
            cached_steps="$(grep -Ec '^#[0-9]+ CACHED$' "$build_log" || true)"
            local observability_path="${BORINGCACHE_OBSERVABILITY_JSONL_PATH:-}"

            mkdir -p "$(dirname "$output_path")"
            {
              echo "strategy=boringcache"
              echo "mode=${mode}"
              echo "builder=${BUILDER:-}"
              echo "cache_scope=${CACHE_SCOPE:-}"
              echo "cache_from=${CACHE_FROM:-}"
              echo "cache_from_disabled=${cache_from_disabled:-0}"
              echo "cache_to=${CACHE_TO:-}"
              echo "registry_proxy_tags=${BORINGCACHE_REGISTRY_PROXY_TAGS:-}"
              echo "docker_registry_tag=${BORINGCACHE_DOCKER_REGISTRY_TAG:-}"
              printf 'cache_args='
              printf '%q ' "${cache_args[@]}"
              printf '\n'
              echo "import_status=$(build_import_status)"
              echo "cached_steps=${cached_steps}"
              echo "import_lines<<EOF"
              grep -E 'importing cache manifest|failed to configure .*cache importer|inferred cache manifest type' "$build_log" || true
              echo "EOF"
              echo "export_lines<<EOF"
              grep -E 'exporting cache to registry|DONE [0-9.]+s$' "$build_log" | tail -n 80 || true
              echo "EOF"
              echo "proxy_summary<<EOF"
              grep -E 'Mode:|OCI Human Tags|Internal Registry Root Tag|Startup mode|Full-tag hydration|OCI body hydration|OCI HEAD|SESSION tool=oci|KV flush|root publish|error|warn' "$proxy_log" | tail -n 160 || true
              echo "EOF"
              echo "proxy_status<<EOF"
              if [[ -s "$status_snapshot_path" ]]; then
                cat "$status_snapshot_path"
              fi
              echo "EOF"
              echo "slow_done_lines<<EOF"
              grep -E '^#[0-9]+ DONE [0-9]+(\.[0-9]+)?s$' "$build_log" | tail -n 80 || true
              echo "EOF"
              echo "observability_jsonl=${observability_path}"
              if [[ -n "$observability_path" && -s "$observability_path" ]]; then
                printf 'observability_events='
                wc -l < "$observability_path" | tr -d ' '
                printf '\n'
                echo "observability_summary<<EOF"
                grep -E 'cache_session_summary|oci_blob_upload|upload_session_commit|cache_finalize_publish|receipt|429|rate' "$observability_path" | tail -n 160 || true
                echo "EOF"
              fi
            } > "$output_path"
          }

          cache_from_disabled=0
          cache_from_is_enabled() {
            [[ "$cache_from_disabled" != "1" && -n "${CACHE_FROM:-}" ]]
          }

          attempt=1
          while true; do
            cache_args=()
            if [[ "$mode" == "full" ]]; then
              cache_from_is_enabled && cache_args+=(--cache-from "$CACHE_FROM")
              [[ -n "${CACHE_TO:-}" ]] && cache_args+=(--cache-to "$CACHE_TO")
            elif [[ "$mode" == "seed-cache" ]]; then
              # --no-cache is required for type=registry export: without it, buildx
              # sees cached layers from the builder and skips pushing blobs to the
              # registry proxy, so the proxy never uploads to BC backend.
              cache_args=(--no-cache)
              [[ -n "${CACHE_TO:-}" ]] && cache_args+=(--cache-to "$CACHE_TO")
            elif [[ "$mode" == "partial-warm" ]]; then
              # Read-only: no --cache-to.
              cache_from_is_enabled && cache_args+=(--cache-from "$CACHE_FROM")
            else
              echo "Unknown build mode: $mode" >&2
              exit 1
            fi
            start_proxy
            if ! wait_proxy_ready; then
              echo "Registry proxy did not become ready (attempt ${attempt}/${max_attempts})" >&2
              tail -n 200 "$proxy_log" || true
              if [[ "$attempt" -ge "$max_attempts" ]]; then
                write_build_diagnostics
                exit 1
              fi
              stop_proxy
              attempt=$((attempt + 1))
              sleep 3
              continue
            fi

            : > "$build_log"
            set +e
            DOCKER_BUILDKIT=1 docker buildx build \
              --builder "$BUILDER" \
              --file upstream/Dockerfile \
              --tag "$IMAGE_TAG" \
              --progress=plain \
              "${cache_args[@]}" \
              upstream 2>&1 | tee "$build_log"
            status=${PIPESTATUS[0]}
            set -e

            if [[ "$status" -eq 0 ]]; then
              if [[ "$mode" =~ ^(full|seed-cache)$ ]] && grep -Eq "$cache_export_pattern" "$build_log"; then
                stop_proxy
                if [[ "$attempt" -lt "$max_attempts" ]]; then
                  echo "Build succeeded but cache export was degraded (attempt ${attempt}/${max_attempts}); retrying to self-heal cache..." >&2
                  attempt=$((attempt + 1))
                  sleep 3
                  continue
                fi
                echo "Build succeeded but cache export still degraded after ${max_attempts} attempts; continuing run with best-effort cache state." >&2
              fi
              capture_proxy_status
              # Stop proxy gracefully so it can flush pending uploads
              if [[ "$mode" =~ ^(seed-cache|full)$ ]]; then
                echo "Flushing proxy cache to backend..."
                flush_action_proxy
              fi
              # Dump proxy log for diagnostics
              echo "=== Proxy log (${mode}, last 200 lines) ==="
              tail -n 200 "$proxy_log" 2>/dev/null || true
              echo "=== End proxy log ==="
              write_build_metrics
              write_build_diagnostics
              break
            fi

            stop_proxy

            if [[ "$cache_from_disabled" != "1" && "$mode" =~ ^(full|partial-warm)$ ]] && grep -Eq "$cache_import_blob_pattern" "$build_log"; then
              echo "Detected registry cache manifest with an unreadable blob body (attempt ${attempt}/${max_attempts}); retrying without --cache-from to reseed." >&2
              cache_from_disabled=1
            fi

            if [[ "$attempt" -ge "$max_attempts" ]]; then
              echo "Build (${mode}) failed after ${max_attempts} attempts" >&2
              tail -n 200 "$build_log" || true
              tail -n 400 "$proxy_log" || true
              write_build_diagnostics
              exit "$status"
            fi

            if grep -Eq "$cache_export_pattern" "$build_log"; then
              echo "Detected registry blob finalize mismatch (attempt ${attempt}/${max_attempts}); restarting proxy and retrying..." >&2
            else
              echo "Build (${mode}) failed (attempt ${attempt}/${max_attempts}); retrying..." >&2
            fi

            attempt=$((attempt + 1))
            sleep 3
          done
          SH
          chmod +x ./run-boringcache-build.sh

      - name: Configure boringcache/one for Docker
        id: docker_cache
        uses: boringcache/one@v1
        with:
          cli-version: skip
          setup: none
          cache-runtime: false
          mode: docker
          docker-command: setup
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          cache-tag: ${{ steps.scope.outputs.cache_scope }}
          registry-tag: ${{ steps.scope.outputs.registry_proxy_tags }}
          proxy-no-git: 'true'
          driver-opts: |
            network=host
          verbose: true
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
          BORINGCACHE_OBSERVABILITY_JSONL_PATH: ${{ runner.temp }}/posthog-boringcache-seed-observability.jsonl

      - name: ${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && 'Run rolling seed-only build' || 'Run fresh seed build' }}
        id: cold_baseline_build
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
          BORINGCACHE_PROXY_LOG_PATH: ${{ steps.docker_cache.outputs.proxy-log-path }}
          BORINGCACHE_PROXY_PORT: ${{ steps.docker_cache.outputs.proxy-port }}
          BUILDER: ${{ steps.docker_cache.outputs.buildx-name }}
          CACHE_FROM: ${{ steps.docker_cache.outputs.cache-from }}
          CACHE_TO: ${{ steps.docker_cache.outputs.cache-to }}
          CACHE_SCOPE: ${{ steps.scope.outputs.cache_scope }}
          CACHE_LANE: ${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}
          BORINGCACHE_REGISTRY_PROXY_TAGS: ${{ steps.scope.outputs.registry_proxy_tags }}
          BORINGCACHE_DOCKER_REGISTRY_TAG: ${{ steps.scope.outputs.docker_registry_tag }}
          BORINGCACHE_OBSERVABILITY_JSONL_PATH: ${{ runner.temp }}/posthog-boringcache-seed-observability.jsonl
          IMAGE_TAG: posthog-benchmark:latest
        run: |
          set -euo pipefail
          metrics_file="${RUNNER_TEMP}/cold-build-metrics.env"
          diagnostics_file="benchmark-diagnostics/${BENCHMARK_ID}-boringcache-${CACHE_LANE}-seed.txt"
          observability_artifact="benchmark-diagnostics/${BENCHMARK_ID}-boringcache-${CACHE_LANE}-seed-observability.jsonl"
          rm -f "$metrics_file"
          rm -f "$diagnostics_file"
          rm -f "$observability_artifact"
          mkdir -p "$(dirname "$diagnostics_file")"
          phase_start="${{ steps.seed_timing_start.outputs.started_at }}"
          start="$(date +%s)"
          set +e
          BENCHMARK_METRICS_OUTPUT="$metrics_file" BENCHMARK_DIAGNOSTICS_OUTPUT="$diagnostics_file" ./run-boringcache-build.sh ${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && 'full' || 'seed-cache' }}
          status="$?"
          set -e
          end="$(date +%s)"
          if [[ -s "$diagnostics_file" ]]; then
            {
              echo "seed_phase_started_at=${phase_start}"
              echo "seed_build_started_at=${start}"
              echo "seed_build_finished_at=${end}"
              echo "seed_phase_wall_seconds=$((end - phase_start))"
              echo "seed_build_wall_seconds=$((end - start))"
            } >> "$diagnostics_file"
          fi
          if [[ -s "$BORINGCACHE_OBSERVABILITY_JSONL_PATH" ]]; then
            cp "$BORINGCACHE_OBSERVABILITY_JSONL_PATH" "$observability_artifact"
          fi
          if [[ "$status" -ne 0 ]]; then
            exit "$status"
          fi
          echo "seconds=$((end - phase_start))" >> "$GITHUB_OUTPUT"
          echo "build_seconds=$((end - start))" >> "$GITHUB_OUTPUT"
          if [[ -s "$metrics_file" ]]; then
            cat "$metrics_file" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload seed diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-diagnostics-${{ env.BENCHMARK_ID }}-boringcache-${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}
          path: benchmark-diagnostics/*
          if-no-files-found: ignore

  scenario-builds:
    name: Warm rerun (BoringCache)
    needs: seed-cache
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.cache_lane != 'rolling' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      BORINGCACHE_SAVE_TOKEN: ''
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache /usr/share/swift /usr/local/.ghcup
          sudo docker system prune --all --volumes --force
          df -h /
          docker system df || true

      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Checkout pinned upstream submodule shallowly
        run: |
          set -euo pipefail
          git submodule sync --recursive
          git -c protocol.version=2 submodule update --init --depth 1 --recommend-shallow --jobs 4 upstream

      - name: Prepare scenario source tree
        run: ./scripts/prepare-source.sh warm1

      - name: Start scenario timing
        id: scenario_timing_start
        run: echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Install BoringCache CLI with boringcache/one
        uses: boringcache/one@v1
        with:
          setup: none
          mode: archive
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          cli-platform: linux-amd64
          cache-runtime: false

      - name: Prepare benchmark build inputs
        id: scope
        run: |
          ref_slug="$(printf '%s' "${GITHUB_REF_NAME}" | tr -c 'A-Za-z0-9._-' '-')"
          ref_slug="${ref_slug#-}"
          ref_slug="${ref_slug%-}"
          ref_slug="${ref_slug:-main}"
          if [[ "${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}" == "rolling" ]]; then
            run_suffix="rolling-${ref_slug}"
          else
            run_suffix="r${GITHUB_RUN_ID}-a${GITHUB_RUN_ATTEMPT}"
          fi
          cache_scope="${BENCHMARK_ID}-run-${run_suffix}"
          docker_registry_tag="${BENCHMARK_ID}-docker-layers-${run_suffix}"
          tags_csv="${cache_scope},${docker_registry_tag}"
          registry_proxy_tags="${cache_scope},${docker_registry_tag}"
          echo "cache_scope=${cache_scope}" >> "$GITHUB_OUTPUT"
          echo "docker_registry_tag=${docker_registry_tag}" >> "$GITHUB_OUTPUT"
          echo "registry_proxy_tags=${registry_proxy_tags}" >> "$GITHUB_OUTPUT"
          echo "tags_csv=${tags_csv}" >> "$GITHUB_OUTPUT"
          cat > ./run-boringcache-build.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail

          proxy_port="${BORINGCACHE_PROXY_PORT:-5000}"
          proxy_log="${BORINGCACHE_PROXY_LOG_PATH:-/tmp/boringcache-proxy-${proxy_port}.log}"
          build_log="$(mktemp /tmp/boringcache-build.XXXXXX.log)"
          status_snapshot_path="$(mktemp /tmp/boringcache-status.XXXXXX.json)"
          max_attempts=3
          cache_export_pattern='expected sha256:.*got sha256:e3b0|error writing layer blob|400 Bad Request|broken pipe'
          cache_import_blob_pattern='failed to copy: httpReadSeeker: failed open: could not fetch content descriptor .* from remote: (not found|500 Internal Server Error)|Blob storage returned error|OCI blob body download failed'

          mode="${1:-full}"
          start_proxy() { :; }
          stop_proxy() { :; }
          wait_proxy_ready() {
            local started phase elapsed ready require_cache_refs
            started="$(date +%s)"
            ready=0
            require_cache_refs=0

            if [[ "$mode" =~ ^(full|partial-warm)$ ]] && cache_from_is_enabled; then
              require_cache_refs=1
            fi

            while true; do
              if curl -fsS "http://127.0.0.1:${proxy_port}/_boringcache/status" -o "$status_snapshot_path" 2>/dev/null; then
                phase="$(jq -r '.phase // empty' "$status_snapshot_path" 2>/dev/null || true)"
                if [[ "$phase" == "ready" ]]; then
                  ready=1
                  if [[ "$require_cache_refs" != "1" ]] || cache_from_refs_ready; then
                    return 0
                  fi
                fi
              fi

              elapsed=$(($(date +%s) - started))
              if (( elapsed >= cache_ready_timeout_seconds )); then
                break
              fi
              sleep 1
            done

            if [[ "$ready" == "1" ]]; then
              echo "Registry proxy reached ready state before cache-from refs became readable; continuing after ${cache_ready_timeout_seconds}s"
              return 0
            fi

            return 1
          }
          flush_action_proxy() {
            local pid_file="${BORINGCACHE_PROXY_PID_FILE:-/tmp/boringcache-proxy.pid}"
            [[ -s "$pid_file" ]] || return 0

            local pid=""
            pid="$(tr -d '[:space:]' < "$pid_file" 2>/dev/null || true)"
            [[ "$pid" =~ ^[0-9]+$ ]] || return 0

            if ! kill -0 "$pid" 2>/dev/null; then
              echo "Registry proxy (PID: $pid) already exited"
              return 0
            fi

            echo "Stopping registry proxy (PID: $pid)..."
            if ! kill -TERM "$pid" 2>/dev/null; then
              echo "Failed to send SIGTERM to registry proxy (PID: $pid); continuing"
              return 0
            fi

            local started elapsed
            started="$(date +%s)"
            while kill -0 "$pid" 2>/dev/null; do
              sleep 1
              elapsed=$(($(date +%s) - started))
              if (( elapsed > 0 && elapsed % 30 == 0 )); then
                echo "Waiting for registry proxy to flush and exit... (${elapsed}s elapsed)"
              fi
            done
            elapsed=$(($(date +%s) - started))
            echo "Registry proxy exited gracefully after ${elapsed}s"
          }
          cleanup() { :; }
          trap cleanup EXIT

          find_step_id() {
            local pattern="$1"
            sed -nE "s/^#([0-9]+) ${pattern}.*/\\1/p" "$build_log" | tail -n1
          }

          find_step_seconds() {
            local step_id="$1"
            [[ -n "$step_id" ]] || return 0
            sed -nE "s/^#${step_id} DONE ([0-9]+(\\.[0-9]+)?)s$/\\1/p" "$build_log" | tail -n1
          }

          write_build_metrics() {
            local output_path="${BENCHMARK_METRICS_OUTPUT:-}"
            [[ -n "$output_path" ]] || return 0

            local import_step=""
            local export_step=""
            local import_seconds=""
            local export_seconds=""

            import_step="$(find_step_id "importing cache manifest from")"
            export_step="$(find_step_id "exporting cache to registry")"
            import_seconds="$(find_step_seconds "$import_step")"
            export_seconds="$(find_step_seconds "$export_step")"

            mkdir -p "$(dirname "$output_path")"
            : > "$output_path"
            if [[ -n "$import_seconds" ]]; then
              echo "docker_cache_import_seconds=$import_seconds" >> "$output_path"
            fi
            if [[ -n "$export_seconds" ]]; then
              echo "docker_cache_export_seconds=$export_seconds" >> "$output_path"
            fi

            if [[ -s "$status_snapshot_path" ]] && command -v jq >/dev/null 2>&1; then
              append_status_metric() {
                local key="$1"
                local jq_expr="$2"
                local value=""
                value="$(jq -r "$jq_expr // empty" "$status_snapshot_path" 2>/dev/null || true)"
                if [[ -n "$value" && "$value" != "null" ]]; then
                  echo "$key=$value" >> "$output_path"
                fi
              }

              append_status_metric oci_hydration_policy '.startup_prefetch.startup_prefetch_oci_hydration'
              append_status_metric startup_oci_body_inserted '.startup_prefetch.startup_prefetch_oci_body_inserted'
              append_status_metric startup_oci_body_failures '.startup_prefetch.startup_prefetch_oci_body_failures'
              append_status_metric startup_oci_body_cold_blobs '.startup_prefetch.startup_prefetch_oci_body_cold_blobs'
              append_status_metric startup_oci_body_duration_ms '.startup_prefetch.startup_prefetch_oci_body_duration_ms'
              append_status_metric oci_body_local_hits '.oci_body.oci_body_local_hits'
              append_status_metric oci_body_remote_fetches '.oci_body.oci_body_remote_fetches'
              append_status_metric oci_body_local_bytes '.oci_body.oci_body_local_bytes'
              append_status_metric oci_body_remote_bytes '.oci_body.oci_body_remote_bytes'
              append_status_metric oci_body_local_duration_ms '.oci_body.oci_body_local_duration_ms'
              append_status_metric oci_body_remote_duration_ms '.oci_body.oci_body_remote_duration_ms'
            fi

            local observability_path="${BORINGCACHE_OBSERVABILITY_JSONL_PATH:-}"
            if [[ -n "$observability_path" && -s "$observability_path" ]] && command -v jq >/dev/null 2>&1; then
              detail_value() {
                local details="$1"
                local name="$2"
                printf '%s\n' "$details" | tr ' ' '\n' | awk -F= -v key="$name" '$1 == key { print $2; exit }'
              }
              append_metric() {
                local key="$1"
                local value="$2"
                if [[ -n "$value" && "$value" != "null" ]]; then
                  echo "$key=$value" >> "$output_path"
                fi
              }

              local plan_details=""
              plan_details="$(jq -r 'select(.operation == "oci_blob_upload_plan") | .details // empty' "$observability_path" 2>/dev/null | tail -n1 || true)"
              if [[ -n "$plan_details" ]]; then
                append_metric oci_upload_requested_blobs "$(detail_value "$plan_details" requested_blobs)"
                append_metric oci_new_blob_count "$(detail_value "$plan_details" upload_urls)"
                append_metric oci_upload_already_present "$(detail_value "$plan_details" already_present)"
              else
                append_metric oci_new_blob_count "0"
              fi

              local uploaded_blob_bytes=""
              uploaded_blob_bytes="$(jq -s -r '
                ([range(0; length) as $i | select(.[$i].operation == "oci_blob_upload_plan") | $i] | last) as $plan
                | if $plan == null then
                    0
                  else
                    ([range(($plan + 1); length) as $i | .[$i] | select(.operation == "oci_blob_upload") | (.request_bytes // 0)] | add // 0)
                  end
              ' "$observability_path" 2>/dev/null || true)"
              append_metric oci_new_blob_bytes "${uploaded_blob_bytes:-0}"

              local batch_duration_ms=""
              batch_duration_ms="$(jq -r 'select(.operation == "oci_blob_upload_batch") | .duration_ms // empty' "$observability_path" 2>/dev/null | tail -n1 || true)"
              if [[ -n "$batch_duration_ms" ]]; then
                awk -v ms="$batch_duration_ms" 'BEGIN { printf "oci_upload_batch_seconds=%.3f\n", ms / 1000 }' >> "$output_path"
              fi
            fi
          }


          capture_proxy_status() {
            local output_path="${1:-$status_snapshot_path}"
            curl -fsS "http://127.0.0.1:${proxy_port}/_boringcache/status" -o "$output_path" 2>/dev/null || true
          }

          cache_from_disabled=0
          cache_from_is_enabled() {
            [[ "$cache_from_disabled" != "1" && -n "${CACHE_FROM:-}" ]]
          }

          attempt=1
          while true; do
            cache_args=()
            if [[ "$mode" == "full" ]]; then
              cache_from_is_enabled && cache_args+=(--cache-from "$CACHE_FROM")
              [[ -n "${CACHE_TO:-}" ]] && cache_args+=(--cache-to "$CACHE_TO")
            elif [[ "$mode" == "seed-cache" ]]; then
              # --no-cache is required for type=registry export: without it, buildx
              # sees cached layers from the builder and skips pushing blobs to the
              # registry proxy, so the proxy never uploads to BC backend.
              cache_args=(--no-cache)
              [[ -n "${CACHE_TO:-}" ]] && cache_args+=(--cache-to "$CACHE_TO")
            elif [[ "$mode" == "partial-warm" ]]; then
              # Read-only: no --cache-to.
              cache_from_is_enabled && cache_args+=(--cache-from "$CACHE_FROM")
            else
              echo "Unknown build mode: $mode" >&2
              exit 1
            fi
            start_proxy
            if ! wait_proxy_ready; then
              echo "Registry proxy did not become ready (attempt ${attempt}/${max_attempts})" >&2
              tail -n 200 "$proxy_log" || true
              if [[ "$attempt" -ge "$max_attempts" ]]; then
                exit 1
              fi
              stop_proxy
              attempt=$((attempt + 1))
              sleep 3
              continue
            fi

            : > "$build_log"
            set +e
            DOCKER_BUILDKIT=1 docker buildx build \
              --builder "$BUILDER" \
              --file upstream/Dockerfile \
              --tag "$IMAGE_TAG" \
              --progress=plain \
              "${cache_args[@]}" \
              upstream 2>&1 | tee "$build_log"
            status=${PIPESTATUS[0]}
            set -e

            if [[ "$status" -eq 0 ]]; then
              if [[ "$mode" =~ ^(full|seed-cache)$ ]] && grep -Eq "$cache_export_pattern" "$build_log"; then
                stop_proxy
                if [[ "$attempt" -lt "$max_attempts" ]]; then
                  echo "Build succeeded but cache export was degraded (attempt ${attempt}/${max_attempts}); retrying to self-heal cache..." >&2
                  attempt=$((attempt + 1))
                  sleep 3
                  continue
                fi
                echo "Build succeeded but cache export still degraded after ${max_attempts} attempts; continuing run with best-effort cache state." >&2
              fi
              capture_proxy_status
              # Stop proxy gracefully so it can flush pending uploads
              if [[ "$mode" =~ ^(seed-cache|full)$ ]]; then
                echo "Flushing proxy cache to backend..."
                flush_action_proxy
              fi
              # Dump proxy log for diagnostics
              echo "=== Proxy log (${mode}, last 200 lines) ==="
              tail -n 200 "$proxy_log" 2>/dev/null || true
              echo "=== End proxy log ==="
              write_build_metrics
              break
            fi

            stop_proxy

            if [[ "$cache_from_disabled" != "1" && "$mode" =~ ^(full|partial-warm)$ ]] && grep -Eq "$cache_import_blob_pattern" "$build_log"; then
              echo "Detected registry cache manifest with an unreadable blob body (attempt ${attempt}/${max_attempts}); retrying without --cache-from to reseed." >&2
              cache_from_disabled=1
            fi

            if [[ "$attempt" -ge "$max_attempts" ]]; then
              echo "Build (${mode}) failed after ${max_attempts} attempts" >&2
              tail -n 200 "$build_log" || true
              tail -n 400 "$proxy_log" || true
              exit "$status"
            fi

            if grep -Eq "$cache_export_pattern" "$build_log"; then
              echo "Detected registry blob finalize mismatch (attempt ${attempt}/${max_attempts}); restarting proxy and retrying..." >&2
            else
              echo "Build (${mode}) failed (attempt ${attempt}/${max_attempts}); retrying..." >&2
            fi

            attempt=$((attempt + 1))
            sleep 3
          done
          SH
          chmod +x ./run-boringcache-build.sh

      - name: Configure boringcache/one for Docker
        id: docker_cache
        uses: boringcache/one@v1
        with:
          cli-version: skip
          setup: none
          cache-runtime: false
          mode: docker
          docker-command: setup
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          cache-tag: ${{ needs.seed-cache.outputs.cache_scope }}
          registry-tag: ${{ steps.scope.outputs.registry_proxy_tags }}
          proxy-no-git: 'true'
          read-only: true
          driver-opts: |
            network=host
          verbose: true
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}

      - name: Prune builder cache for isolated scenario
        run: docker buildx prune -f --builder "${{ steps.docker_cache.outputs.buildx-name }}"
      - name: Run warm build 1
        id: warm1_build
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
          BORINGCACHE_PROXY_LOG_PATH: ${{ steps.docker_cache.outputs.proxy-log-path }}
          BORINGCACHE_PROXY_PORT: ${{ steps.docker_cache.outputs.proxy-port }}
          BUILDER: ${{ steps.docker_cache.outputs.buildx-name }}
          CACHE_FROM: ${{ steps.docker_cache.outputs.cache-from }}
          CACHE_TO: ${{ steps.docker_cache.outputs.cache-to }}
          CACHE_SCOPE: ${{ needs.seed-cache.outputs.cache_scope }}
          IMAGE_TAG: posthog-benchmark:latest
        run: |
          set -euo pipefail
          metrics_file="${RUNNER_TEMP}/warm1-build-metrics.env"
          rm -f "$metrics_file"
          phase_start="${{ steps.scenario_timing_start.outputs.started_at }}"
          start="$(date +%s)"
          BENCHMARK_METRICS_OUTPUT="$metrics_file" ./run-boringcache-build.sh partial-warm
          end="$(date +%s)"
          echo "seconds=$((end - phase_start))" >> "$GITHUB_OUTPUT"
          echo "build_seconds=$((end - start))" >> "$GITHUB_OUTPUT"
          if [[ -s "$metrics_file" ]]; then
            cat "$metrics_file" >> "$GITHUB_OUTPUT"
          fi

      - name: Capture scenario timing
        id: phase_timing
        run: |
          set -euo pipefail
          seconds=""
          build_seconds=""
          docker_cache_import_seconds=""
          metric_names=(oci_hydration_policy oci_body_local_hits oci_body_remote_fetches oci_body_local_bytes oci_body_remote_bytes oci_body_local_duration_ms oci_body_remote_duration_ms startup_oci_body_inserted startup_oci_body_failures startup_oci_body_cold_blobs startup_oci_body_duration_ms)
          for metric_name in "${metric_names[@]}"; do
            printf -v "$metric_name" '%s' ''
          done
          seconds="${{ steps.warm1_build.outputs.seconds }}"
          build_seconds="${{ steps.warm1_build.outputs.build_seconds }}"
          docker_cache_import_seconds="${{ steps.warm1_build.outputs.docker_cache_import_seconds }}"
          oci_hydration_policy="${{ steps.warm1_build.outputs.oci_hydration_policy }}"
          oci_body_local_hits="${{ steps.warm1_build.outputs.oci_body_local_hits }}"
          oci_body_remote_fetches="${{ steps.warm1_build.outputs.oci_body_remote_fetches }}"
          oci_body_local_bytes="${{ steps.warm1_build.outputs.oci_body_local_bytes }}"
          oci_body_remote_bytes="${{ steps.warm1_build.outputs.oci_body_remote_bytes }}"
          oci_body_local_duration_ms="${{ steps.warm1_build.outputs.oci_body_local_duration_ms }}"
          oci_body_remote_duration_ms="${{ steps.warm1_build.outputs.oci_body_remote_duration_ms }}"
          startup_oci_body_inserted="${{ steps.warm1_build.outputs.startup_oci_body_inserted }}"
          startup_oci_body_failures="${{ steps.warm1_build.outputs.startup_oci_body_failures }}"
          startup_oci_body_cold_blobs="${{ steps.warm1_build.outputs.startup_oci_body_cold_blobs }}"
          startup_oci_body_duration_ms="${{ steps.warm1_build.outputs.startup_oci_body_duration_ms }}"
          if [[ -z "${seconds}" ]]; then
            echo "No timing captured for warm1" >&2
            exit 1
          fi
          echo "seconds=${seconds}" >> "$GITHUB_OUTPUT"
          echo "build_seconds=${build_seconds}" >> "$GITHUB_OUTPUT"
          if [[ -n "${docker_cache_import_seconds}" ]]; then
            echo "docker_cache_import_seconds=${docker_cache_import_seconds}" >> "$GITHUB_OUTPUT"
          fi
          for metric_name in "${metric_names[@]}"; do
            metric_value="${!metric_name}"
            if [[ -n "$metric_value" ]]; then
              echo "${metric_name}=${metric_value}" >> "$GITHUB_OUTPUT"
            fi
          done
      - name: Persist scenario timing artifact
        run: |
          set -euo pipefail
          mkdir -p benchmark-phase
          cat > "benchmark-phase/warm1.env" <<EOF
          phase=warm1
          seconds=${{ steps.phase_timing.outputs.seconds }}
          build_seconds=${{ steps.phase_timing.outputs.build_seconds }}
          docker_cache_import_seconds=${{ steps.phase_timing.outputs.docker_cache_import_seconds }}
          oci_hydration_policy=${{ steps.phase_timing.outputs.oci_hydration_policy }}
          oci_body_local_hits=${{ steps.phase_timing.outputs.oci_body_local_hits }}
          oci_body_remote_fetches=${{ steps.phase_timing.outputs.oci_body_remote_fetches }}
          oci_body_local_bytes=${{ steps.phase_timing.outputs.oci_body_local_bytes }}
          oci_body_remote_bytes=${{ steps.phase_timing.outputs.oci_body_remote_bytes }}
          oci_body_local_duration_ms=${{ steps.phase_timing.outputs.oci_body_local_duration_ms }}
          oci_body_remote_duration_ms=${{ steps.phase_timing.outputs.oci_body_remote_duration_ms }}
          startup_oci_body_inserted=${{ steps.phase_timing.outputs.startup_oci_body_inserted }}
          startup_oci_body_failures=${{ steps.phase_timing.outputs.startup_oci_body_failures }}
          startup_oci_body_cold_blobs=${{ steps.phase_timing.outputs.startup_oci_body_cold_blobs }}
          startup_oci_body_duration_ms=${{ steps.phase_timing.outputs.startup_oci_body_duration_ms }}
          EOF
      - name: Upload scenario timing artifact
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-phase-${{ env.BENCHMARK_ID }}-boringcache-warm1
          path: benchmark-phase/warm1.env
          if-no-files-found: error

  finalize-benchmark:
    name: Finalize benchmark artifacts
    needs: [seed-cache, scenario-builds]
    if: ${{ always() && needs.seed-cache.result == 'success' && (needs.scenario-builds.result == 'success' || needs.scenario-builds.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout benchmark repo helpers
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          path: .benchmark-config

      - name: Install BoringCache CLI with boringcache/one
        uses: boringcache/one@v1
        with:
          setup: none
          mode: archive
          workspace: ${{ env.BENCHMARK_WORKSPACE }}
          cli-platform: linux-amd64
          cache-runtime: false

      - name: Download scenario timing artifacts
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.cache_lane != 'rolling' }}
        uses: actions/download-artifact@v8
        with:
          pattern: benchmark-phase-${{ env.BENCHMARK_ID }}-boringcache-*
          path: benchmark-phase
          merge-multiple: true
      - name: Collect scenario timings
        id: timings
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.cache_lane != 'rolling' }}
        run: |
          set -euo pipefail
          parse_phase() {
            local phase="$1"
            local file="benchmark-phase/${phase}.env"
            if [[ ! -f "$file" ]]; then
              echo "Missing timing artifact for phase ${phase}" >&2
              ls -R benchmark-phase || true
              exit 1
            fi
            local seconds
            seconds="$(grep "^seconds=" "$file" | head -n1 | cut -d= -f2-)"
            if [[ -z "${seconds}" ]]; then
              echo "Timing artifact for phase ${phase} has empty seconds" >&2
              cat "$file" >&2
              exit 1
            fi
            local key="${phase//-/_}"
            echo "${key}_seconds=${seconds}" >> "$GITHUB_OUTPUT"
            local docker_cache_import_seconds
            docker_cache_import_seconds="$(grep "^docker_cache_import_seconds=" "$file" | head -n1 | cut -d= -f2- || true)"
            if [[ -n "${docker_cache_import_seconds}" ]]; then
              echo "${key}_docker_cache_import_seconds=${docker_cache_import_seconds}" >> "$GITHUB_OUTPUT"
            fi
            metric_names=(oci_hydration_policy oci_body_local_hits oci_body_remote_fetches oci_body_local_bytes oci_body_remote_bytes oci_body_local_duration_ms oci_body_remote_duration_ms startup_oci_body_inserted startup_oci_body_failures startup_oci_body_cold_blobs startup_oci_body_duration_ms)
            for metric_name in "${metric_names[@]}"; do
              metric_value="$(grep "^${metric_name}=" "$file" | head -n1 | cut -d= -f2- || true)"
              if [[ -n "${metric_value}" ]]; then
                echo "${key}_${metric_name}=${metric_value}" >> "$GITHUB_OUTPUT"
              fi
            done
          }
          parse_phase warm1
      - name: Measure BoringCache storage usage
        id: cache_size
        env:
          BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN || secrets.BORINGCACHE_API_TOKEN }}
        run: |
          tags_csv="${{ needs.seed-cache.outputs.tags_csv }}"
          bytes="$(.benchmark-config/scripts/sum-boringcache-check-sizes.sh "$BENCHMARK_WORKSPACE" "$tags_csv")"
          echo "bytes=${bytes}" >> "$GITHUB_OUTPUT"

      - name: Capture committed upstream ref
        id: upstream_ref
        run: echo "sha=$(git -C .benchmark-config rev-parse HEAD:upstream)" >> "$GITHUB_OUTPUT"

      - name: Write benchmark artifacts
        id: artifact_files
        run: |
          .benchmark-config/scripts/write-benchmark-artifacts.sh \
            --benchmark "$BENCHMARK_ID" \
            --strategy "boringcache" \
            --lane "${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}" \
            --project-repo "$PROJECT_REPO" \
            --project-ref "${{ steps.upstream_ref.outputs.sha }}" \
            --cold-seconds "${{ needs.seed-cache.outputs.cold_seconds }}" \
            --warm1-seconds "${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && '' || steps.timings.outputs.warm1_seconds }}" \
            --docker-cache-import-seconds "${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && '' || steps.timings.outputs.warm1_docker_cache_import_seconds }}" \
            --docker-cache-export-seconds "${{ needs.seed-cache.outputs.docker_cache_export_seconds }}" \
            --cache-storage-bytes "${{ steps.cache_size.outputs.bytes }}" \
            --cache-storage-source "boringcache-check" \
            --bytes-uploaded "${{ steps.cache_size.outputs.bytes }}" \
            --oci-hydration-policy "${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && needs.seed-cache.outputs.oci_hydration_policy || steps.timings.outputs.warm1_oci_hydration_policy }}" \
            --oci-body-local-hits "${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && needs.seed-cache.outputs.oci_body_local_hits || steps.timings.outputs.warm1_oci_body_local_hits }}" \
            --oci-body-remote-fetches "${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && needs.seed-cache.outputs.oci_body_remote_fetches || steps.timings.outputs.warm1_oci_body_remote_fetches }}" \
            --oci-body-local-bytes "${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && needs.seed-cache.outputs.oci_body_local_bytes || steps.timings.outputs.warm1_oci_body_local_bytes }}" \
            --oci-body-remote-bytes "${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && needs.seed-cache.outputs.oci_body_remote_bytes || steps.timings.outputs.warm1_oci_body_remote_bytes }}" \
            --oci-body-local-duration-ms "${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && needs.seed-cache.outputs.oci_body_local_duration_ms || steps.timings.outputs.warm1_oci_body_local_duration_ms }}" \
            --oci-body-remote-duration-ms "${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && needs.seed-cache.outputs.oci_body_remote_duration_ms || steps.timings.outputs.warm1_oci_body_remote_duration_ms }}" \
            --startup-oci-body-inserted "${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && needs.seed-cache.outputs.startup_oci_body_inserted || steps.timings.outputs.warm1_startup_oci_body_inserted }}" \
            --startup-oci-body-failures "${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && needs.seed-cache.outputs.startup_oci_body_failures || steps.timings.outputs.warm1_startup_oci_body_failures }}" \
            --startup-oci-body-cold-blobs "${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && needs.seed-cache.outputs.startup_oci_body_cold_blobs || steps.timings.outputs.warm1_startup_oci_body_cold_blobs }}" \
            --startup-oci-body-duration-ms "${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && needs.seed-cache.outputs.startup_oci_body_duration_ms || steps.timings.outputs.warm1_startup_oci_body_duration_ms }}" \
            --oci-new-blob-count "${{ needs.seed-cache.outputs.oci_new_blob_count }}" \
            --oci-new-blob-bytes "${{ needs.seed-cache.outputs.oci_new_blob_bytes }}" \
            --oci-upload-requested-blobs "${{ needs.seed-cache.outputs.oci_upload_requested_blobs }}" \
            --oci-upload-already-present "${{ needs.seed-cache.outputs.oci_upload_already_present }}" \
            --oci-upload-batch-seconds "${{ needs.seed-cache.outputs.oci_upload_batch_seconds }}" \
            --reseed-new-blob-threshold "0" \
            --hit-behavior-note "${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane == 'rolling' && 'Rolling lane: this run executes only the upstream-sync seed build; warm1 follow-up runs are intentionally skipped.' || 'Fresh lane: cold+seed starts from empty BC tags and empty Docker layer cache, uses --no-cache + cache-to via the BC registry proxy (mode=max), and records cold timing while priming the shared cache. Warm1 rebuilds the same pinned base tree on a fresh runner with cache-from only, no helper mounted inside Docker RUN steps, and no synthetic mutations.' }}"

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-${{ env.BENCHMARK_ID }}-boringcache-${{ github.event_name == 'workflow_dispatch' && inputs.cache_lane || 'fresh' }}
          path: |
            ${{ steps.artifact_files.outputs.json_path }}
            ${{ steps.artifact_files.outputs.md_path }}
          if-no-files-found: error

      - name: Publish summary
        run: cat "${{ steps.artifact_files.outputs.md_path }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Storage comparison with GHA cache
        if: always() && steps.cache_size.outputs.bytes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bc_bytes="${{ steps.cache_size.outputs.bytes }}"

          # Query GHA cache usage for this repo
          gha_bytes="$(gh api "repos/${GITHUB_REPOSITORY}/actions/cache/usage" --jq '.active_caches_size_in_bytes' 2>/dev/null)" || {
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "_Storage comparison skipped (GHA API unreachable)_" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          }

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Storage comparison" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cache | Storage | Notes |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| BoringCache | $(numfmt --to=iec-i --suffix=B "${bc_bytes}") | PostHog benchmark tags (content-addressed, deduped across branches) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GitHub Actions | $(numfmt --to=iec-i --suffix=B "${gha_bytes}") | Repo total (buildkit blobs shared across projects, no cross-branch dedup) |" >> "$GITHUB_STEP_SUMMARY"
