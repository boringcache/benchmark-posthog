name: "PostHog Benchmark"
run-name: >-
  ${{ format('Benchmark Rolling | {0}', github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || github.event_name == 'schedule' && 'Scheduled' || format('Manual dispatch ({0})', github.ref_name)) }}

on:
  workflow_dispatch:
    inputs:
      prewarm_buildkit_image:
        description: "Optional experimental BuildKit image. When set, the rolling run adds a BC BuildKit backend lane."
        required: false
        type: string
        default: ""
      benchmark_id_suffix:
        description: "Optional suffix appended to built-in benchmark/cache scopes for isolated comparison runs."
        required: false
        type: string
        default: ""
      upstream_ref:
        description: "Optional PostHog ref/SHA to benchmark instead of the pinned upstream submodule commit."
        required: false
        type: string
        default: ""
  schedule:
    - cron: "0 3 * * 3"
  pull_request:
    paths:
      - ".gitmodules"
      - ".github/actions/docker-rolling-benchmark/**"
      - ".github/workflows/posthog-benchmark.yml"
      - ".github/workflows/reusable-docker-buildkit-benchmark.yml"
      - "README.md"
      - "scenarios/**"
      - "scripts/**"
      - "upstream"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write
  id-token: write
  packages: read

jobs:
  github-actions-cache:
    name: GHA
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Free disk space
        shell: bash
        run: ./scripts/free-runner-disk.sh

      - name: GHA
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: actions-cache
          benchmark_id: ${{ format('posthog{0}', inputs.benchmark_id_suffix) }}
          project_repo: PostHog/posthog
          project_ref: ${{ inputs.upstream_ref }}
          docker_context: upstream
          image_tag: posthog-benchmark:latest
          benchmark_workspace: ${{ github.repository }}
          dockerfile_path: upstream/Dockerfile

  ecr-cache:
    name: ECR
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Free disk space
        shell: bash
        run: ./scripts/free-runner-disk.sh

      - name: ECR
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: ecr-cache
          artifact_strategy: ecr-cache
          benchmark_id: ${{ format('posthog{0}', inputs.benchmark_id_suffix) }}
          project_repo: PostHog/posthog
          project_ref: ${{ inputs.upstream_ref }}
          docker_context: upstream
          image_tag: posthog-benchmark:latest
          benchmark_workspace: ${{ github.repository }}
          dockerfile_path: upstream/Dockerfile
          ecr_region: ${{ vars.DOCKER_BENCHMARK_ECR_REGION || 'us-east-1' }}
          ecr_role_arn: ${{ vars.DOCKER_BENCHMARK_ECR_ROLE_ARN }}
          ecr_registry: ${{ vars.DOCKER_BENCHMARK_ECR_REGISTRY }}
          ecr_repository: ${{ vars.DOCKER_BENCHMARK_ECR_REPOSITORY }}

  boringcache:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: BC OCI
            buildkit_backend: registry
            benchmark_id: posthog
            native_publish_intensity: ""
            dockerfile_path: upstream/Dockerfile
            docker_tool_cache: ""
            docker_mount_cache: ""
          - label: BC Native
            buildkit_backend: native
            benchmark_id: posthog-native
            native_publish_intensity: balanced
            dockerfile_path: upstream/Dockerfile
            docker_tool_cache: ""
            docker_mount_cache: ""
          - label: BC Native + toolcache
            buildkit_backend: native
            benchmark_id: posthog-native-toolcache
            native_publish_intensity: balanced
            dockerfile_path: scenarios/posthog-toolcache/Dockerfile
            docker_tool_cache: turbo
            docker_mount_cache: ""
          - label: BC OCI + toolcache
            buildkit_backend: registry
            benchmark_id: posthog-oci-toolcache
            native_publish_intensity: ""
            dockerfile_path: scenarios/posthog-toolcache/Dockerfile
            docker_tool_cache: turbo
            docker_mount_cache: ""
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_BUILDKIT_PUBLISH_INTENSITY: ${{ matrix.native_publish_intensity }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Free disk space
        shell: bash
        run: ./scripts/free-runner-disk.sh

      - name: ${{ matrix.label }}
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: ${{ matrix.buildkit_backend }}
          benchmark_id: ${{ format('{0}{1}', matrix.benchmark_id, inputs.benchmark_id_suffix) }}
          project_repo: PostHog/posthog
          project_ref: ${{ inputs.upstream_ref }}
          dockerfile_path: ${{ matrix.dockerfile_path }}
          docker_context: upstream
          image_tag: posthog-benchmark:latest
          cli_platform: linux-amd64
          benchmark_workspace: ${{ github.repository }}
          native_publish_intensity: ${{ matrix.native_publish_intensity }}
          docker_tool_cache: ${{ matrix.docker_tool_cache }}
          docker_mount_cache: ${{ matrix.docker_mount_cache }}

  boringcache-prewarm-buildkit:
    name: BC BuildKit Backend
    if: ${{ github.event_name != 'pull_request' && (inputs.prewarm_buildkit_image || vars.POSTHOG_PREWARM_BUILDKIT_IMAGE) }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_GHCR_READ_USER: ${{ vars.BORINGCACHE_GHCR_READ_USER || github.actor }}
      BORINGCACHE_GHCR_READ_TOKEN: ${{ secrets.BORINGCACHE_GHCR_READ_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Free disk space
        shell: bash
        run: ./scripts/free-runner-disk.sh

      - name: BC BuildKit Backend
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: registry
          benchmark_id: ${{ format('posthog-bc-buildkit{0}', inputs.benchmark_id_suffix) }}
          project_repo: PostHog/posthog
          project_ref: ${{ inputs.upstream_ref }}
          dockerfile_path: upstream/Dockerfile
          docker_context: upstream
          image_tag: posthog-benchmark:latest
          cli_platform: linux-amd64
          buildkit_image: ${{ inputs.prewarm_buildkit_image || vars.POSTHOG_PREWARM_BUILDKIT_IMAGE }}
          benchmark_workspace: ${{ github.repository }}
          buildkit_cache_backend: boringcache
          oci_hydration: metadata-only
          native_publish_intensity: ""
          docker_tool_cache: ""
          docker_mount_cache: ""

  boringcache-prewarm-buildkit-toolcache:
    name: BC BuildKit Backend + toolcache
    if: ${{ github.event_name != 'pull_request' && (inputs.prewarm_buildkit_image || vars.POSTHOG_PREWARM_BUILDKIT_IMAGE) }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN || secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_GHCR_READ_USER: ${{ vars.BORINGCACHE_GHCR_READ_USER || github.actor }}
      BORINGCACHE_GHCR_READ_TOKEN: ${{ secrets.BORINGCACHE_GHCR_READ_TOKEN }}
    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Free disk space
        shell: bash
        run: ./scripts/free-runner-disk.sh

      - name: BC BuildKit Backend + toolcache
        uses: ./.github/actions/docker-rolling-benchmark
        with:
          strategy: boringcache
          buildkit_backend: registry
          benchmark_id: ${{ format('posthog-bc-buildkit-toolcache{0}', inputs.benchmark_id_suffix) }}
          project_repo: PostHog/posthog
          project_ref: ${{ inputs.upstream_ref }}
          dockerfile_path: scenarios/posthog-toolcache/Dockerfile
          docker_context: upstream
          image_tag: posthog-benchmark:latest
          cli_platform: linux-amd64
          buildkit_image: ${{ inputs.prewarm_buildkit_image || vars.POSTHOG_PREWARM_BUILDKIT_IMAGE }}
          benchmark_workspace: ${{ github.repository }}
          buildkit_cache_backend: boringcache
          oci_hydration: metadata-only
          native_publish_intensity: ""
          docker_tool_cache: turbo
          docker_mount_cache: ""
